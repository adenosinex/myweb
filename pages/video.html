<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云端幻境 - 短视频</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==========================================================================
           1. 全局与基础样式
           ========================================================================== */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: white; overflow: hidden; font-family: -apple-system, sans-serif; touch-action: pan-y; }
        
        /* ==========================================================================
           2. 顶部导航与标签栏 (Top Navigation)
           ========================================================================== */
        .top-nav { position: absolute; top: 0; left: 0; right: 0; z-index: 40; background: linear-gradient(to bottom, rgba(0,0,0, 0.8), transparent); padding-top: env(safe-area-inset-top, 15px); pointer-events: none; }
        .main-tabs { display: flex; justify-content: center; gap: 25px; padding: 15px 0 10px; pointer-events: auto; }
        .tab-item { font-size: 16px; color: rgba(255,255,255,0.5); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-item.active { color: white; font-size: 18px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .tag-row { display: flex; align-items: center; gap: 10px; padding: 0 15px 15px; pointer-events: auto; }
        .tag-scroll { display: flex; overflow-x: auto; gap: 10px; flex: 1; scrollbar-width: none; padding-bottom: 5px; }
        .tag-scroll::-webkit-scrollbar { display: none; }
        .cat-pill { padding: 6px 14px; background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 12px; white-space: nowrap; transition: 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(4px); }
        .cat-pill.active { background: #3b82f6; color: white; border-color: #60a5fa; font-weight: bold; box-shadow: 0 0 15px rgba(59,130,246,0.6); }

        /* ==========================================================================
           3. 分类抽屉网格 (Category Drawer)
           ========================================================================== */
        .drawer { position: fixed; inset: 0; background: #0b1120; z-index: 100; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); padding: calc(env(safe-area-inset-top, 20px) + 20px) 20px; }
        .drawer.open { transform: translateY(0); }
        .drawer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; overflow-y: auto; max-height: 80vh; }
        .grid-item { background: rgba(255,255,255,0.05); padding: 15px 10px; border-radius: 12px; text-align: center; display: flex; flex-direction: column; gap: 5px; cursor: pointer; transition: 0.2s;}
        .grid-item.active { border: 1px solid #60a5fa; background: rgba(59, 130, 246, 0.2); box-shadow: inset 0 0 10px rgba(59,130,246,0.2); }

        /* ==========================================================================
           4. 视频流容器与卡片 (Video Feed & Card)
           ========================================================================== */
        .video-feed { height: 100dvh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; }
        .video-feed::-webkit-scrollbar { display: none; }
        .video-card { height: 100dvh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; }
        .video-player { position: relative; z-index: 2; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .blur-bg { position: absolute; inset: 0; z-index: 1; background-size: cover; background-position: center; filter: blur(40px) brightness(0.3); transform: scale(1.1); pointer-events: none;}
        .click-area { position: absolute; inset: 0; z-index: 10; cursor: pointer; }

        /* ==========================================================================
           5. 悬浮 UI 与交互组件 (Overlay & Components)
           ========================================================================== */
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 11; opacity: 0; pointer-events: none; color: rgba(255,255,255,0.7); transition: 0.2s; }
        .video-card.paused .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        .seek-toast { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.9); font-size: 16px; font-weight: bold; letter-spacing: 1px; z-index: 50; opacity: 0; transition: opacity 0.3s ease-out; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .info-bottom { position: absolute; left: 15px; bottom: 30px; right: 75px; z-index: 20; text-shadow: 0 1px 2px rgba(0,0,0,0.8); pointer-events: none; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .ai-tag { background: rgba(59, 130, 246, 0.3); border: 1px solid rgba(96, 165, 250, 0.2); color: #93c5fd; }
        .file-tag { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.05); color: #d1d5db; }
        
        .action-sidebar { position: absolute; right: 15px; bottom: 120px; z-index: 20; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .icon-circle { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s;}
        
        .progress-container { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); z-index: 30; }
        .progress-bar { height: 100%; background: rgba(255,255,255,0.7); width: 0%; transition: width 0.1s linear; }

        /* ==========================================================================
           6. 动画特效 (Animations)
           ========================================================================== */
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }
        .action-btn.liked .icon-circle { animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #ef4444; background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.3); }
        .btn-dislike:active .icon-circle { background: rgba(255,255,255,0.3); }
        .disliked-anim { transform: scale(0.8) translateY(100px); opacity: 0; filter: grayscale(1); transition: 0.4s ease-in; pointer-events: none; }
        .recover-anim { transform: translateX(100%); opacity: 0; transition: 0.4s ease-out; pointer-events: none; }
    </style>
</head>
<body class="selection:bg-blue-500">

    <div class="drawer" id="drawer">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">全部分类</h2>
            <button onclick="AppActions.toggleDrawer()" class="p-2 bg-white/10 rounded-full">✕</button>
        </div>
        <div class="drawer-grid" id="drawerGrid"></div>
    </div>

    <div class="top-nav">
        <div class="main-tabs">
            <div class="tab-item active" onclick="AppActions.switchFilter('all')" id="nav-all">推荐</div>
            <div class="tab-item" onclick="AppActions.switchFilter('unplayed')" id="nav-unplayed">新鲜</div>
            <div class="flex gap-2 absolute right-4 top-4 pointer-events-auto">
                <a href="/video-cache.html" class="text-[10px] bg-white/20 border border-white/20 backdrop-blur px-2.5 py-1.5 rounded-md hover:bg-white/40 shadow-lg">管理📦</a>
            </div>
        </div>
        <div class="tag-row">
            <div class="tag-scroll" id="categoryBar"></div>
            <button onclick="AppActions.toggleDrawer()" class="p-1.5 bg-white/20 rounded-lg shadow-md">⊞</button>
        </div>
    </div>

    <div class="video-feed" id="videoFeed"></div>

    <script>
        /* ==========================================================================
           1. 全局状态容器 (Centralized State)
           ========================================================================== */
        const AppState = {
            data: [],               // 存储视频列表数据
            filter: 'all',          // 主列表状态: all | unplayed | disliked
            tag: '全部',            // 激活的分类标签
            page: 1,                // 当前加载页码
            hasMore: true,          // 是否还有下一页
            isLoading: false,       // 避免重复请求的锁
            currentIndex: 0,        // 当前焦点视频索引
            isFirstLoad: true,      // 记录是否为初次打开，用于触发随机排序
            observer: null,         // 交叉观察器实例
            DOMFeed: document.getElementById('videoFeed')
        };

        /* ==========================================================================
           2. 数据同步与动作上报引擎 (Sync Engine)
           ========================================================================== */
        const SyncEngine = {
            init: () => window.addEventListener('online', SyncEngine.flush),
            
            flush: async () => {
                if (!navigator.onLine) return;
                let queue = JSON.parse(localStorage.getItem('videoActionsQueue') || '[]');
                if (queue.length === 0) return;
                try {
                    const res = await fetch('/api/video/sync', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(queue) });
                    if (res.ok) localStorage.setItem('videoActionsQueue', '[]');
                } catch (e) { console.error('同步失败', e); }
            },

            record: (filename, action) => {
                let queue = JSON.parse(localStorage.getItem('videoActionsQueue') || '[]');
                queue.push({ filename, action, timestamp: Date.now() });
                localStorage.setItem('videoActionsQueue', JSON.stringify(queue));
                SyncEngine.flush();
            }
        };

        /* ==========================================================================
           3. 核心业务逻辑控制器 (App Actions)
           ========================================================================== */
        const AppActions = {
            // 解析文件名内的 #标签
            parseTags: (filename) => {
                const matches = filename.match(/#([^#\s.]+)/g);
                return matches ? matches.map(m => m.substring(1)) : [];
            },

            // 切换顶部过滤器
            switchFilter: (type) => {
                AppState.filter = type;
                document.getElementById('nav-all').classList.toggle('active', type === 'all');
                document.getElementById('nav-unplayed').classList.toggle('active', type === 'unplayed');
                if (type === 'disliked') {
                    document.getElementById('nav-all').classList.remove('active');
                    document.getElementById('nav-unplayed').classList.remove('active');
                }
                AppState.tag = '全部';
                DataLoader.fetchNextPage(true);
            },

            // 切换具体分类
            setTag: (tag) => {
                AppState.tag = tag;
                DataLoader.fetchNextPage(true);
            },

            toggleDrawer: () => document.getElementById('drawer').classList.toggle('open'),

            // 卡片交互动作
            toggleLike: (btn, encodedName) => {
                const isLiked = btn.classList.toggle('liked');
                btn.querySelector('.icon-circle').innerText = isLiked ? '❤️' : '🤍';
                SyncEngine.record(decodeURIComponent(encodedName), isLiked ? 'like' : 'unlike');
            },

            deleteCard: (btn, encodedName, index) => {
                SyncEngine.record(decodeURIComponent(encodedName), AppState.filter === 'disliked' ? 'undelete' : 'delete');
                const targetCard = document.getElementById(`card-${index}`);
                targetCard.classList.add(AppState.filter === 'disliked' ? 'recover-anim' : 'disliked-anim');
                
                setTimeout(() => {
                    AppState.data.splice(index, 1);
                    targetCard.remove();
                    // 重建索引映射
                    document.querySelectorAll('.video-card').forEach((c, i) => {
                        c.id = `card-${i}`;
                        c.dataset.index = i;
                    });
                    if (AppState.data.length < 3 && AppState.hasMore) DataLoader.fetchNextPage(false);
                }, 400);
            }
        };

  /* ==========================================================================
           4. 数据加载与生命周期模块 (Data Loader)
           ========================================================================== */
        const DataLoader = {
            bootstrap: async () => {
                SyncEngine.init();
                fetch('/api/video/scan', { method: 'POST' }).catch(()=>{});
                await DataLoader.fetchNextPage(true);
            },

            fetchNextPage: async (reset = false) => {
                if (AppState.isLoading || (!AppState.hasMore && !reset)) return;
                AppState.isLoading = true;

                if (reset) {
                    AppState.page = 1;
                    AppState.data = [];
                    AppState.currentIndex = 0;
                    AppState.DOMFeed.innerHTML = '';
                }

                try {
                    // 核心修改：追加 &need_tags=1/0，只有在 reset (第一页/换标签) 时才让后端算 Tag
                    const needTagsParam = reset ? '&need_tags=1' : '&need_tags=0';
                    let reqUrl = `/api/video/list?filter=${AppState.filter}&tag=${encodeURIComponent(AppState.tag)}&page=${AppState.page}&limit=5${needTagsParam}`;
                    
                    let res = await fetch(reqUrl);
                    let data = await res.json();

                    if (reset && AppState.isFirstLoad && AppState.filter === 'all' && AppState.tag === '全部' && data.total > 5) {
                        AppState.isFirstLoad = false;
                        const maxPage = Math.ceil(data.total / 10);
                        AppState.page = Math.floor(Math.random() * maxPage) + 1; 
                        
                        if (AppState.page > 1) {
                            // 由于此时依然是重置后的初始化，也带上 need_tags=1
                            reqUrl = `/api/video/list?filter=${AppState.filter}&tag=${encodeURIComponent(AppState.tag)}&page=${AppState.page}&limit=10&need_tags=1`;
                            res = await fetch(reqUrl);
                            data = await res.json();
                        }
                    } else if (reset) {
                        AppState.isFirstLoad = false;
                    }

                    // 只有 reset 且 data.tags_count 不为空时才重绘侧边栏，节省 DOM 性能
                    if (reset && Object.keys(data.tags_count).length > 0) {
                        UIRenderer.renderCategoryPanels(data.tags_count, data.total);
                    }

                    const newItems = data.items;
                    const startIndex = AppState.data.length;
                    AppState.data = [...AppState.data, ...newItems];
                    AppState.hasMore = data.has_more;
                    AppState.page++;

                    newItems.forEach((v, idx) => UIRenderer.buildCardDOM(v, startIndex + idx));

                    if (reset && AppState.data.length === 0) {
                        AppState.DOMFeed.innerHTML = `<div class="h-full w-full flex items-center justify-center text-gray-500 font-bold">${AppState.filter === 'disliked' ? '回收站空' : '无匹配视频'}</div>`;
                    }

                    InteractionEngine.initIntersectionObserver();
                } catch (e) {
                    const cache = await caches.open('video-cache-v1');
                    const keys = await cache.keys();
                    let offlineData = keys.map(req => {
                        const fname = decodeURIComponent(req.url.split('/').pop());
                        const matches = fname.match(/#([^#\s.]+)/g);
                        const tags = matches ? matches.map(m => m.substring(1)) : [];
                        return { filename: fname, url: req.url, category: '未分类', ai_tags: [], filename_tags: tags, mergedTags: tags, is_liked: false };
                    });
                    
                    if(AppState.tag !== '全部') offlineData = offlineData.filter(v => v.category === AppState.tag || v.mergedTags.includes(AppState.tag));
                    const start = (AppState.page - 1) * 10;
                    const sliced = offlineData.slice(start, start + 10);
                    
                    if (reset) UIRenderer.renderCategoryPanels({'缓存': offlineData.length}, offlineData.length);
                    AppState.data = [...AppState.data, ...sliced];
                    AppState.hasMore = (start + 10) < offlineData.length;
                    AppState.page++;
                    
                    sliced.forEach((v, idx) => UIRenderer.buildCardDOM(v, start + idx));
                    InteractionEngine.initIntersectionObserver();
                } finally {
                    AppState.isLoading = false;
                }
            }
        };
        /* ==========================================================================
           5. 界面渲染引擎 (UI Renderer)
           ========================================================================== */
        const UIRenderer = {
            renderCategoryPanels: (countsMap, total) => {
                const sorted = Object.entries(countsMap || {}).sort((a, b) => b[1] - a[1]);
                let topTags = sorted.slice(0, 10).map(item => item[0]);
                
                if (AppState.tag !== '全部' && !topTags.includes(AppState.tag)) {
                    topTags.unshift(AppState.tag);
                    if(topTags.length > 10) topTags.pop();
                }

                const bar = document.getElementById('categoryBar');
                bar.innerHTML = `<div class="cat-pill ${AppState.tag === '全部' ? 'active' : ''}" onclick="AppActions.setTag('全部')">全部</div>` + 
                    topTags.map(tag => `<div class="cat-pill ${AppState.tag === tag ? 'active' : ''}" onclick="AppActions.setTag('${tag}')">${tag}</div>`).join('');

                const grid = document.getElementById('drawerGrid');
                grid.innerHTML = `
                    <div class="grid-item border border-red-500/30" onclick="AppActions.switchFilter('disliked'); AppActions.toggleDrawer()">
                        <span class="text-sm font-bold text-red-400">已不喜欢 🗑️</span>
                        <span class="text-[10px] opacity-50 text-red-200">误触可找回</span>
                    </div>
                    <div class="grid-item ${AppState.tag === '全部' && AppState.filter !== 'disliked' ? 'active' : ''}" onclick="AppActions.switchFilter('all'); AppActions.setTag('全部'); AppActions.toggleDrawer()">
                        <span class="text-sm font-bold">全部视频</span>
                        <span class="text-[10px] opacity-50">${total || 0} 视频</span>
                    </div>` + 
                    sorted.map(([tag, count]) => `
                    <div class="grid-item ${AppState.tag === tag && AppState.filter !== 'disliked' ? 'active' : ''}" onclick="AppActions.switchFilter('all'); AppActions.setTag('${tag}'); AppActions.toggleDrawer()">
                        <span class="text-sm font-bold">${tag}</span><span class="text-[10px] opacity-50">${count} 视频</span>
                    </div>`).join('');
            },

            buildCardDOM: (v, index) => {
                if (document.getElementById(`card-${index}`)) return;
                
                const card = document.createElement('div');
                card.className = 'video-card paused';
                card.id = `card-${index}`;
                card.dataset.index = index;
                
                const jsSafeName = encodeURIComponent(v.filename);
                const isDislikeMode = AppState.filter === 'disliked';
                
                const deleteBtnHtml = isDislikeMode
                    ? `<button class="action-btn text-green-400" onclick="AppActions.deleteCard(this, '${jsSafeName}', ${index})"><div class="icon-circle">♻️</div><span class="text-[10px] font-bold shadow-black">恢复</span></button>`
                    : `<button class="action-btn btn-dislike" onclick="AppActions.deleteCard(this, '${jsSafeName}', ${index})"><div class="icon-circle">💔</div><span class="text-[10px] font-bold shadow-black">不喜欢</span></button>`;

                let cleanTitle = v.filename.replace(/\.(mp4|mov)$/i, '').replace(/#([^#\s.]+)/g, '').trim();
                
                let aiTagsHtml = '';
                if (v.category && v.category !== '未分类') aiTagsHtml += `<span class="ai-tag px-2 py-0.5 rounded text-[11px] cursor-pointer" onclick="event.stopPropagation(); AppActions.setTag('${v.category}')">#${v.category}</span>`;
                (v.ai_tags || []).forEach(t => aiTagsHtml += `<span class="ai-tag px-2 py-0.5 rounded text-[11px] cursor-pointer" onclick="event.stopPropagation(); AppActions.setTag('${t}')">#${t}</span>`);

                let fnTagsHtml = '';
                (v.filename_tags || []).forEach(t => fnTagsHtml += `<span class="file-tag px-2 py-0.5 rounded text-[10px] cursor-pointer" onclick="event.stopPropagation(); AppActions.setTag('${t}')"><small class='opacity-50'>[F]</small> ${t}</span>`);

                card.innerHTML = `
                    <div class="blur-bg" style="background-image: url('${v.url}')"></div>
                    <video src="${v.url}" class="video-player" loop playsinline preload="metadata"></video>
                    
                    <div class="click-area" id="area-${index}"></div>
                    <div class="play-icon"><svg class="w-20 h-20 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
                    <div class="seek-toast" id="toast-${index}"></div>

                    <div class="action-sidebar">
                        <button class="action-btn ${v.is_liked ? 'liked' : ''}" onclick="AppActions.toggleLike(this, '${jsSafeName}')">
                            <div class="icon-circle">${v.is_liked ? '❤️' : '🤍'}</div>
                            <span class="text-[10px] font-bold shadow-black">喜欢</span>
                        </button>
                        ${deleteBtnHtml}
                    </div>

                    <div class="info-bottom pointer-events-auto">
                        <h2 class="text-[15px] font-bold mb-3 line-clamp-2 drop-shadow-md">${cleanTitle}</h2>
                        ${aiTagsHtml ? `<div class="tag-group mb-2">${aiTagsHtml}</div>` : ''}
                        ${fnTagsHtml ? `<div class="tag-group pt-2 border-t border-white/10">${fnTagsHtml}</div>` : ''}
                    </div>
                    <div class="progress-container"><div class="progress-bar" id="prog-${index}"></div></div>
                `;
                AppState.DOMFeed.appendChild(card);
                
                // 绑定进度条事件
                const video = card.querySelector('video');
                const prog = card.querySelector(`#prog-${index}`);
                video.addEventListener('timeupdate', () => {
                    if(video.duration) prog.style.width = `${(video.currentTime / video.duration) * 100}%`;
                });
                
                // 挂载手势交互
                InteractionEngine.bindGestures(card.querySelector(`#area-${index}`), video, card.querySelector(`#toast-${index}`));
                if (AppState.observer) AppState.observer.observe(card);
            }
        };

        /* ==========================================================================
           6. 物理交互与观察引擎 (Interaction Engine)
           ========================================================================== */
        const InteractionEngine = {
            // 初始化视频可见性检测，负责自动播放与暂停
            initIntersectionObserver: () => {
                if (AppState.observer) AppState.observer.disconnect();
                
                AppState.observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const card = entry.target;
                        const video = card.querySelector('video');
                        const idx = parseInt(card.dataset.index);

                        if (entry.isIntersecting) {
                            AppState.currentIndex = idx;
                            video.play().then(() => {
                                card.classList.remove('paused');
                                if(AppState.filter !== 'disliked') SyncEngine.record(decodeURIComponent(video.src.split('/').pop()), 'play');
                            }).catch(() => card.classList.add('paused'));
                            
                            // 触底加载探测
                            if (idx >= AppState.data.length - 3 && AppState.hasMore) {
                                DataLoader.fetchNextPage(false);
                            }
                        } else {
                            video.pause();
                            video.currentTime = 0;
                            card.classList.add('paused');
                        }
                    });
                }, { root: AppState.DOMFeed, threshold: 0.6 });

                document.querySelectorAll('.video-card').forEach(card => AppState.observer.observe(card));
            },

            // 绑定拖拽进度条与点击暂停手势
            bindGestures: (touchArea, video, toastEl) => {
                let startX = 0, startY = 0, isSeeking = false, toastTimer, justSeeked = false; 

                const handleStart = (x, y) => { startX = x; startY = y; isSeeking = false; };
                const handleMove = (x, y, e) => {
                    if(!startX || !startY) return;
                    const diffX = x - startX, diffY = y - startY;
                    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 15) {
                        e.preventDefault(); isSeeking = true;
                    }
                };
                const handleEnd = (x) => {
                    if (!isSeeking || !video.duration) { startX = 0; startY = 0; return; }
                    const diffX = x - startX;
                    if (Math.abs(diffX) > 40) {
                        const step = video.duration * 0.2; 
                        video.currentTime = Math.max(0, Math.min(video.currentTime + (diffX > 0 ? step : -step), video.duration));
                        
                        toastEl.innerText = diffX > 0 ? '前进 20%' : '后退 20%';
                        toastEl.style.opacity = 1;
                        clearTimeout(toastTimer);
                        toastTimer = setTimeout(() => toastEl.style.opacity = 0, 500);
                        
                        justSeeked = true;
                        setTimeout(() => { justSeeked = false; }, 200); 
                    }
                    startX = 0; startY = 0; isSeeking = false;
                };

                touchArea.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
                touchArea.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches[0].clientY, e), {passive: false});
                touchArea.addEventListener('touchend', e => handleEnd(e.changedTouches[0].clientX));

                let isMouseDown = false;
                touchArea.addEventListener('mousedown', e => { isMouseDown = true; handleStart(e.clientX, e.clientY); });
                touchArea.addEventListener('mousemove', e => { if(isMouseDown) handleMove(e.clientX, e.clientY, e); });
                const mouseEnd = e => { if(isMouseDown) { isMouseDown = false; handleEnd(e.clientX); } };
                touchArea.addEventListener('mouseup', mouseEnd);
                touchArea.addEventListener('mouseleave', mouseEnd);

                touchArea.addEventListener('click', (e) => {
                    if (justSeeked) { e.preventDefault(); return; } 
                    const card = touchArea.closest('.video-card');
                    video.paused ? (video.play(), card.classList.remove('paused')) : (video.pause(), card.classList.add('paused'));
                });
            },
            
            // 绑定全局硬控 (滚轮锁定与键盘映射)
            setupGlobalListeners: () => {
                let wheelLock = false;
                AppState.DOMFeed.addEventListener('wheel', (e) => {
                    if (window.matchMedia("(hover: none)").matches) return; 
                    e.preventDefault(); 
                    if (wheelLock) return;
                    wheelLock = true;

                    const targetIndex = Math.max(0, Math.min(e.deltaY > 0 ? AppState.currentIndex + 1 : AppState.currentIndex - 1, AppState.data.length - 1));
                    const targetCard = document.getElementById(`card-${targetIndex}`);
                    if (targetCard) AppState.DOMFeed.scrollTo({ top: targetCard.offsetTop, behavior: 'smooth' });
                    
                    setTimeout(() => { wheelLock = false; }, 500); 
                }, { passive: false });

                window.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown'].includes(e.key)) {
                        e.preventDefault(); 
                        const targetIndex = Math.max(0, Math.min(e.key === 'ArrowDown' ? AppState.currentIndex + 1 : AppState.currentIndex - 1, AppState.data.length - 1));
                        const targetCard = document.getElementById(`card-${targetIndex}`);
                        if (targetCard) AppState.DOMFeed.scrollTo({ top: targetCard.offsetTop, behavior: 'smooth' });
                    } else if (e.key === ' ') {
                        e.preventDefault(); 
                        const card = document.getElementById(`card-${AppState.currentIndex}`);
                        if (card) card.querySelector('.click-area').click();
                    } else if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                        const card = document.getElementById(`card-${AppState.currentIndex}`);
                        if (!card) return;
                        const video = card.querySelector('video'), toast = card.querySelector('.seek-toast');
                        if (video && video.duration) {
                            const step = video.duration * 0.2;
                            video.currentTime = Math.max(0, Math.min(video.currentTime + (e.key === 'ArrowRight' ? step : -step), video.duration));
                            toast.innerText = e.key === 'ArrowRight' ? '前进 20%' : '后退 20%';
                            toast.style.opacity = 1; setTimeout(() => toast.style.opacity = 0, 500);
                        }
                    }
                });
            }
        };

        // 启动系统
        InteractionEngine.setupGlobalListeners();
        DataLoader.bootstrap();
    </script>
</body>
</html>
