<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云端幻境 - 短视频</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/videos.css">
</head>
 

<body class="selection:bg-blue-500">

    <div class="drawer" id="drawer">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">全部分类</h2>
            <button onclick="AppActions.toggleDrawer()" class="p-2 bg-white/10 rounded-full">✕</button>
        </div>
        <div class="drawer-grid" id="drawerGrid"></div>
    </div>

    <div class="top-nav">
        <div class="header-row">
            <nav id="mainNav" onclick="event.stopPropagation()">
                <div class="nav-indicator" id="navIndicator"></div>
                
                <div id="nav-all" class="nav-item active" onclick="AppActions.switchFilter('all')">
                    <span class="icon">🏠</span><span class="nav-text">主页</span>
                </div>
                <div id="nav-similar" class="nav-item hidden" onclick="AppActions.switchFilter('similar')">
                    <span class="icon">📝</span><span class="nav-text">文似</span>
                </div>
                <div id="nav-similar-vision" class="nav-item hidden" onclick="AppActions.switchFilter('similar_vision')">
                    <span class="icon">👁️</span><span class="nav-text">图似</span>
                </div>
                <div id="nav-liked" class="nav-item" onclick="AppActions.switchFilter('liked')">
                    <span class="icon">❤️</span><span class="nav-text">喜欢</span>
                </div>
            </nav>

            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="输入标签名..."
                    onkeypress="AppActions.handleSearch(event)">
                <span id="searchCount" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] opacity-60 pointer-events-none bg-black/40 px-1.5 py-0.5 rounded">0</span>
            </div>

            <div class="pool-select-wrapper">
                <select id="poolSelect" onchange="AppActions.switchPool(this.value)">
                    <option value="mixed" class="bg-gray-900">🌌 混合</option>
                    <option value="default" class="bg-gray-900">📱 默认</option>
                    <option value="new" class="bg-gray-900">✨ 新增</option>
                    <option value="new2" class="bg-gray-900">✨ 2新增</option>
                </select>
            </div>
        </div>

        <div class="tag-row">
            <div class="tag-scroll" id="categoryBar"></div>
            <button onclick="AppActions.toggleDrawer()" class="p-2 bg-white/20 rounded-xl shadow-md border border-white/10 flex-shrink-0">⊞</button>
        </div>
    </div>

    <div class="video-feed" id="videoFeed"></div>

    <script src="/static/videos.js"></script>
</body>
 
</html>
