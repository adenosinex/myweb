<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 文档管理</title>
    <style>
        :root {
            --bg-main: #f4f7f9;
            --bg-side: #ffffff;
            --bg-editor: #f8fafc;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff6ff;
            --danger: #ef4444;
            --danger-hover: #fee2e2;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background: var(--bg-main);
            color: var(--text-main);
        }

        /* 侧边栏 */
        .sidebar { 
            width: 280px; 
            background: var(--bg-side); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .btn-new { 
            width: 100%; padding: 10px; cursor: pointer; background: var(--text-main); color: #fff; 
            border: none; border-radius: 6px; font-weight: 500; font-size: 14px; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-new:hover { background: #334155; transform: translateY(-1px); }

        /* 文档列表 */
        .doc-list { list-style: none; padding: 12px; margin: 0; overflow-y: auto; flex: 1; }
        .doc-item { 
            padding: 10px 14px; margin-bottom: 4px; border-radius: 6px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; 
            transition: all 0.2s; border-left: 3px solid transparent; color: var(--text-sub);
        }
        .doc-item:hover { background: #f8fafc; transform: translateX(4px); border-left-color: #cbd5e1; }
        .doc-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; border-left-color: var(--accent); transform: translateX(4px); }
        
        .doc-info { display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .doc-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        
        .delete-btn { 
            color: var(--danger); background: none; border: none; cursor: pointer; 
            padding: 4px; border-radius: 4px; opacity: 0; transition: 0.2s; display: flex;
        }
        .doc-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: var(--danger-hover); }

        /* 主区域 */
        .main { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        
        /* 工具栏 */
        .toolbar { 
            padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; 
            gap: 12px; align-items: center; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); z-index: 5;
        }
        .filename-wrapper { flex: 1; display: flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #fff; transition: border-color 0.2s;}
        .filename-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
        .filename-prefix { padding: 8px 12px; background: #f8fafc; color: var(--text-sub); border-right: 1px solid var(--border); font-size: 14px; user-select: none; }
        .toolbar input { flex: 1; padding: 8px 12px; border: none; outline: none; font-size: 14px; color: var(--text-main); }
        
        .btn { padding: 8px 16px; cursor: pointer; border: 1px solid var(--border); background: #fff; border-radius: 6px; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .btn:hover { background: #f8fafc; }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }

        /* 编辑与预览区 */
        .editor-container { flex: 1; display: flex; overflow: hidden; }
        .editor, .preview { flex: 1; padding: 24px 40px; overflow-y: auto; height: 100%; box-sizing: border-box; }
        
        .editor { 
            border: none; border-right: 1px solid var(--border); outline: none; resize: none; 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; 
            font-size: 15px; line-height: 1.6; background: var(--bg-editor); color: #334155; 
        }
        
        /* 预览区 Markdown 样式 (对齐阅读页) */
        .preview { background: #fff; line-height: 1.7; font-size: 16px; }
        .preview h1 { font-size: 2.2em; margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .preview table { border-collapse: collapse; width: 100%; margin: 24px 0; border-radius: 8px; overflow: hidden; box-shadow: 0 0 0 1px var(--border); }
        .preview th, .preview td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .preview th { background: #f8fafc; }
        .preview pre { background: #0f172a; color: #f8fafc; padding: 20px; border-radius: 12px; overflow-x: auto; margin: 24px 0; }
        .preview code { font-family: ui-monospace, monospace; }
        
        /* 隐藏状态与动效 */
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 空白提示 */
        .empty-state {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-sub); background: var(--bg-main); z-index: 10;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <button class="btn-new" onclick="createNew()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新建文档
            </button>
        </div>
        <ul class="doc-list" id="docList"></ul>
    </div>

    <div class="main">
        <div class="empty-state" id="emptyState">
            <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.2;">✍️</div>
            <div>选择左侧文档或新建开始编辑</div>
        </div>

        <div class="toolbar hidden" id="toolbar">
            <div class="filename-wrapper">
                <span class="filename-prefix">文件名</span>
                <input type="text" id="docTitle" placeholder="输入英文/拼音作为物理文件名 (无需 .md)">
            </div>
            <input type="hidden" id="oldDocTitle">
            <button class="btn btn-primary" onclick="saveDoc()">保存修改</button>
            <button class="btn" onclick="togglePreview()" id="previewBtn">预览</button>
        </div>
        <div class="editor-container hidden" id="editorContainer">
            <textarea class="editor" id="mdEditor" placeholder="# 在这里输入 Markdown 标题...&#10;&#10;输入正文内容..."></textarea>
            <div class="preview hidden" id="mdPreview"></div>
        </div>
    </div>

<script>
        let isPreviewMode = false;
        let currentActiveDoc = null;

        document.addEventListener('DOMContentLoaded', loadList);

        const deleteIcon = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

        async function loadList() {
            const res = await fetch('/api/docs/list');
            const data = await res.json();
            const listEl = document.getElementById('docList');
            listEl.innerHTML = '';
            
            data.docs.forEach(doc => {
                const li = document.createElement('li');
                li.className = `doc-item ${doc === currentActiveDoc ? 'active' : ''}`;
                li.id = `nav-${doc}`;
                li.innerHTML = `
                    <div class="doc-info" onclick="loadDoc('${doc}')" title="文件名: ${doc}">
                        <span style="opacity: 0.5;">📄</span>
                        <span class="doc-name">${doc}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteDoc('${doc}', event)" title="删除">${deleteIcon}</button>
                `;
                listEl.appendChild(li);
            });
        }

        function setActiveItem(name) {
            currentActiveDoc = name;
            document.querySelectorAll('.doc-item').forEach(el => el.classList.remove('active'));
            if (name) {
                const activeEl = document.getElementById(`nav-${name}`);
                if (activeEl) activeEl.classList.add('active');
            }
        }

        async function loadDoc(name) {
            const res = await fetch(`/api/docs/raw/${encodeURIComponent(name)}`);
            if (!res.ok) return alert('读取失败');
            const data = await res.json();
            
            document.getElementById('docTitle').value = data.title;
            document.getElementById('oldDocTitle').value = data.title;
            document.getElementById('mdEditor').value = data.content;
            
            setActiveItem(name);
            showEditorUI();
            if(isPreviewMode) refreshPreview();
        }

        function createNew() {
            document.getElementById('docTitle').value = '';
            document.getElementById('oldDocTitle').value = '';
            document.getElementById('mdEditor').value = '';
            
            setActiveItem(null);
            showEditorUI();
            if(isPreviewMode) togglePreview(); 
            document.getElementById('mdEditor').focus();
        }

        async function saveDoc() {
            let name = document.getElementById('docTitle').value.trim();
            const old_name = document.getElementById('oldDocTitle').value.trim();
            const content = document.getElementById('mdEditor').value;

            if (!name) {
                const match = content.match(/^(?:#+\s*)?([^\n]+)/);
                if (match && match[1]) {
                    name = match[1].trim().replace(/[\\/:*?"<>|]/g, '').substring(0, 50);
                    document.getElementById('docTitle').value = name;
                }
            }

            if (!name) return alert('无法自动提取到有效文件名，请手动输入');

            const res = await fetch('/api/docs/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, old_name, content })
            });

            if (res.ok) {
                document.getElementById('oldDocTitle').value = name;
                currentActiveDoc = name; 
                await loadList();
                
                const btn = document.querySelector('.btn-primary');
                const originText = btn.innerText;
                btn.innerText = '✅ 已保存';
                btn.style.backgroundColor = '#10b981';
                btn.style.borderColor = '#10b981';
                setTimeout(() => {
                    btn.innerText = originText;
                    btn.style.backgroundColor = '';
                    btn.style.borderColor = '';
                }, 1500);
                
                if (isPreviewMode) refreshPreview();
            } else {
                const err = await res.json();
                alert('保存失败: ' + err.error);
            }
        }

        async function deleteDoc(name, event) {
            event.stopPropagation();
            if (!confirm(`确定要删除文档 "${name}" 吗？此操作不可恢复。`)) return;

            const res = await fetch(`/api/docs/delete/${encodeURIComponent(name)}`, { method: 'DELETE' });
            if (res.ok) {
                if (document.getElementById('oldDocTitle').value === name) {
                    hideEditorUI();
                }
                loadList();
            } else {
                alert('删除失败');
            }
        }

        async function togglePreview() {
            isPreviewMode = !isPreviewMode;
            const editor = document.getElementById('mdEditor');
            const preview = document.getElementById('mdPreview');
            const btn = document.getElementById('previewBtn');

            if (isPreviewMode) {
                editor.classList.add('hidden');
                preview.classList.remove('hidden');
                preview.classList.add('fade-in');
                btn.innerText = '关闭预览';
                btn.classList.add('btn-primary');
                await refreshPreview();
            } else {
                editor.classList.remove('hidden');
                preview.classList.add('hidden');
                preview.classList.remove('fade-in');
                btn.innerText = '预览';
                btn.classList.remove('btn-primary');
            }
        }

        async function refreshPreview() {
            const name = document.getElementById('oldDocTitle').value;
            const previewEl = document.getElementById('mdPreview');
            
            if (name) {
                const res = await fetch(`/api/docs/content/${encodeURIComponent(name)}`);
                if (res.ok) {
                    const data = await res.json();
                    previewEl.innerHTML = data.html;
                    return;
                }
            }
            previewEl.innerHTML = '<div style="color:var(--text-sub); padding-top: 20px;">* 文档尚未保存至服务器，当前无法预览系统变量渲染效果。<br>请先点击“保存修改”。</div>';
        }

        function showEditorUI() {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('toolbar').classList.remove('hidden');
            document.getElementById('editorContainer').classList.remove('hidden');
            document.getElementById('editorContainer').classList.add('fade-in');
        }

        function hideEditorUI() {
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('toolbar').classList.add('hidden');
            document.getElementById('editorContainer').classList.add('hidden');
            currentActiveDoc = null;
        }

        // 注册全局快捷键
        document.addEventListener('keydown', function(e) {
            // 判断是否按下了 Ctrl (Windows/Linux) 或 Cmd (Mac)
            const isModifierPressed = e.ctrlKey || e.metaKey;
            
            // 确保编辑界面处于打开状态才触发
            const isEditorActive = !document.getElementById('editorContainer').classList.contains('hidden');

            if (isModifierPressed && isEditorActive) {
                const key = e.key.toLowerCase();
                
                // Ctrl + S: 保存文档
                if (key === 's') {
                    e.preventDefault(); // 拦截默认保存网页行为
                    saveDoc();
                }
                
                // Ctrl + P: 切换预览
                if (key === 'p') {
                    e.preventDefault(); // 拦截默认打印网页行为
                    togglePreview();
                }
            }
        });
    </script>
</body>
</html>
