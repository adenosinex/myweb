<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阅读器</title>
    <script>tailwind = { config: { } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4f4f5; --text: #27272a; --panel: rgba(255,255,255,0.9); }
        .dark-mode { --bg: #121214; --text: #d4d4d8; --panel: rgba(24,24,27,0.9); }
        body { background-color: var(--bg); color: var(--text); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; transition: background 0.3s; }
        
        .reader-content { font-size: 20px; line-height: 1.8; letter-spacing: 0.5px; text-align: justify; white-space: pre-wrap; word-break: break-all; }
        .drawer { transform: translateX(100%); transition: transform 0.3s ease; }
        .drawer.open { transform: translateX(0); }
        .glass { backdrop-filter: blur(10px); background: var(--panel); border-bottom: 1px solid rgba(128,128,128,0.2); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-14 glass flex items-center justify-between px-4 shrink-0 shadow-sm z-20">
        <div class="flex items-center gap-3">
            <a href="javascript:history.back()" class="p-2 -ml-2 rounded-full hover:bg-zinc-500/20 transition active:scale-90">⬅️</a>
            <h1 id="chapterTitle" class="font-bold text-sm truncate max-w-[150px] sm:max-w-xs text-zinc-500">加载中...</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-zinc-500/20" title="切换主题">🌓</button>
            <button onclick="toggleDrawer()" class="p-2 rounded-full hover:bg-zinc-500/20 text-xl" title="查看目录">📑</button>
        </div>
    </header>

    <div id="drawer" class="drawer fixed inset-y-0 right-0 w-72 bg-white dark:bg-zinc-900 shadow-2xl z-30 flex flex-col border-l border-zinc-200 dark:border-zinc-800">
        <div class="p-4 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-zinc-800 dark:text-zinc-200">目录</span>
            <button onclick="toggleDrawer()" class="text-2xl opacity-50 hover:opacity-100">&times;</button>
        </div>
        <div id="tocList" class="flex-1 overflow-y-auto divide-y divide-zinc-100 dark:divide-zinc-800">
            <div class="p-10 text-center text-zinc-400 text-sm animate-pulse">正在同步章节索引...</div>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto p-4 sm:p-8 scroll-smooth" id="scrollContainer">
        <div class="max-w-2xl mx-auto">
            <h2 id="innerTitle" class="text-2xl font-bold mb-10 mt-4 leading-tight"></h2>
            <div id="readerContent" class="reader-content min-h-[70vh]">
                <div class="mt-20 text-center flex flex-col items-center gap-4">
                    <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-zinc-400 text-sm animate-pulse tracking-widest">正在从云端节点提取章节数据...</p>
                </div>
            </div>
            
            <div id="pagination" class="mt-16 mb-24 flex justify-between items-center hidden pt-8 border-t border-zinc-300 dark:border-zinc-700">
                <button onclick="changeChapter(-1)" class="px-8 py-3 bg-zinc-200 dark:bg-zinc-800 rounded-2xl font-bold active:scale-95 transition">上一章</button>
                <button onclick="changeChapter(1)" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-bold active:scale-95 transition shadow-lg shadow-blue-500/30">下一章</button>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelName = urlParams.get('novel');
        let currentChIdx = parseInt(urlParams.get('ch')) || 0;
        let toc = []; // 仅存储标题目录

        if(!novelName) window.location.href = '/';

        const toggleTheme = () => document.body.classList.toggle('dark-mode');
        const toggleDrawer = () => document.getElementById('drawer').classList.toggle('open');

        async function init() {
            try {
                // 1. 🌟 获取轻量化目录
                const tocRes = await fetch(`/api/novel/toc/${encodeURIComponent(novelName)}`);
                const tocData = await tocRes.json();
                if(tocData.error) throw new Error(tocData.error);
                
                toc = tocData.toc;
                renderTOC();
                loadChapter();
            } catch(e) {
                document.getElementById('readerContent').innerHTML = '<div class="text-red-500 text-center mt-20">无法解析目录或权限不足</div>';
            }
        }

        function renderTOC() {
            const listEl = document.getElementById('tocList');
            listEl.innerHTML = toc.map((ch, idx) => `
                <div onclick="jumpTo(${idx})" class="p-4 cursor-pointer text-sm truncate transition ${idx === currentChIdx ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 font-bold' : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800'}">
                    <span class="inline-block w-6 opacity-30 font-mono">${idx + 1}</span> ${ch.title}
                </div>
            `).join('');
        }

        async function loadChapter() {
            // 范围修正
            if (currentChIdx < 0) currentChIdx = 0;
            if (toc.length > 0 && currentChIdx >= toc.length) currentChIdx = toc.length - 1;

            const out = document.getElementById('readerContent');
            const innerTitle = document.getElementById('innerTitle');
            const chapterTitle = document.getElementById('chapterTitle');

            // 显示加载中状态
            out.innerHTML = '<div class="mt-20 text-center animate-pulse text-zinc-400">正在同步数据域内容...</div>';
            innerTitle.innerText = "";
            
            try {
                // 2. 🌟 精准请求单章内容 (POST 或 Cookie 校验)
                const res = await fetch(`/api/novel/chapter/${encodeURIComponent(novelName)}/${currentChIdx}`);
                const data = await res.json();
                
                if(data.error) throw new Error(data.error);

                chapterTitle.innerText = data.title;
                innerTitle.innerText = data.title;
                out.innerText = data.content; // 使用 innerText 防止 HTML 注入，同时保持换行
                
                document.getElementById('pagination').classList.remove('hidden');
                document.getElementById('scrollContainer').scrollTo(0, 0);

                renderTOC(); // 更新目录高亮
                saveProgress();

                // 更改 URL 以便刷新
                window.history.replaceState(null, '', `?novel=${encodeURIComponent(novelName)}&ch=${currentChIdx}`);
            } catch (e) {
                out.innerHTML = `<div class="text-red-500 text-center mt-20">章节提取失败: ${e.message}</div>`;
            }
        }

        function saveProgress() {
            const kvKey = `progress_${btoa(encodeURIComponent(novelName)).slice(0,16)}`;
            fetch(`/api/kv/${kvKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payload: { page: currentChIdx } })
            });
        }

        function changeChapter(delta) { jumpTo(currentChIdx + delta); }

        function jumpTo(idx) {
            if (idx >= 0 && idx < toc.length) {
                currentChIdx = idx;
                document.getElementById('drawer').classList.remove('open');
                loadChapter();
            } else if (idx >= toc.length && toc.length > 0) {
                alert('已经是最后一章了');
            } else if (idx < 0) {
                alert('已经是第一章了');
            }
        }

        // 快捷键支持
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeChapter(-1);
            if (e.key === 'ArrowRight') changeChapter(1);
        });

        init();
    </script>
</body>
</html>
