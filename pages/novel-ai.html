<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说 AI 管理中心 (DEBUG)</title>
    <script>window.tailwind = { config: { theme: { extend: {} } } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #3b82f6; --text-sub: #a1a1aa; }
        html, body { height: 100%; background-color: var(--bg); color: #f4f4f5; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        .markdown-body { white-space: pre-wrap; line-height: 1.8; font-size: 0.95rem; }
        .markdown-body b { color: var(--accent); font-weight: bold; }
        
        /* 进度条样式 */
        .ai-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .ai-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width 0.4s ease; }
        
        /* 实时结果流 */
        .result-container { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; scrollbar-width: none; }
        .result-container::-webkit-scrollbar { display: none; }
        .result-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border-left: 3px solid #8b5cf6; cursor: pointer; transition: 0.2s; animation: slideIn 0.3s ease-out; }
        .result-item:hover { background: rgba(255,255,255,0.08); }
        
        /* Debug 悬浮窗 */
        #debugPanel { position: fixed; bottom: 20px; right: 20px; width: 380px; height: 320px; background: rgba(0,0,0,0.95); border: 1px solid #ef4444; border-radius: 12px; font-family: 'Fira Code', monospace; z-index: 100; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .preview-fade { -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%); mask-image: linear-gradient(to bottom, black 60%, transparent 100%); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="flex flex-col selection:bg-blue-600">

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="font-bold text-lg text-blue-400 flex items-center gap-2">
                📖 Novel AI 引擎 
                <span class="text-[10px] bg-zinc-800 px-2 py-0.5 rounded text-zinc-500 font-mono">Native_Ollama</span>
            </h1>
            <label class="flex items-center gap-2 text-[10px] bg-zinc-900 border border-zinc-800 px-3 py-1 rounded-full cursor-pointer hover:bg-zinc-800 transition">
                <input type="checkbox" id="debugToggle" onchange="toggleDebugMode()" class="w-3 h-3"> 
                <span class="text-zinc-400">调试模式</span>
            </label>
        </div>
        <button onclick="window.close()" class="text-sm bg-zinc-800 px-4 py-1 rounded-lg hover:bg-zinc-700 transition">关闭</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 border-r border-zinc-800 bg-zinc-900/50 p-4 flex flex-col gap-6 overflow-y-auto shrink-0">
            
            <div id="singleNovelPanel" class="hidden space-y-3">
                <h2 class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest border-b border-zinc-800 pb-1" id="targetNovelLabel">当前目标文件</h2>
                <button onclick="runSingleAI()" class="w-full text-left p-3 rounded-xl bg-zinc-800 hover:bg-blue-600 transition border border-zinc-700 group">
                    <div class="font-bold mb-1 text-sm flex items-center gap-2 text-white">🚀 重新分析 <span class="text-[9px] bg-white/20 px-1 rounded opacity-0 group-hover:opacity-100">FORCE</span></div>
                    <div class="text-[10px] text-zinc-400">重新读取首尾文本并生成简介</div>
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="resetTask('single')" class="text-center p-2 rounded-lg bg-red-900/20 hover:bg-red-600 text-red-400 hover:text-white text-[11px] border border-red-800/40 transition">重置数据</button>
                    <button onclick="loadHistory()" class="text-center p-2 rounded-lg bg-zinc-800 hover:bg-teal-600 text-zinc-400 hover:text-white text-[11px] border border-zinc-700 transition">加载快照</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center border-b border-zinc-800 pb-1">
                    <h2 class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest">全库批量管理</h2>
                    <div class="flex gap-3"> 
                        <button onclick="downloadCSV()" class="text-[9px] text-blue-400 hover:underline hover:text-blue-300">下载CSV</button>
                        <button onclick="resetTask('all')" class="text-[9px] text-red-500 hover:underline hover:text-red-400">全部清空</button>
                    </div>
                </div>

                <div class="p-4 bg-zinc-800/50 rounded-2xl border border-zinc-700/50">
                    <div class="flex justify-between items-end text-xs mb-2">
                        <span id="aiProgressText" class="text-blue-400 font-bold tracking-tighter">IDLE</span>
                        <span id="aiStatsText" class="text-zinc-500 font-mono text-[10px]">0s | 0</span>
                    </div>
                    <div class="ai-bar-bg"><div class="ai-bar-fill" id="aiProgressFill"></div></div>
                    <div id="aiLogText" class="text-[10px] text-zinc-500 truncate mb-4 italic">等待指令...</div>
                    
                    <button id="btnAiStart" onclick="controlBatchScan('start')" class="w-full bg-blue-600 hover:bg-blue-500 py-2.5 rounded-xl text-xs font-bold shadow-lg shadow-blue-900/20 transition text-white">▶ 开始全库扫描</button>
                    <button id="btnAiStop" onclick="controlBatchScan('stop')" class="hidden w-full bg-red-600 hover:bg-red-500 py-2.5 rounded-xl text-xs font-bold transition text-white">⏹ 停止扫描</button>
                </div>

                <h2 class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest border-b border-zinc-800 pb-1">实时任务输出</h2>
                <div class="result-container" id="aiResultStream">
                    <div class="text-[10px] text-zinc-600 text-center py-10 border border-dashed border-zinc-800 rounded-xl">无实时任务输出</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto relative bg-zinc-950 flex flex-col gap-6">
            
            <div id="taskPreviewPanel" class="hidden bg-zinc-900/80 border border-zinc-800 rounded-xl p-4 shrink-0 shadow-2xl backdrop-blur">
                <div class="flex justify-between items-center mb-3 border-b border-zinc-800 pb-2">
                    <h3 class="text-blue-400 font-bold text-xs flex items-center gap-2" id="previewTitle">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span>
                        数据投喂中...
                    </h3>
                    <span class="text-[9px] text-zinc-600 font-mono">CONTEXT_PREVIEW</span>
                </div>
                <div class="text-[11px] text-zinc-400 font-mono preview-fade max-h-24 overflow-hidden leading-relaxed" id="previewContent"></div>
            </div>

            <div id="outputArea" class="max-w-3xl mx-auto markdown-body w-full">
                <div id="idleIcon" class="flex flex-col items-center justify-center h-[60vh] text-zinc-800">
                    <div class="text-6xl mb-6 opacity-20">🧠</div>
                    <p class="text-xs tracking-[0.3em] uppercase opacity-40 font-bold">Waiting for Neural Command</p>
                </div>
            </div>
            
            <div id="loader" class="absolute inset-0 bg-zinc-950/80 backdrop-blur-md hidden flex items-center justify-center z-10">
                <div class="flex flex-col items-center gap-6">
                    <div class="w-12 h-12 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
                    <span class="text-blue-400 font-bold tracking-[0.2em] animate-pulse text-sm">RECONSTRUCTING DATA...</span>
                </div>
            </div>
        </main>
    </div>

    <div id="debugPanel">
        <div class="p-3 border-b border-red-900/50 flex justify-between bg-red-950/20 items-center">
            <span class="text-[10px] font-bold text-red-500 tracking-tighter">POLLING_DEBUG_LOG</span>
            <span class="text-[9px] text-zinc-500" id="debugTimer"></span>
        </div>
        <pre id="debugJSON" class="p-3 text-[10px] text-green-500/80 overflow-auto h-[270px]"></pre>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelName = urlParams.get('novel');
        let debugMode = false;
        let lastFingerprint = "";

        if(novelName) {
            document.getElementById('targetNovelLabel').innerText = `Target: ${novelName}`;
            document.getElementById('singleNovelPanel').classList.remove('hidden');
        }

        const parseMarkdown = (t) => t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        const formatTime = (s) => s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;

        function toggleDebugMode() {
            debugMode = document.getElementById('debugToggle').checked;
            document.getElementById('debugPanel').style.display = debugMode ? 'block' : 'none';
        }

        async function resetTask(mode) {
            const body = mode === 'single' ? { novel_name: novelName } : {};
            if(!confirm(`⚠️ 物理重置：将从数据库中永久抹除分析记录。确定继续？`)) return;

            try {
                const res = await fetch('/api/novel/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if(mode === 'single') runSingleAI(); else location.reload();
            } catch (e) { alert("重置失败"); }
        }

        async function runSingleAI() {
            if (!novelName) return;
            document.getElementById('idleIcon')?.classList.add('hidden');
            const previewPanel = document.getElementById('taskPreviewPanel');
            const out = document.getElementById('outputArea');
            const loader = document.getElementById('loader');
            
            out.innerHTML = '';
            previewPanel.classList.remove('hidden');
            loader.classList.remove('hidden');

            try {
                const res = await fetch('/api/novel/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ novel_name: novelName })
                });
                const data = await res.json();
                out.innerHTML = data.status === 'success' ? parseMarkdown(data.result) : `<div class="p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-red-500">${data.error}</div>`;
            } catch (e) { out.innerHTML = `<div class="text-red-500">FAIL: ${e.message}</div>`; } 
            finally { loader.classList.add('hidden'); }
        }

        async function loadHistory(targetName = novelName) {
            if (!targetName) return;
            document.getElementById('taskPreviewPanel')?.classList.add('hidden');
            document.getElementById('idleIcon')?.classList.add('hidden');
            const out = document.getElementById('outputArea');
            out.innerHTML = '<div class="text-zinc-500 animate-pulse text-sm">正在同步快照...</div>';
            
            try {
                const res = await fetch('/api/novel_analysis');
                const list = await res.json();
                const history = list.find(item => item.novel_name === targetName);
                
                if (history) {
                    const timeStr = new Date(history._time).toLocaleString();
                    let htmlContent = parseMarkdown(`<b>[提取记录: ${targetName} - ${timeStr}]</b>\n\n${history.analysis_result}`);
                    
                    if (history.raw_prompt && history.raw_response) {
                        htmlContent += `
                        <div class="mt-8 border-t border-zinc-800 pt-4">
                            <details class="text-xs text-zinc-500 bg-zinc-900/40 rounded-xl border border-zinc-800/50 overflow-hidden">
                                <summary class="p-4 cursor-pointer font-bold hover:text-blue-400 transition bg-zinc-800/20 select-none">🛠️ 查看原始 Debug Payload</summary>
                                <div class="p-4 border-t border-zinc-800/50 space-y-4">
                                    <div><div class="text-blue-500 mb-1">[PROMPT]</div><pre class="bg-black/60 p-4 rounded-lg overflow-x-auto whitespace-pre-wrap border border-zinc-800">${history.raw_prompt.replace(/</g, "&lt;")}</pre></div>
                                    <div><div class="text-green-500 mb-1">[RESPONSE]</div><pre class="bg-black/60 p-4 rounded-lg overflow-x-auto border border-zinc-800 text-green-500/80">${history.raw_response}</pre></div>
                                </div>
                            </details>
                        </div>`;
                    }
                    out.innerHTML = htmlContent;
                }
            } catch (e) { out.innerHTML = "加载失败"; }
        }

        async function controlBatchScan(action) {
            await fetch('/api/novel/scan', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({action}) 
            });
        }

        async function pollStatus() {
            try {
                const res = await fetch(debugMode ? '/api/novel/scan/status/debug' : '/api/novel/scan/status');
                const state = await res.json();
                
                if (debugMode) {
                    document.getElementById('debugJSON').innerText = JSON.stringify(state, null, 2);
                    document.getElementById('debugTimer').innerText = new Date().toLocaleTimeString();
                }

                if (state.recent_results && state.recent_results.length > 0) {
                    const fingerprint = JSON.stringify(state.recent_results);
                    if (fingerprint !== lastFingerprint) {
                        document.getElementById('aiResultStream').innerHTML = state.recent_results.map(item => `
                            <div class="result-item flex flex-col gap-1" onclick="loadHistory('${item.filename.replace(/'/g, "\\'")}')">
                                <span class="text-[10px] text-zinc-300 truncate font-bold">${item.filename}</span>
                                <div class="flex gap-2">
                                    <span class="bg-blue-600/20 text-blue-400 border border-blue-500/20 px-1.5 py-0.5 rounded text-[8px]">${item.category}</span>
                                    ${item.ai_tags.map(t => `<span class="bg-purple-600/20 text-purple-400 border border-purple-500/20 px-1.5 py-0.5 rounded text-[8px]">${t}</span>`).join('')}
                                </div>
                            </div>
                        `).join('');
                        lastFingerprint = fingerprint;
                    }
                }

                if (state.is_running) {
                    document.getElementById('btnAiStart').classList.add('hidden');
                    document.getElementById('btnAiStop').classList.remove('hidden');
                    document.getElementById('aiProgressFill').style.width = `${(state.processed / state.total) * 100}%`;
                    document.getElementById('aiProgressText').innerText = `PROCESSED: ${state.processed}/${state.total}`;
                    document.getElementById('aiStatsText').innerText = `${formatTime(state.total_time_sec)} | OK: ${state.success_count}`;
                    document.getElementById('aiLogText').innerText = `>> ${state.status_msg}`;
                    
                    if(state.current_task) {
                        document.getElementById('taskPreviewPanel').classList.remove('hidden');
                        document.getElementById('previewTitle').innerText = `ANALYZING: ${state.current_task.novel}`;
                        document.getElementById('previewContent').innerText = state.current_task.preview;
                    }
                } else {
                    document.getElementById('btnAiStart').classList.remove('hidden');
                    document.getElementById('btnAiStop').classList.add('hidden');
                    document.getElementById('aiProgressText').innerText = state.processed >= state.total && state.total > 0 ? "FINISHED" : "IDLE";
                }
            } catch (e) {}
        }

        function downloadCSV() {
            const code = urlParams.get('code') || '8888';
            window.location.href = `/api/novel/export/csv?code=${code}`;
        }

        setInterval(pollStatus, 2000);
        pollStatus();
    </script>
</body>
</html>
