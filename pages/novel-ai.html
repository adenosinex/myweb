<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说 AI 管理中心</title>
    <script>tailwind = { config: { } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --accent: #3b82f6; --text-sub: #a1a1aa; }
        body { background-color: var(--bg); color: #f4f4f5; font-family: -apple-system, sans-serif; }
        .markdown-body { white-space: pre-wrap; line-height: 1.8; font-size: 0.95rem; }
        .markdown-body b { color: var(--accent); font-weight: bold; }
        
        .ai-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .ai-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width 0.4s ease; }
        
        .result-container { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; scrollbar-width: none; }
        .result-container::-webkit-scrollbar { display: none; }
        /* 增加了 cursor-pointer 和 hover 效果 */
        .result-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border-left: 3px solid #8b5cf6; animation: slideIn 0.3s ease-out; cursor: pointer; transition: background 0.2s; }
        .result-item:hover { background: rgba(255,255,255,0.08); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .preview-fade { -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); mask-image: linear-gradient(to bottom, black 50%, transparent 100%); }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-blue-600">

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-950 shrink-0">
        <div>
            <h1 class="font-bold text-lg text-blue-400">📖 Novel AI 引擎 <span class="text-xs bg-zinc-800 px-2 py-0.5 rounded text-zinc-400 ml-2">原生推理模式</span></h1>
            <p class="text-xs text-zinc-500" id="targetNovelLabel">全局管理模式</p>
        </div>
        <button onclick="window.close()" class="text-sm bg-zinc-800 px-3 py-1 rounded hover:bg-zinc-700 transition">关闭</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 border-r border-zinc-800 bg-zinc-900/50 p-4 flex flex-col gap-6 overflow-y-auto">
            
            <div id="singleNovelPanel" class="hidden space-y-3">
                <h2 class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-zinc-800 pb-1">当前目标文件操作</h2>
                <button onclick="runSingleAI()" class="w-full text-left p-3 rounded bg-zinc-800 hover:bg-blue-600 transition border border-zinc-700">
                    <div class="font-bold mb-1 text-sm">🚀 重新分析本书</div>
                    <div class="text-[10px] opacity-70">抽取首尾推理剧情与完结状态。</div>
                </button>
                <button onclick="loadHistory()" class="w-full text-left p-3 rounded bg-zinc-800 hover:bg-teal-600 transition border border-zinc-700">
                    <div class="font-bold mb-1 text-sm">☁️ 读取历史快照</div>
                    <div class="text-[10px] opacity-70">从数据库加载已有的分析结果。</div>
                </button>
            </div>

            <div class="space-y-3">
                <h2 class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider border-b border-zinc-800 pb-1">全库静默扫描</h2>
                <div class="p-4 bg-zinc-800/50 rounded-lg border border-zinc-700/50">
                    <div class="flex justify-between text-xs mb-2">
                        <span id="aiProgressText" class="text-blue-400 font-bold">空闲状态</span>
                        <span id="aiStatsText" class="text-zinc-400">耗时: 0s | 成功: 0</span>
                    </div>
                    <div class="ai-bar-bg"><div class="ai-bar-fill" id="aiProgressFill"></div></div>
                    <div id="aiLogText" class="text-[10px] text-zinc-500 truncate mb-3">就绪</div>
                    
                    <div class="flex gap-2">
                        <button id="btnAiStart" onclick="controlBatchScan('start')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-1.5 rounded text-xs font-bold transition">▶ 开始扫描全库</button>
                        <button id="btnAiStop" onclick="controlBatchScan('stop')" class="hidden flex-1 bg-red-600 hover:bg-red-500 text-white py-1.5 rounded text-xs font-bold transition">⏹ 中止</button>
                    </div>
                </div>

                <div class="result-container mt-4" id="aiResultStream">
                    <div class="text-[11px] text-zinc-600 text-center py-4 border border-dashed border-zinc-800 rounded">等待后台任务输出...</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto relative bg-zinc-950 flex flex-col gap-6">
            
            <div id="taskPreviewPanel" class="hidden bg-zinc-900 border border-zinc-800 rounded-lg p-4 shrink-0 shadow-lg">
                <div class="flex justify-between items-center mb-2 border-b border-zinc-800 pb-2">
                    <h3 class="text-blue-400 font-bold text-xs" id="previewTitle">正在向大模型投喂数据...</h3>
                    <span class="flex h-2 w-2 bg-blue-500 rounded-full animate-ping"></span>
                </div>
                <div class="text-[11px] text-zinc-400 font-mono preview-fade max-h-32 overflow-hidden" id="previewContent">
                    数据拉取中...
                </div>
            </div>

            <div id="outputArea" class="max-w-3xl mx-auto markdown-body w-full">
                <div class="flex flex-col items-center justify-center h-[60vh] text-zinc-600" id="idleIcon">
                    <div class="text-5xl mb-4 opacity-30">🧠</div>
                    <p class="text-sm">等待指令下达，将调用本地 Qwen 模型进行推理...</p>
                </div>
            </div>
            
            <div id="loader" class="absolute inset-0 bg-zinc-950/80 backdrop-blur-sm hidden flex items-center justify-center z-10">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-blue-400 font-bold tracking-widest animate-pulse">大模型无脑运算中...</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelName = urlParams.get('novel');
        let lastResultsFingerprint = "";

        if(novelName) {
            document.getElementById('targetNovelLabel').innerText = `目标文件: ${novelName}`;
            document.getElementById('singleNovelPanel').classList.remove('hidden');
        }

        const parseMarkdown = (text) => text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        const formatTime = (sec) => sec < 60 ? `${sec}s` : `${Math.floor(sec/60)}m ${sec%60}s`;

        // ================= 单本操作 =================
        async function runSingleAI() {
            if (!novelName) return;
            
            document.getElementById('idleIcon')?.remove();
            const previewPanel = document.getElementById('taskPreviewPanel');
            const previewContent = document.getElementById('previewContent');
            const previewTitle = document.getElementById('previewTitle');
            const out = document.getElementById('outputArea');
            const loader = document.getElementById('loader');
            
            out.innerHTML = '';
            previewPanel.classList.remove('hidden');
            previewTitle.innerText = `正在向模型注入数据: ${novelName}`;
            previewContent.innerText = "正在从资源节点拉取首尾文本...";
            loader.classList.remove('hidden');

            try {
                const contentRes = await fetch(`/api/novel/content/${encodeURIComponent(novelName)}`);
                const contentData = await contentRes.json();
                const fullText = contentData.content || "";
                if (fullText) {
                    const head = fullText.substring(0, 300);
                    const tail = fullText.length > 3000 ? fullText.substring(fullText.length - 300) : "";
                    previewContent.innerText = head + (tail ? "\n\n... [中间内容省略] ...\n\n" + tail : "");
                }

                const res = await fetch('/api/novel/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ novel_name: novelName })
                });
                const data = await res.json();
                
                out.innerHTML = data.status === 'success' ? parseMarkdown(data.result) : `<div class="text-red-500">错误: ${data.error}</div>`;
            } catch (e) { 
                out.innerHTML = `<div class="text-red-500">请求异常: ${e.message}</div>`; 
            } finally { 
                loader.classList.add('hidden');
                previewTitle.innerText = "数据注入完成";
                previewTitle.classList.replace('text-blue-400', 'text-green-500');
            }
        }

        // 修改：支持传入指定小说名称，默认为 URL 参数里的 novelName
        async function loadHistory(targetName = novelName) {
            if (!targetName) return;
            
            // 如果点击了历史记录，隐藏预览面板以腾出空间
            document.getElementById('taskPreviewPanel').classList.add('hidden');
            document.getElementById('idleIcon')?.remove();

            const out = document.getElementById('outputArea');
            out.innerHTML = '<div class="text-zinc-500">正在查询数据库...</div>';
            try {
                const res = await fetch('/api/novel_analysis');
                const list = await res.json();
                const history = list.find(item => item.novel_name === targetName);
                if (history) {
                    const timeStr = new Date(history._time).toLocaleString();
                    out.innerHTML = parseMarkdown(`<b>[提取记录: ${targetName} - ${timeStr}]</b>\n\n${history.analysis_result}`);
                } else {
                    out.innerHTML = `<div class="text-yellow-500">暂无《${targetName}》的分析记录。</div>`;
                }
            } catch (e) { out.innerHTML = `<div class="text-red-500">读取失败: ${e.message}</div>`; }
        }

        // ================= 批处理控制与状态轮询 =================
        async function controlBatchScan(action) {
            await fetch('/api/novel/scan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action}) });
            pollStatus();
        }

        async function pollStatus() {
            try {
                const res = await fetch('/api/novel/scan/status');
                const state = await res.json();
                
                // 更新结果流 (绑定 onclick 事件)
                if (state.recent_results && state.recent_results.length > 0) {
                    const fingerprint = JSON.stringify(state.recent_results);
                    if (fingerprint !== lastResultsFingerprint) {
                        // 将单引号转义，防止打断 onclick 里的字符串
                        document.getElementById('aiResultStream').innerHTML = state.recent_results.map(item => `
                            <div class="result-item flex flex-col gap-1" onclick="loadHistory('${item.filename.replace(/'/g, "\\'")}')" title="点击查看详情">
                                <span class="text-[11px] text-zinc-300 truncate">${item.filename}</span>
                                <div class="flex gap-2">
                                    <span class="bg-blue-600/30 text-blue-400 border border-blue-500/30 px-1.5 py-0.5 rounded text-[9px]">${item.category}</span>
                                    ${item.ai_tags.map(t => `<span class="bg-purple-600/30 text-purple-400 border border-purple-500/30 px-1.5 py-0.5 rounded text-[9px]">${t}</span>`).join('')}
                                </div>
                            </div>
                        `).join('');
                        lastResultsFingerprint = fingerprint;
                    }
                }

                const previewPanel = document.getElementById('taskPreviewPanel');
                if (state.is_running && state.current_task) {
                    document.getElementById('idleIcon')?.remove();
                    previewPanel.classList.remove('hidden');
                    document.getElementById('previewTitle').innerText = `正在读取并分析: ${state.current_task.novel}`;
                    document.getElementById('previewTitle').classList.replace('text-green-500', 'text-blue-400');
                    document.getElementById('previewContent').innerText = state.current_task.preview;
                } else if (!state.is_running) {
                    if(!novelName && document.getElementById('outputArea').innerHTML.includes('等待指令下达')) {
                        previewPanel.classList.add('hidden');
                    }
                }

                if (state.is_running) {
                    document.getElementById('btnAiStart').classList.add('hidden');
                    document.getElementById('btnAiStop').classList.remove('hidden');
                    document.getElementById('aiProgressFill').style.width = `${state.total > 0 ? (state.processed / state.total) * 100 : 0}%`;
                    document.getElementById('aiProgressText').innerText = `[${state.processed}/${state.total}] 分析中`;
                    document.getElementById('aiStatsText').innerText = `耗时: ${formatTime(state.total_time_sec)} | 成功: ${state.success_count}`;
                    document.getElementById('aiLogText').innerText = `🔄 ${state.status_msg}`;
                } else {
                    document.getElementById('btnAiStart').classList.remove('hidden');
                    document.getElementById('btnAiStop').classList.add('hidden');
                    if (state.total > 0 && state.processed >= state.total) {
                        document.getElementById('aiProgressFill').style.width = '100%';
                        document.getElementById('aiProgressText').innerText = "🎉 扫描完成";
                    } else {
                        document.getElementById('aiProgressText').innerText = "空闲状态";
                    }
                    document.getElementById('aiStatsText').innerText = `耗时: ${formatTime(state.total_time_sec)} | 成功: ${state.success_count}`;
                    document.getElementById('aiLogText').innerText = state.status_msg || "就绪";
                }
            } catch (e) {
                document.getElementById('aiProgressText').innerText = "⚠️ 状态获取失败";
            }
        }

        setInterval(pollStatus, 2000);
        pollStatus();
    </script>
</body>
</html>
