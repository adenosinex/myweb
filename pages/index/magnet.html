<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁力复制器</title>
    <script src="/static/cdn/vue3.5.global.prod.js"></script>
    <script src="/static/cdn/axios1.1.min.js"></script>
    <script src="/static/cdn/tailwindcss3.4.17.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app" class="max-w-sm md:max-w-2xl mx-auto mt-4 md:mt-8 p-4 md:p-6 bg-white rounded-lg shadow">
    <h1 class="text-xl md:text-2xl font-bold mb-4 text-blue-700">磁力复制器</h1>

    <div class="mb-4">
        <label class="block mb-2 font-semibold">输入多条磁力链接（每行一个）</label>
        <textarea v-model="rawInput" rows="6" class="w-full border rounded p-2" placeholder="magnet:?xt=...\nmagnet:?xt=..."></textarea>
    </div>

    <div class="flex gap-2 mb-4">
        <button @click="parseLinks" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">解析链接</button>
        <button @click="reset" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">重置</button>
    </div>

    <div v-if="links.length" class="mb-4">
        <div class="mb-2 font-semibold">总数：${links.length}，当前：${currentIndex + 1}/${links.length}</div>
        <textarea readonly rows="2" :value="currentLink || ''" class="w-full border rounded p-2 mb-2"></textarea>
        <div class="flex gap-2">
            <button @click="prev" :disabled="currentIndex<=0" class="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600 disabled:opacity-50">上一个</button>
            <button @click="nextCopy" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">下一个并复制</button>
            <button @click="nextCopy5" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">下一个并复制x2</button>
            <button @click="copyCurrent" class="px-4 py-2 bg-indigo-500 text-white rounded hover:bg-indigo-600">复制当前</button>
        </div>
    </div>

    <div v-if="message" class="mt-3 text-sm text-gray-700">${message}</div>
    <div v-if="error" class="mt-2 text-red-500">${error}</div>
</div>

<script>
    const { createApp } = Vue;

createApp({
    delimiters: ['${', '}'],
    data() {
        return {
            rawInput: '',
            links: [],
            currentIndex: 0,
            message: '',
            error: ''
        }
    },
    computed: {
        currentLink() {
            return this.links[this.currentIndex] || '';
        }
    },
    mounted() {
        // 页面加载时尝试从 localStorage 恢复状态
        const savedLinks = localStorage.getItem('linkCopier_links');
        const savedIndex = localStorage.getItem('linkCopier_currentIndex');

        if (savedLinks) {
            try {
                this.links = JSON.parse(savedLinks);
                this.currentIndex = savedIndex ? parseInt(savedIndex, 10) : 0;
                // 防止索引越界
                if (this.currentIndex >= this.links.length) {
                    this.currentIndex = this.links.length > 0 ? this.links.length - 1 : 0;
                }
                this.message = `已从缓存恢复 ${this.links.length} 条链接`;
            } catch (e) {
                console.warn('Failed to restore from localStorage', e);
            }
        }
    },
    watch: {
        // 监听 links 和 currentIndex，自动保存
        links: {
            handler(newVal) {
                localStorage.setItem('linkCopier_links', JSON.stringify(newVal));
            },
            deep: true
        },
        currentIndex(newVal) {
            localStorage.setItem('linkCopier_currentIndex', String(newVal));
        }
    },
    methods: {
        parseLinks() {
            this.error = '';
            this.message = '';
            const lines = this.rawInput.split(/\r?\n/).map(l => l.trim()).filter(l => l);
            if (!lines.length) {
                this.error = '未检测到有效链接';
                this.links = [];
                this.currentIndex = 0;
                return;
            }
            this.links = lines;
            this.currentIndex = 0; // 重置进度
            this.message = `共解析 ${this.links.length} 条链接，准备就绪`;
        },

        async copyTextToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    return true;
                } catch (e) {
                    document.body.removeChild(ta);
                    return false;
                }
            }
        },

        async nextCopy5() {
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
            for (let i = 0; i < 2; i++) {
                await this.nextCopy();
                if (this.error) break;
                await sleep(3000);
            }
        },

        async nextCopy() {
            this.error = '';
            if (!this.links.length) {
                this.error = '请先解析输入的链接';
                return;
            }

            if (this.currentIndex < this.links.length - 1) {
                this.currentIndex++;
                const text = this.currentLink;
                const ok = await this.copyTextToClipboard(text);
                if (ok) {
                    this.message = `已复制：${text}`;
                    if (this.currentIndex >= this.links.length - 1) this.message += ' — 已全部完成';
                } else {
                    this.error = '复制失败，请手动复制';
                }
            } else if (this.currentIndex === this.links.length - 1) {
                const text = this.currentLink;
                const ok = await this.copyTextToClipboard(text);
                if (ok) {
                    this.message = `已复制：${text} — 已全部完成`;
                    this.currentIndex = this.links.length; // 标记结束
                } else {
                    this.error = '复制失败，请手动复制';
                }
            } else {
                this.message = '已全部复制完成';
            }
        },

        async copyCurrent() {
            this.error = '';
            if (!this.links.length) { this.error = '无可复制的链接'; return; }
            const ok = await this.copyTextToClipboard(this.currentLink);
            if (ok) this.message = `已复制：${this.currentLink}`;
            else this.error = '复制失败，请手动复制';
        },

        prev() {
            if (this.currentIndex > 0) this.currentIndex--;
            this.message = '';
        },

        reset() {
            this.rawInput = '';
            this.links = [];
            this.currentIndex = 0;
            this.message = '';
            this.error = '';

            // 清除 localStorage 缓存
            localStorage.removeItem('linkCopier_links');
            localStorage.removeItem('linkCopier_currentIndex');
        }
    }
}).mount('#app');
</script>
</body>
</html>
