<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网页解析工作站 v5.3</title>
    <style>
        :root { --border: #cbd5e1; --bg: #f8fafc; --primary: #1e293b; --accent: #2563eb; --warning: #f59e0b; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--primary); padding: 20px; margin: 0; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .row { display: flex; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-family: 'Cascadia Code', monospace; font-size: 13px; }
        button { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #94a3b8; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; vertical-align: top; }
        th { background: #f1f5f9; color: #475569; }
        
        .tag { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 4px; display: inline-block; }
        .status-badge { font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #f1f5f9; }
        .label-hint { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <div class="row">
        <div style="flex:1">
            <label style="font-size:12px; font-weight:bold; margin-bottom:5px; display:block;">目标站点 URL</label>
            <input type="url" id="urlInput" value="https://www.people.com.cn">
        </div>
        <button onclick="scanIndex()" id="scanBtn">扫描目录</button>
        <button onclick="batchProcess()" id="batchBtn" style="background:#16a34a">顺序全量执行</button>
    </div>
</div>

<div id="debugPanel" class="card" style="display:none; border:2px solid var(--warning); background:#fffbeb;">
    <h3 style="margin:0 0 15px 0;">⚙️ 站点全流程规则定制: <span id="currentDomain"></span></h3>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
        <div>
            <label class="label-hint">1. 首页链接过滤 (Regex)</label>
            <input type="text" id="indexRegIn" placeholder="如: /topics/\d+">
        </div>
        <div>
            <label class="label-hint">2. 正文时间定位 (Selector)</label>
            <input type="text" id="selIn" placeholder="如: .time-box">
        </div>
        <div>
            <label class="label-hint">3. 时间清洗规则 (Regex)</label>
            <input type="text" id="regIn" placeholder="如: (\d{4}-\d{2}-\d{2})">
        </div>
    </div>
    
    <div style="margin-top:15px; display:flex; justify-content: flex-end; gap:10px;">
        <button onclick="scanIndex(true)" style="background:#0284c7;">🔬 仅测试首页扫描</button>
        <button onclick="saveAllConfigs()" style="background:var(--warning);">💾 保存全站档案</button>
        <button onclick="document.getElementById('debugPanel').style.display='none'" style="background:#cbd5e1; color:#1e293b;">关闭面板</button>
    </div>
</div>

<div class="card" style="padding:0; overflow:hidden;">
    <table>
        <thead>
            <tr>
                <th width="50">#</th>
                <th>文章资源</th>
                <th width="200">解析数据</th>
                <th width="300">AI 摘要</th>
                <th width="130">操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let articles = [];
    let siteConfig = { selector: "", regex: "", index_regex: "" };
    const API = "/smart_scraper";

    function formatNumber(num) {
        if (!num || isNaN(num)) return '0';
        if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return num.toString();
    }

    function getValidUrl(id) {
        let val = document.getElementById(id).value.trim();
        if (!val) return null;
        if (!/^https?:\/\//i.test(val)) val = 'http://' + val;
        try { return new URL(val); } catch(e) { return null; }
    }

    async function scanIndex(isDebug = false) {
        const urlObj = getValidUrl('urlInput');
        if (!urlObj) return alert("URL 错误");
        const domain = urlObj.hostname;
        const btn = document.getElementById('scanBtn');

        if (!isDebug) {
            btn.disabled = true; btn.innerText = "扫描中...";
            try {
                const cfgRes = await fetch(`${API}/config/get?domain=${domain}`);
                const cfg = await cfgRes.json();
                siteConfig = cfg;
                document.getElementById('indexRegIn').value = cfg.index_regex || "";
                document.getElementById('selIn').value = cfg.selector || "";
                document.getElementById('regIn').value = cfg.regex || "";
                document.getElementById('currentDomain').innerText = domain;
                document.getElementById('debugPanel').style.display = 'block';
            } catch(e) { console.error("获取配置失败", e); }
        }

        try {
            const res = await fetch(`${API}/scan_index`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    url: urlObj.href,
                    link_regex: document.getElementById('indexRegIn').value 
                }) 
            });
            const data = await res.json();
            if(data.status === "success") {
                articles = data.links.map(l => ({ 
                    url:l.url, title:l.title, html:"", content:"", pub_date:"", summary:"", tags:[], status:"等待" 
                }));
                render();
            } else { alert("扫描异常: " + data.error); }
        } catch(e) {
            alert("请求失败，请检查后端服务");
        } finally {
            btn.disabled = false; btn.innerText = "扫描目录";
        }
    }

    async function fetchHtml(index) {
        articles[index].status = "抓取中..."; render();
        try {
            const res = await fetch(`${API}/html`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({urls: [articles[index].url]}) 
            });
            const data = await res.json();
            const resData = data.data[articles[index].url];
            articles[index].html = resData.html;
            articles[index].content = resData.content;
            articles[index].title = resData.title || articles[index].title;
            articles[index].status = "就绪";
        } catch(e) { articles[index].status = "失败"; }
        render();
    }

    async function parseHtml(index) {
        const item = articles[index];
        if (!item.html) return;
        item.status = "解析中..."; render();
        try {
            const res = await fetch(`${API}/parse`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({
                    url: item.url, 
                    html: item.html, 
                    selector: document.getElementById('selIn').value, 
                    regex: document.getElementById('regIn').value
                }) 
            });
            const data = await res.json();
            item.pub_date = data.pub_date;
            item.status = item.pub_date.includes("未命中") ? "异常" : "完成";
        } catch(e) { item.status = "错误"; }
        render();
    }

    async function runAi(index) {
        const item = articles[index];
        if (!item.content) return;
        item.status = "AI分析..."; render();
        try {
            const res = await fetch(`${API}/ai`, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({content: item.content}) 
            });
            const data = await res.json();
            item.summary = data.summary;
            item.tags = data.tags;
            item.status = "全胜完成";
        } catch(e) { item.status = "AI失败"; }
        render();
    }

    async function processSingle(i) {
        await fetchHtml(i);
        await parseHtml(i);
        if (articles[i].content && articles[i].content.length > 20) {
            await runAi(i);
        } else {
            articles[i].status = "内容过短";
            render();
        }
    }

    async function batchProcess() {
        const btn = document.getElementById('batchBtn');
        btn.disabled = true;
        for(let i=0; i<articles.length; i++) {
            if(articles[i].status === "等待") await processSingle(i);
        }
        btn.disabled = false;
    }

    async function saveAllConfigs() {
        const domain = document.getElementById('currentDomain').innerText;
        try {
            await fetch(`${API}/config/save`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    domain,
                    index_regex: document.getElementById('indexRegIn').value,
                    selector: document.getElementById('selIn').value,
                    regex: document.getElementById('regIn').value
                })
            });
            alert("全站抓取档案已固化。");
        } catch(e) { alert("保存失败"); }
    }

    async function resetAll() {
        if(confirm("确定清空全库？")) {
            await fetch(`${API}/db_reset`, {method: 'POST'});
            articles = [];
            render();
        }
    }

    function render() {
        document.getElementById('tableBody').innerHTML = articles.map((item, i) => `
            <tr>
                <td>${i+1}</td>
                <td>
                    <a href="${item.url}" target="_blank" style="text-decoration:none;font-weight:bold;color:#1e293b;">${item.title}</a>
                    <div style="font-size:11px;color:#94a3b8;margin-top:4px;">字数: ${formatNumber(item.content.length)}</div>
                </td>
                <td>
                    ${item.pub_date ? `<div style="color:${item.pub_date.includes('未命中')?'#ef4444':'#16a34a'};font-weight:bold;">${item.pub_date}</div>` : ''}
                </td>
                <td>
                    <div style="font-size:12px;">${item.summary || '-'}</div>
                    <div style="margin-top:4px;">${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                </td>
                <td>
                    <div class="status-badge" style="color:${item.status.includes('异常')?'#ef4444':'#475569'};margin-bottom:5px;">${item.status}</div>
                    <button onclick="processSingle(${i})" style="padding:4px 8px;font-size:11px;">执行</button>
                </td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
