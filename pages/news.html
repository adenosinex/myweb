<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 智能分析终端 v4.5</title>
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --warning: #f59e0b; --bg: #f8fafc; --border: #cbd5e1; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--primary); padding: 20px; margin: 0; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
        button { padding: 10px 15px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #ef4444; }
        .btn-orange { background: var(--warning); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f1f5f9; color: #475569; }
        .tag { background: #e0f2fe; color: #0369a1; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 4px; }
        dialog { border: none; border-radius: 8px; width: 80%; max-width: 800px; padding: 0; }
        .modal-body { padding: 20px; white-space: pre-wrap; max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🌐 扫描与任务调度</h2>
        <button class="btn-red" onclick="resetAll()">清空全站数据</button>
    </div>
    <div class="row">
        <input type="url" id="urlInput" placeholder="输入首页地址...">
        <button onclick="scanIndex()">扫描首页目录</button>
    </div>
    <div id="debugPanel" style="display:none; border:2px solid var(--warning); padding:15px; border-radius:8px; background:#fffbeb;">
        <h4 style="margin:0 0 10px 0;">⚙️ 站点规则调试: <span id="currentDomain"></span></h4>
        <div class="row">
            <input type="text" id="selIn" placeholder="CSS选择器 (如 p.sou)">
            <input type="text" id="regIn" placeholder="正则表达式">
            <button class="btn-orange" onclick="saveRules()">保存并应用</button>
        </div>
    </div>
    <div id="batchArea" style="display:none; margin-top:15px;">
        <button style="background:#16a34a" onclick="runBatch()">▶ 顺序全分析</button>
    </div>
</div>

<div class="card">
    <table>
        <thead>
            <tr><th width="40">#</th><th width="280">文章标题 / 时间</th><th>AI 摘要 / 标签</th><th width="120">耗时</th><th width="100">状态</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<dialog id="contentModal">
    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
        <strong id="modalTitle"></strong>
        <button onclick="contentModal.close()">关闭</button>
    </div>
    <div class="modal-body" id="modalText"></div>
</dialog>

<script>
    let articles = JSON.parse(localStorage.getItem('scraper_v45_state')) || [];
    const API_BASE = "/smart_scraper";

    window.onload = () => {
        document.getElementById('urlInput').value = localStorage.getItem('last_url') || "https://www.people.com.cn/";
        if(articles.length > 0) { render(); document.getElementById('batchArea').style.display='block'; }
    };

    function render() {
        localStorage.setItem('scraper_v45_state', JSON.stringify(articles));
        document.getElementById('tableBody').innerHTML = articles.map((item, i) => `
            <tr>
                <td>${i+1}</td>
                <td>
                    <a href="${item.url}" target="_blank" style="font-weight:bold; text-decoration:none; color:#1e293b;">${item.title}</a>
                    <div style="color:#16a34a; font-size:12px; margin-top:4px;">${item.pub_date ? '📅 '+item.pub_date : ''}</div>
                </td>
                <td>
                    <div style="font-size:13px;">${item.summary || '-'}</div>
                    <div style="margin-top:5px;">${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                </td>
                <td style="font-family:monospace; font-size:11px;">
                    抓取:${item.fDur||'--'}s<br>智核:${item.aDur||'--'}s
                </td>
                <td>
                    <div style="font-size:11px; font-weight:bold; margin-bottom:5px;">${item.status}</div>
                    ${item.content ? `<button onclick="view(${i})" style="padding:3px 8px; font-size:11px;">预览</button>` : `<button onclick="process(${i})" style="padding:3px 8px; font-size:11px;">执行</button>`}
                </td>
            </tr>
        `).join('');
    }

    async function scanIndex() {
        const url = document.getElementById('urlInput').value;
        const domain = new URL(url).hostname;
        localStorage.setItem('last_url', url);
        
        const res = await fetch(`${API_BASE}/scan_index`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
        const data = await res.json();
        articles = data.links.map(l => ({ url:l.url, title:l.title, status:'等待' }));
        
        document.getElementById('currentDomain').innerText = domain;
        document.getElementById('debugPanel').style.display = 'block';
        document.getElementById('batchArea').style.display = 'block';
        
        const cfgRes = await fetch(`${API_BASE}/config/get?domain=${domain}`);
        const cfg = await cfgRes.json();
        document.getElementById('selIn').value = cfg.selector;
        document.getElementById('regIn').value = cfg.regex;
        render();
    }

    async function saveRules() {
        const domain = document.getElementById('currentDomain').innerText;
        await fetch(`${API_BASE}/config/save`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ domain, selector:document.getElementById('selIn').value, regex:document.getElementById('regIn').value })
        });
        alert("规则已应用");
    }

    async function process(i) {
        let item = articles[i];
        item.status = "抓取中"; render();
        
        const s1 = performance.now();
        const r1 = await fetch(`${API_BASE}/fetch_content`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:item.url}) });
        const d1 = await r1.json();
        item.fDur = ((performance.now()-s1)/1000).toFixed(2);
        
        if(d1.status==='success') {
            item.content = d1.content; item.pub_date = d1.pub_date; item.title = d1.title;
            item.status = "分析中"; render();
            
            const s2 = performance.now();
            const r2 = await fetch(`${API_BASE}/analyze_ai`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:item.url}) });
            const d2 = await r2.json();
            item.aDur = ((performance.now()-s2)/1000).toFixed(2);
            item.summary = d2.summary; item.tags = d2.tags; item.status = "完成";
        } else { item.status = "失败"; }
        render();
    }

    async function runBatch() {
        for(let i=0; i<articles.length; i++) {
            if(articles[i].status !== "完成") await process(i);
        }
    }

    function view(i) {
        document.getElementById('modalTitle').innerText = articles[i].title;
        document.getElementById('modalText').innerText = articles[i].content;
        document.getElementById('contentModal').showModal();
    }

    async function resetAll() {
        if(confirm("确定清空数据？")) {
            await fetch(`${API_BASE}/db_reset`, {method:'POST'});
            localStorage.clear(); location.reload();
        }
    }
</script>
</body>
</html>
