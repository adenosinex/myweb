<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端书库 - 智能索引</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f5; font-family: -apple-system, "PingFang SC", sans-serif; }
        .tag-active { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        
        /* 控制显示行数：默认只显示两行 */
        .tags-collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 限制显示行数 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 76px; /* 约两行按钮的高度 */
        }
        .book-clicked {
            opacity: 0.6;
            filter: grayscale(30%);
            transition: opacity 0.2s, filter 0.2s;
        }
        .tags-expanded { height: auto; }

        /* 新增：一键获取按钮的渐变样式 */
        .btn-primary-gradient {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body class="h-screen flex flex-col selection:bg-blue-500 overflow-hidden">

    <header class="bg-white shadow-sm sticky top-0 z-20 border-b border-zinc-100">
        <div class="p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-zinc-800 tracking-tight flex items-center gap-2">
                <span class="text-2xl">📚</span> 云端幻境书库
            </h1>
            <a href="/novel-ai" target="_blank" class="text-[11px] bg-zinc-800 text-white px-3 py-2 rounded-lg font-bold hover:bg-zinc-700 transition">⚙️ AI 管理</a>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto bg-zinc-100/30 scroll-smooth">
        <div class="p-4 sm:p-6 pb-0 flex flex-col gap-4">
            
            <div class="flex flex-col sm:flex-row gap-3 w-full">
                <div class="relative flex-1">
                    <input type="text" id="searchInput" placeholder="搜索书名..." 
                           class="w-full bg-white border border-zinc-200 rounded-2xl py-3 px-4 pl-11 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition shadow-sm">
                    <span class="absolute left-4 top-3.5 opacity-30">🔍</span>
                </div>
                <button onclick="fetchAllFiltered()" id="btnFetchAll" class="btn-primary-gradient px-5 py-3 rounded-2xl text-sm font-bold transition active:scale-95 whitespace-nowrap">
                    🚀 一键全量获取 (字数降序)
                </button>
            </div>
            
            <div class="bg-white/50 border border-zinc-200/50 rounded-2xl p-3">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">分类筛选</span>
                    <div class="flex gap-4">
                        <button onclick="clearFilters()" class="text-[10px] text-red-500 font-bold hidden" id="btnClearFilters">清除</button>
                        <button onclick="toggleExpandTags()" id="btnExpand" class="text-[10px] text-blue-600 font-bold flex items-center gap-1">
                            展开全部 <span id="expandIcon">↓</span>
                        </button>
                    </div>
                </div>
                
                <div id="tagContainer" class="flex flex-wrap gap-2 tags-collapsed transition-all duration-300">
                    <div class="h-8 w-16 bg-zinc-200 rounded-xl animate-pulse"></div>
                </div>
            </div>
        </div>

        <div class="p-4 sm:p-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[11px] font-bold text-zinc-400 uppercase tracking-widest" id="resultCount">同步中...</span>
            </div>
            <div id="novelGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            <div id="loading" class="py-10 flex flex-col items-center justify-center text-zinc-400 gap-2">
                <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <script>
        let currentPage = 1, isLoading = false, hasMore = true, globalTagStats = {}, selectedTags = new Set();
        let isExpanded = false;

        async function init() {
            try {
                const res = await fetch('/api/novel/tags/stats');
                globalTagStats = await res.json();
                renderTagButtons();
            } catch (e) { console.error(e); }
            loadNextPage(true);

            const main = document.querySelector('main');
            main.addEventListener('scroll', () => {
                if (main.scrollTop + main.clientHeight >= main.scrollHeight - 300) loadNextPage();
            });

            document.getElementById('searchInput').addEventListener('input', () => {
                clearTimeout(window.st);
                window.st = setTimeout(() => loadNextPage(true), 500);
            });
        }

        // 新增：字数格式化工具
        function formatWordCount(num) {
            if (!num || isNaN(num)) return '0字';
            return num >= 10000 ? (num / 10000).toFixed(1).replace(/\.0$/, '') + 'w字' : num + '字';
        }

        function toggleExpandTags() {
            isExpanded = !isExpanded;
            const container = document.getElementById('tagContainer');
            const btn = document.getElementById('btnExpand');
            const icon = document.getElementById('expandIcon');
            
            if (isExpanded) {
                container.classList.replace('tags-collapsed', 'tags-expanded');
                btn.firstChild.textContent = '收起筛选 ';
                icon.textContent = '↑';
            } else {
                container.classList.replace('tags-expanded', 'tags-collapsed');
                btn.firstChild.textContent = '展开全部 ';
                icon.textContent = '↓';
                // 收起时自动回滚到顶部，避免视觉丢失
                document.querySelector('main').scrollTop = 0;
            }
        }

        async function loadNextPage(reset = false) {
            if (isLoading || (!hasMore && !reset)) return;
            if (reset) { currentPage = 1; hasMore = true; document.getElementById('novelGrid').innerHTML = ''; }
            
            isLoading = true;
            document.getElementById('loading').style.visibility = 'visible';
            
            const keyword = document.getElementById('searchInput').value;
            const tags = Array.from(selectedTags).join(',');
            
            try {
                const res = await fetch(`/api/novel/list?page=${currentPage}&size=24&search=${encodeURIComponent(keyword)}&tags=${encodeURIComponent(tags)}`);
                const data = await res.json();
                
                // 修改：只对当前获取到的这批新数据内部进行降序排序
                const sortedItems = data.items.sort((a, b) => (b.wordCount || 0) - (a.wordCount || 0));
                
                renderGrid(sortedItems, !reset);
                document.getElementById('resultCount').innerText = `ITEMS: ${document.querySelectorAll('#novelGrid > a').length} / ${data.total}`;
                currentPage++;
                hasMore = data.has_more;
                if (!hasMore) document.getElementById('loading').style.visibility = 'hidden';
            } finally { isLoading = false; }
        }

        // 新增：一键全量获取与整体降序
        async function fetchAllFiltered() {
            if (isLoading) return;
            const btn = document.getElementById('btnFetchAll');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "⚡ 正在全量获取...";
            
            let allFetchedItems = [];
            let tempPage = 1;
            let tempHasMore = true;
            
            document.getElementById('novelGrid').innerHTML = ''; // 清空当前视图
            document.getElementById('loading').style.visibility = 'visible';
            
            const keyword = document.getElementById('searchInput').value;
            const tags = Array.from(selectedTags).join(',');
            
            try {
                while (tempHasMore) {
                    const res = await fetch(`/api/novel/list?page=${tempPage}&size=50&search=${encodeURIComponent(keyword)}&tags=${encodeURIComponent(tags)}`);
                    const data = await res.json();
                    
                    allFetchedItems = allFetchedItems.concat(data.items);
                    tempHasMore = data.has_more;
                    tempPage++;
                    
                    btn.innerText = `已获取 ${allFetchedItems.length} 本...`;
                }
                
                // 获取完毕后，进行整体全量降序
                allFetchedItems.sort((a, b) => (b.wordCount || 0) - (a.wordCount || 0));
                
                renderGrid(allFetchedItems, false); // 不使用追加模式，直接覆盖渲染
                
                document.getElementById('resultCount').innerText = `已收录全部: ${allFetchedItems.length} 本`;
                hasMore = false; // 阻断懒加载，防止干扰
            } catch (e) {
                alert("获取失败，请检查网络或后端接口。");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
                document.getElementById('loading').style.visibility = 'hidden';
            }
        }

        function renderTagButtons() {
            const topTags = ['已完结', '连载中', '未解析'];
            const sortedTags = Object.keys(globalTagStats).sort((a, b) => {
                if (topTags.includes(a) && !topTags.includes(b)) return -1;
                return globalTagStats[b] - globalTagStats[a];
            });

            document.getElementById('tagContainer').innerHTML = sortedTags.map(tag => `
                <button onclick="toggleTag('${tag}')" id="tag-btn-${tag}" 
                        class="px-3 py-1.5 rounded-xl text-[11px] border border-zinc-200 bg-white text-zinc-600 transition-all flex items-center gap-2">
                    <span class="font-medium">${tag}</span>
                    <span class="text-[9px] opacity-40 font-mono">${globalTagStats[tag]}</span>
                </button>
            `).join('');
        }

        function toggleTag(tag) {
            const btn = document.getElementById(`tag-btn-${tag}`);
            selectedTags.has(tag) ? selectedTags.delete(tag) : selectedTags.add(tag);
            btn.classList.toggle('tag-active');
            document.getElementById('btnClearFilters').style.display = selectedTags.size > 0 ? 'inline' : 'none';
            loadNextPage(true);
        }

        function clearFilters() {
            selectedTags.clear();
            document.querySelectorAll('[id^="tag-btn-"]').forEach(b => b.classList.remove('tag-active'));
            document.getElementById('btnClearFilters').style.display = 'none';
            loadNextPage(true);
        }

        function renderGrid(items, append) {
            const grid = document.getElementById('novelGrid');
            const html = items.map(item => `
                <a href="/novel-detail?novel=${encodeURIComponent(item.filename)}" class="bg-white rounded-2xl p-3 shadow-sm border border-zinc-100 flex flex-col gap-3 relative group">
                    <div class="aspect-[3/4] bg-zinc-50 rounded-xl flex items-center justify-center text-3xl shadow-inner">📗</div>
                    <div class="flex flex-col gap-1 flex-1">
                        <h3 class="font-bold text-[12px] text-zinc-800 line-clamp-2 leading-snug">${item.displayTitle}</h3>
                        
                        <div class="text-[10px] text-zinc-400 font-mono mt-0.5 flex items-center gap-1">
                            <span>📊</span> ${formatWordCount(item.wordCount)}
                        </div>

                        <div class="flex gap-1 flex-wrap mt-auto">
                            ${item.tags.slice(0,2).map(t => `<span class="bg-zinc-100 text-zinc-400 px-1.5 py-0.5 rounded text-[8px]">${t}</span>`).join('')}
                        </div>
                    </div>
                </a>`).join('');
            
            append ? grid.insertAdjacentHTML('beforeend', html) : grid.innerHTML = html;
            
            // 为新渲染的每个书籍卡片绑定点击事件
            grid.querySelectorAll('a').forEach(link => {
                // 防止重复绑定，先移除可能存在的监听器（简易防抖）
                const newLink = link.cloneNode(true);
                link.parentNode.replaceChild(newLink, link);
                
                newLink.addEventListener('click', function() {
                    this.classList.add('book-clicked');
                });
            });
        }

        init();
    </script>
</body>
</html>
