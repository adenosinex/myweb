<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云端幻境 - 阅读器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f5; color: #27272a; font-family: -apple-system, "PingFang SC", sans-serif; transition: background 0.3s; }
        .dark-mode { background-color: #121214; color: #d4d4d8; }
        .reader-content { font-size: 19px; line-height: 1.8; letter-spacing: 0.5px; text-align: justify; white-space: pre-wrap; word-break: break-all; }
        .drawer { transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer.open { transform: translateX(0); }
        .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,0.8); }
        .dark-mode .glass { background: rgba(24,24,27,0.8); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-14 glass border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between px-4 z-20 shrink-0">
        <div class="flex items-center gap-4">
            <button onclick="toggleDrawer()" class="p-2 hover:bg-zinc-200 dark:hover:bg-zinc-800 rounded-full transition">☰</button>
            <h1 id="novelTitle" class="font-bold truncate max-w-[150px] sm:max-w-xs">书库</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-zinc-200 dark:bg-zinc-800">🌓</button>
            <button id="aiBtn" onclick="openAIAnalysis()" class="hidden px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-full text-sm font-bold shadow-lg transition">AI 分析</button>
        </div>
    </header>

    <div id="drawer" class="drawer fixed inset-y-0 left-0 w-72 bg-white dark:bg-zinc-900 shadow-2xl z-30 flex flex-col border-r border-zinc-200 dark:border-zinc-800">
        <div class="p-4 border-b border-zinc-200 dark:border-zinc-800 flex justify-between items-center">
            <span class="font-bold text-blue-500">我的收藏</span>
            <button onclick="toggleDrawer()" class="text-2xl opacity-50">&times;</button>
        </div>
        <div id="novelList" class="flex-1 overflow-y-auto p-2 space-y-1">
            <div class="p-4 text-center text-zinc-400">正在同步书库...</div>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto p-4 sm:p-8 relative scroll-smooth" id="scrollContainer">
        <div class="max-w-2xl mx-auto">
            <div id="readerContent" class="reader-content min-h-[70vh]">
                <div class="flex flex-col items-center justify-center h-full text-zinc-400 mt-32 space-y-4">
                    <span class="text-5xl">📖</span>
                    <p>点击左上角菜单选择小说</p>
                </div>
            </div>
            
            <div id="pagination" class="mt-12 mb-20 flex justify-between items-center hidden border-t border-zinc-200 dark:border-zinc-800 pt-6">
                <button onclick="changePage(-1)" class="px-6 py-2 bg-zinc-200 dark:bg-zinc-800 rounded-xl active:scale-95 transition">上一页</button>
                <div class="text-center">
                    <div class="text-lg font-bold"><span id="currentPage">1</span> / <span id="totalPages">1</span></div>
                    <div class="text-xs opacity-40">进度自动保存</div>
                </div>
                <button onclick="changePage(1)" class="px-6 py-2 bg-zinc-200 dark:bg-zinc-800 rounded-xl active:scale-95 transition">下一页</button>
            </div>
        </div>
    </main>

    <script>
        const State = {
            currentNovel: '',
            pages: [],
            currentPageIdx: 0,
            charsPerPage: 1800 
        };

        const toggleDrawer = () => document.getElementById('drawer').classList.toggle('open');
        const toggleTheme = () => document.body.classList.toggle('dark-mode');

        const openAIAnalysis = () => {
            if(!State.currentNovel) return;
            // 匹配主程序路由
            window.open(`/novel-ai?novel=${encodeURIComponent(State.currentNovel)}`, '_blank');
        };

        // 1. 获取列表
        async function fetchList() {
            try {
                const res = await fetch('/api/novel/list');
                const data = await res.json();
                const listEl = document.getElementById('novelList');
                listEl.innerHTML = data.items.map(item => `
                    <div class="p-3 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 cursor-pointer text-sm truncate transition"
                         onclick="loadNovel('${item.filename}')">
                        📄 ${item.filename.replace(/\.[^/.]+$/, "")}
                    </div>
                `).join('');
            } catch(e) { console.error("书库同步失败"); }
        }

        // 2. 加载小说与自动分页
        async function loadNovel(filename) {
            toggleDrawer();
            const contentEl = document.getElementById('readerContent');
            contentEl.innerHTML = '<div class="mt-20 text-center animate-pulse text-blue-500">正在打开卷轴...</div>';
            
            State.currentNovel = filename;
            document.getElementById('novelTitle').innerText = filename.replace(/\.[^/.]+$/, "");
            document.getElementById('aiBtn').classList.remove('hidden');

            try {
                const res = await fetch(`/api/novel/content/${encodeURIComponent(filename)}`);
                const data = await res.json();
                
                // 内存级物理分页逻辑
                const text = data.content;
                State.pages = [];
                let i = 0;
                while (i < text.length) {
                    let end = i + State.charsPerPage;
                    // 尽量在换行符处截断，保持阅读感
                    if (end < text.length) {
                        const nextNewline = text.indexOf('\n', end);
                        if (nextNewline !== -1 && nextNewline - end < 400) end = nextNewline;
                    }
                    State.pages.push(text.slice(i, end).trim());
                    i = end;
                }
                
                // 3. 尝试恢复 KV 进度
                const progress = await fetch(`/api/kv/progress_${btoa(encodeURIComponent(filename)).slice(0,16)}`).then(r => r.json()).catch(() => ({}));
                State.currentPageIdx = progress.page || 0;
                
                document.getElementById('totalPages').innerText = State.pages.length;
                document.getElementById('pagination').classList.remove('hidden');
                renderPage();
            } catch (e) {
                contentEl.innerHTML = '<div class="mt-20 text-center text-red-500">文件读取异常，请检查资源节点连接</div>';
            }
        }

        function renderPage() {
            document.getElementById('readerContent').innerText = State.pages[State.currentPageIdx] || '本页内容为空';
            document.getElementById('currentPage').innerText = State.currentPageIdx + 1;
            document.getElementById('scrollContainer').scrollTo(0, 0);
            
            // 自动保存进度到 KV 存储
            saveProgress();
        }

        async function saveProgress() {
            const key = `progress_${btoa(encodeURIComponent(State.currentNovel)).slice(0,16)}`;
            fetch(`/api/kv/${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payload: { page: State.currentPageIdx } })
            });
        }

        function changePage(delta) {
            const newIdx = State.currentPageIdx + delta;
            if (newIdx >= 0 && newIdx < State.pages.length) {
                State.currentPageIdx = newIdx;
                renderPage();
            }
        }

        // 键盘翻页支持
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changePage(-1);
            if (e.key === 'ArrowRight') changePage(1);
        });

        fetchList();
    </script>
</body>
</html>
