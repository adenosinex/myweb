<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>时光切片档案</title>
    <link href="/static/cdn/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/cdn/viewer.min.css">
    <!-- <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.3/viewer.min.css"> -->
    <style>
        .manual-img{cursor:zoom-in;transition:transform .2s}.manual-img:hover{transform:scale(1.02)}
        .viewer-container img{cursor:zoom-in!important}.viewer-move{cursor:grab!important}
        .viewer-move:active{cursor:grabbing!important}.custom-scrollbar::-webkit-scrollbar{height:6px;width:6px}
        .custom-scrollbar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
        @media(max-width:767px){#modalBody[data-view="text"] #modalImgContainer,#modalBody[data-view="image"] #modalTextContainer{display:none}}
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <nav class="bg-white shadow-sm border-b border-gray-200 px-4 md:px-6 py-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center gap-4 justify-between">
            <div class="flex items-center justify-between flex-1">
                <h1 class="text-xl font-bold text-gray-800 tracking-tight mr-6">⏳ 时光记录</h1>
                <button onclick="openUploadModal()" class="bg-black hover:bg-gray-800 text-white text-sm font-bold py-2 px-4 rounded-full shrink-0 md:order-last">
                    <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>添加记录
                </button>
                <input type="text" id="searchInput" class="hidden md:block flex-1 max-w-xl mx-4 bg-gray-100 border-transparent focus:bg-white focus:border-gray-500 rounded-xl px-4 py-2.5 text-sm outline-none" placeholder="🔍 搜索事件..." oninput="renderGallery()">
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 md:px-6 pt-6">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">周期状态大盘 (距今最久优先)</h2>
            <button onclick="searchInput.value='';renderGallery()" class="text-[10px] text-blue-500 hover:underline">查看全部</button>
        </div>
        <div id="eventStatsDashboard" class="flex gap-3 overflow-x-auto custom-scrollbar pb-3"></div>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-4">
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
    </main>

    <div id="uploadModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50/50">
                <h3 class="font-bold text-gray-800">📸 存档生活切片</h3>
                <button onclick="closeUploadModal()" class="text-gray-400 text-2xl leading-none">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-700 mb-1">记录事件 (同批次照片共用)</label>
                    <input type="text" id="eventType" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700 outline-none mb-2" placeholder="输入新事件，或点击下方历史标签">
                    <div id="quickSelectContainer" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar"></div>
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-700 mb-1">实际发生时间</label>
                    <input type="datetime-local" id="overrideTime" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700 outline-none">
                </div>
                <div class="border-2 border-dashed border-gray-300 bg-gray-50 rounded-2xl p-8 text-center hover:bg-gray-100 mb-4" onclick="fileInput.click()">
                    <p class="text-sm font-semibold text-gray-700">点击选择多张生活照片</p>
                    <input type="file" id="fileInput" accept="image/*" multiple class="hidden" onchange="handleFiles()">
                </div>
                <div id="previewContainer" class="hidden mb-4 rounded-xl overflow-x-auto border border-gray-200 p-2 flex gap-2 custom-scrollbar h-28 bg-gray-50"></div>
                <button id="btnSubmit" onclick="submitRecord()" class="w-full bg-gray-300 text-gray-500 font-bold py-3.5 px-4 rounded-xl" disabled>等待选择照片...</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[80] hidden flex items-center justify-center md:p-4">
        <div class="bg-white w-full h-full md:h-[90vh] md:max-w-6xl md:rounded-3xl flex flex-col shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 z-10">
                <h3 class="font-bold text-gray-800 flex items-center gap-2 pr-4">
                    <span id="modalEventTitle" class="truncate text-lg"></span>
                    <span id="modalDate" class="text-xs font-normal text-gray-500 bg-gray-200 px-2 py-1 rounded"></span>
                </h3>
                <button onclick="closeModal()" class="text-gray-500 bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center">&times;</button>
            </div>
            <div class="md:hidden flex bg-gray-100 p-2 gap-2 border-b">
                <button onclick="setModalView('text')" id="btnViewText" class="flex-1 py-1.5 bg-white shadow rounded-lg text-sm font-bold text-gray-800">📝 环境档案</button>
                <button onclick="setModalView('image')" id="btnViewImg" class="flex-1 py-1.5 text-gray-500 hover:bg-gray-200 rounded-lg text-sm font-bold">🖼️ 视觉快照</button>
            </div>
            <div id="modalBody" data-view="image" class="flex-1 flex flex-col md:flex-row overflow-hidden bg-white">
                <div id="modalImgContainer" class="w-full md:w-1/2 lg:w-3/5 h-full bg-black flex items-center justify-center border-gray-200 relative">
                    <img id="modalDetailImg" class="max-w-full max-h-full object-contain cursor-zoom-in">
                    <div id="modalFilename" class="absolute bottom-2 left-2 text-[10px] text-white/50 bg-black/50 px-2 py-1 rounded select-all"></div>
                </div>
                <div id="modalTextContainer" class="w-full md:w-1/2 lg:w-2/5 h-full overflow-y-auto p-5 md:p-8 bg-gray-50">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Background Context</h4>
                    <div id="modalContent" class="prose prose-sm text-gray-700"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.3/viewer.min.js"></script>
    <script>
        const API_BASE = (location.protocol.match(/^(blob|file|https?:\/\/usercontent\.goog)/) ? 'http://127.0.0.1:5000' : '');
        let viewer, modalViewer, pollInterval;

        // 核心工具函数
        const formatDateTime = (d) => d ? new Date(d.replace(' ', 'T')).toISOString().replace(/[-T:]/g, '').slice(0, 12) : '未知';
        const getTimeAgo = (d) => {
            if (!d) return '未知';
            const diff = (Date.now() - new Date(d.replace(' ', 'T')).getTime()) / 864e5;
            return diff < 1 ? '今天' : diff < 2 ? '昨天' : diff > 365 ? `${~~(diff/365)}年前` : diff > 30 ? `${~~(diff/30)}个月前` : `${~~diff}天前`;
        };

        // 动态图片绑定 Viewer.js
        const initViewers = () => {
            if (viewer) viewer.destroy();
            viewer = new Viewer(document.getElementById('gallery'), {
                filter: img => img.classList.contains('manual-img'),
                viewed() {
                    this.viewer.canvas.addEventListener('click', e => {
                        if (e.target === this.viewer.canvas) viewer.hide();
                    });
                }
            });
        };

        // 主数据流
        async function loadData() {
            allSnapshots = await (await fetch(API_BASE + '/api/snapshots')).json();
            renderStats();
            renderGallery();
        }

        // 渲染状态大盘
        function renderStats() {
            const stats = {};
            allSnapshots.forEach(item => {
                const type = item.event_type || '未命名记录';
                if (!type.trim()) return;
                const time = new Date(item.record_time.replace(' ', 'T')).getTime();
                if (!stats[type] || time > stats[type].time) {
                    stats[type] = { time, record_time: item.record_time };
                }
            });

            // 首页大盘：距今越久越靠前
            const sortedDashboard = Object.keys(stats).sort((a, b) => stats[a].time - stats[b].time);
            document.getElementById('eventStatsDashboard').innerHTML = sortedDashboard.map(type => `
                <div onclick="searchInput.value='${type}';renderGallery()" class="bg-white px-4 py-2.5 rounded-2xl border border-gray-200 shadow-sm shrink-0 cursor-pointer hover:border-black hover:shadow-md group min-w-[100px]">
                    <span class="text-sm font-bold text-gray-800 group-hover:text-black">${type}</span>
                    <span class="text-[11px] text-gray-500 mt-0.5">上次: ${getTimeAgo(stats[type].record_time)}</span>
                </div>
            `).join('');

            // 上传弹窗快捷标签：最近更新优先
            const sortedQuick = Object.keys(stats).sort((a, b) => stats[b].time - stats[a].time);
            document.getElementById('quickSelectContainer').innerHTML = sortedQuick.map(type => `
                <button onclick="eventType.value='${type}';currentFiles.length && submitRecord()" class="px-3 py-1.5 bg-gray-100 hover:bg-black hover:text-white text-gray-700 rounded-xl text-left">
                    <span class="text-[11px] font-bold">${type}</span>
                    <span class="text-[9px] opacity-70">上次: ${getTimeAgo(stats[type].record_time)}</span>
                </button>
            `).join('');
        }

        // 渲染画廊
        function renderGallery() {
            const kw = searchInput.value.toLowerCase();
            const html = allSnapshots.filter(item => 
                (item.event_type || '').toLowerCase().includes(kw) ||
                (item.description || '').toLowerCase().includes(kw) ||
                (item.original_filename || '').toLowerCase().includes(kw)
            ).map(item => {
                const time = formatDateTime(item.record_time);
                const tags = (item.tags || []).map(t => `<span class="bg-gray-100 text-gray-600 text-[10px] px-1.5 py-0.5 rounded border">${t}</span>`).join('');
                const status = item.status === 'analyzing_context' 
                    ? `<div class="absolute inset-0 bg-black/50 flex items-center justify-center text-xs text-white font-bold">🤖 AI 分析中...</div>`
                    : '';

                let btn = '';
                if (item.status === 'analyzing_context') {
                    btn = `<button disabled class="w-full py-2 bg-gray-100 text-gray-400 text-[11px] font-bold rounded-xl">🤖 分析中...</button>`;
                } else if (!item.description || /失败|异常/.test(item.description)) {
                    const isFailed = /失败|异常/.test(item.description);
                    btn = `<button onclick="requestAI('${item.id}',event)" class="w-full py-2 ${isFailed ? 'bg-red-50 hover:bg-red-100 text-red-600' : 'bg-indigo-50 hover:bg-indigo-100 text-indigo-600'} text-[11px] font-bold rounded-xl border">${isFailed ? '🤖 重新提取环境' : '🤖 AI 提取环境 (可选)'}</button>`;
                } else {
                    btn = `<button onclick="showDetail('${item.id}')" class="w-full py-2 bg-gray-50 hover:bg-gray-200 text-gray-700 text-[11px] font-bold rounded-xl border border-gray-200">查看环境档案</button>`;
                }

                return `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden group relative">
                    <button onclick="deleteSnapshot('${item.id}',event)" class="absolute top-2 left-2 z-10 opacity-0 group-hover:opacity-100 bg-white/90 shadow rounded-full p-2 text-red-500 hover:bg-red-50" title="删除">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                    <div class="relative h-40 sm:h-52 bg-gray-100">
                        <img src="${API_BASE}${item.url}" class="w-full h-full object-cover manual-img">
                        ${status}
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-2">
                            <div class="text-[10px] text-gray-200 font-mono">${time}</div>
                        </div>
                    </div>
                    <div class="p-3 sm:p-4 flex-1 flex flex-col">
                        <div class="text-sm font-bold text-gray-900 truncate mb-1">${item.event_type}</div>
                        <div class="flex flex-wrap gap-1 mb-3 h-5 overflow-hidden">${tags}</div>
                        ${btn}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('gallery').innerHTML = html;
            initViewers(); // 重新绑定 Viewer
            return !!allSnapshots.some(i => i.status === 'analyzing_context');
        }

        // 详情页大图查看器
        function showDetail(id) {
            const item = allSnapshots.find(i => i.id === id);
            modalEventTitle.textContent = item.event_type;
            modalDate.textContent = formatDateTime(item.record_time);
            modalContent.innerHTML = marked.parse(item.description || "无环境描述");
            modalFilename.textContent = item.original_filename || '';
            modalFilename.classList.toggle('hidden', !item.original_filename);

            const img = modalDetailImg;
            img.src = API_BASE + item.url;
            img.onload = () => {
                if (modalViewer) modalViewer.destroy();
                modalViewer = new Viewer(img, {
                    navbar: false,
                    title: false,
                    toolbar: { zoomIn: 1, zoomOut: 1, oneToOne: 1, reset: 1, rotateLeft: 1, rotateRight: 1 },
                    viewed() {
                        const canvas = this.viewer.canvas;
                        canvas.addEventListener('click', e => {
                            if (e.target === canvas) modalViewer.hide();
                        });
                    }
                });
            };

            setModalView('image');
            detailModal.classList.remove('hidden');
        }

        // 上传逻辑
        function handleFiles() {
            const files = fileInput.files;
            if (!files.length) return;
            
            const overrideTime = document.getElementById('overrideTime');
            if (!overrideTime.value && files[0]) {
                EXIF.getData(files[0], function() {
                    const date = EXIF.getTag(this, "DateTimeOriginal") || new Date(files[0].lastModified);
                    overrideTime.value = new Date(date).toISOString().slice(0, 16);
                });
            }

            previewContainer.innerHTML = Array.from(files).map(file => {
                return `<img src="${URL.createObjectURL(file)}" class="h-24 w-24 object-cover rounded shadow border border-gray-200">`;
            }).join('');
            previewContainer.classList.remove('hidden');

            btnSubmit.disabled = false;
            btnSubmit.className = "w-full bg-black hover:bg-gray-800 text-white font-bold py-3.5 px-4 rounded-xl";
            btnSubmit.innerHTML = `✅ 立即入库 (${files.length} 张)`;
        }

        async function submitRecord() {
            if (!fileInput.files.length) return;
            btnSubmit.disabled = true;
            const fd = new FormData();
            fd.append('event_type', eventType.value);
            fd.append('record_time', overrideTime.value.replace('T', ' '));
            
            try {
                for (let i = 0; i < fileInput.files.length; i++) {
                    btnSubmit.innerHTML = `处理中... (${i+1}/${fileInput.files.length})`;
                    fd.set('file', await compressImage(fileInput.files[i]));
                    await fetch(API_BASE + '/api/snapshots/upload', { method: 'POST', body: fd });
                }
                closeUploadModal();
                loadData();
            } catch (e) {
                alert("保存失败: " + e.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "✅ 继续入库剩余项";
            }
        }

        // 核心工具
        function compressImage(file) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const [w, h] = [img.width, img.height].map(d => d > 2048 ? 2048 : d);
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(blob => resolve(new File([blob], file.name.replace(/\.[^/.]+$/, ".jpg"), { type: 'image/jpeg' })), 'image/jpeg', 0.85);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        // 启动
        loadData();
    </script>
</body>
</html>
