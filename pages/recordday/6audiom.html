<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VocalMind · 智能录音库</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0f172a">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: { 50:'#f8f6f2', 100:'#f0ece4', 200:'#e2dbd0', 300:'#c9bfb0', 400:'#a89a86', 500:'#8a7b68', 600:'#6b5e4e', 700:'#50463a', 800:'#362f28', 900:'#1c1814' },
                        amber: { 400:'#e8a830', 500:'#d49420', 600:'#b87a10' },
                        teal: { 400:'#2dd4bf', 500:'#14b8a6', 600:'#0d9488' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            -webkit-overflow-scrolling: touch;
            background: #f0ece4;
            min-height: 100vh;
            min-height: 100dvh;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            background-size: 256px; opacity: 0.025;
            pointer-events: none; z-index: 0;
        }
        .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
        .font-mono { font-family: 'DM Mono', 'Menlo', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c9bfb0; border-radius: 4px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(220,50,50,0.3); } 50% { box-shadow: 0 0 0 12px rgba(220,50,50,0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(100%); } }

        .anim-fade-in { animation: fadeIn 0.3s ease; }
        .anim-fade-in-up { animation: fadeInUp 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
        .anim-slide-up { animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1); }
        .anim-modal-in { animation: modalIn 0.3s cubic-bezier(0.16,1,0.3,1); }
        .anim-toast-in { animation: toastIn 0.35s cubic-bezier(0.16,1,0.3,1); }
        .anim-toast-out { animation: toastOut 0.25s ease-in forwards; }

        .skeleton { background: linear-gradient(90deg, #e2dbd0 25%, #f0ece4 50%, #e2dbd0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        .recording-pulse { animation: pulseGlow 1.5s ease infinite; }

        .sync-text {
            transition: background-color 0.15s, color 0.15s;
            cursor: pointer; padding: 3px 5px; margin: 1px;
            border-radius: 5px; display: inline; line-height: 1.9;
            -webkit-tap-highlight-color: transparent;
        }
        .sync-text:hover { background: rgba(45,212,191,0.12); }
        .sync-text.active { background: rgba(45,212,191,0.2); color: #0d9488; font-weight: 600; }

        .card-enter { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
        .timeline-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .timeline-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .upload-zone {
            transition: border-color 0.2s, background-color 0.2s;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #14b8a6;
            background: rgba(45,212,191,0.04);
        }

        #pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-ink-900 pb-safe">

    <!-- Nav -->
    <nav class="sticky top-0 z-40 bg-ink-900/[0.97] backdrop-blur-md shadow-lg shadow-ink-900/20">
        <div class="max-w-3xl mx-auto flex items-center gap-3 px-4 py-3">
            <div class="shrink-0 flex items-center gap-2.5">
                <div class="w-8 h-8 bg-teal-500 rounded-lg flex items-center justify-center shadow-inner shadow-teal-600/30">
                    <svg class="w-4.5 h-4.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </div>
                <span class="font-display text-lg font-bold text-ink-100 tracking-wide hidden sm:block">VocalMind</span>
            </div>
            <div class="flex-1 relative">
                <svg class="w-4 h-4 text-ink-400 absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
                <input type="text" id="searchInput"
                       class="w-full bg-ink-800 text-ink-200 placeholder-ink-500 rounded-xl pl-10 pr-4 py-2.5 text-sm outline-none focus:bg-ink-800/80 focus:ring-1 ring-teal-500/50 transition-all border border-ink-700/50"
                       placeholder="搜索录音标题或内容..." oninput="handleSearch(this.value)">
            </div>
            <button onclick="RecordCtrl.open()"
                    class="bg-teal-500 hover:bg-teal-400 active:bg-teal-600 text-white rounded-xl px-4 py-2.5 font-semibold text-sm flex items-center gap-2 shrink-0 shadow-md shadow-teal-500/25 transition-all hover:shadow-lg hover:shadow-teal-500/30">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
                <span class="hidden sm:block">记一条</span>
            </button>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-3xl mx-auto px-4 pt-6 pb-20 relative z-10">
        <div id="timeline" class="space-y-4"></div>
        <div id="emptyState" class="hidden py-24 text-center anim-fade-in-up">
            <div class="w-20 h-20 bg-ink-100 rounded-full flex items-center justify-center mx-auto mb-6 border border-ink-200/80">
                <svg class="w-9 h-9 text-ink-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/></svg>
            </div>
            <h3 class="font-display text-2xl font-bold text-ink-700 mb-2">尚无录音记录</h3>
            <p class="text-ink-400 text-sm mb-8">点击右上角「记一条」，开始记录你的第一段声音</p>
            <button onclick="RecordCtrl.open()" class="inline-flex items-center gap-2 bg-ink-900 hover:bg-ink-800 text-ink-50 px-6 py-3 rounded-xl text-sm font-semibold transition-all shadow-md">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
                开始录音
            </button>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-ink-900/60 backdrop-blur-sm anim-fade-in" onclick="DetailCtrl.close()"></div>
        <div class="absolute inset-0 flex flex-col justify-end sm:justify-center p-0 sm:p-4 pointer-events-none">
            <div class="bg-white w-full sm:max-w-2xl sm:mx-auto h-[88vh] sm:h-[80vh] rounded-t-3xl sm:rounded-2xl flex flex-col shadow-2xl shadow-ink-900/30 overflow-hidden pointer-events-auto anim-modal-in">
                <!-- Header -->
                <div class="px-5 py-4 border-b border-ink-200/60 flex justify-between items-center shrink-0">
                    <h3 id="modalTitle" class="font-display font-bold text-ink-800 truncate pr-6 text-lg flex-1"></h3>
                    <button onclick="DetailCtrl.close()" class="text-ink-400 hover:text-ink-700 bg-ink-100 hover:bg-ink-200/80 rounded-full w-8 h-8 flex items-center justify-center transition-all shrink-0 text-lg leading-none">&times;</button>
                </div>
                <!-- Player -->
                <div class="p-5 bg-ink-900 text-white flex flex-col gap-4 shrink-0 select-none">
                    <div id="waveform" class="w-full h-14 touch-none rounded-lg overflow-hidden"></div>
                    <div class="flex items-center justify-between gap-4">
                        <button id="playBtn" onclick="DetailCtrl.togglePlay()" class="bg-teal-500 hover:bg-teal-400 rounded-full w-11 h-11 flex items-center justify-center transition-all shadow-md shadow-teal-500/25 shrink-0">
                            <svg id="playIcon" class="w-5 h-5 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <div class="flex-1 h-1.5 bg-ink-700 rounded-full overflow-hidden cursor-pointer" id="progressBar">
                            <div id="progressFill" class="h-full bg-teal-500 rounded-full transition-[width] duration-100" style="width:0%"></div>
                        </div>
                        <span id="timeDisplay" class="text-xs font-mono tracking-wider text-ink-300 shrink-0 tabular-nums">00:00 / 00:00</span>
                    </div>
                </div>
                <!-- Transcript -->
                <div class="flex-1 overflow-y-auto p-5 sm:p-6 custom-scrollbar text-ink-700 text-[15px] leading-[1.95]" id="syncTextContainer"></div>
            </div>
        </div>
    </div>

    <!-- Record Modal -->
    <div id="recordModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-ink-900/60 backdrop-blur-sm anim-fade-in" onclick="RecordCtrl.close()"></div>
        <div class="absolute inset-x-0 bottom-0 sm:inset-0 sm:flex sm:items-center sm:justify-center sm:p-4 pointer-events-none">
            <div class="bg-white w-full sm:max-w-md sm:rounded-3xl rounded-t-3xl p-6 text-center shadow-2xl shadow-ink-900/30 pointer-events-auto anim-slide-up pb-safe relative overflow-hidden">
                <!-- Decorative arc -->
                <div class="absolute top-0 right-0 w-40 h-40 bg-teal-500/[0.03] rounded-full -translate-y-1/2 translate-x-1/2"></div>

                <div class="w-12 h-1.5 bg-ink-200 rounded-full mx-auto mb-6 sm:hidden"></div>
                <h3 class="font-display font-bold text-ink-800 text-xl mb-1">记录声音</h3>
                <p class="text-ink-400 text-xs mb-6">录音或上传音频 / 视频文件</p>

                <!-- Mic -->
                <button id="micBtn" onclick="RecordCtrl.toggleRecord()" class="w-28 h-28 rounded-full bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4 active:scale-95 transition-all duration-200 border-[3px] border-white shadow-sm ring-1 ring-ink-200/60 hover:ring-red-200 relative">
                    <svg id="micIcon" class="w-11 h-11" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    <div id="micRecDot" class="absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full hidden"></div>
                </button>
                <p id="recordStatus" class="text-sm text-ink-400 font-mono mb-6 tracking-wide h-5">点击麦克风开始录音</p>

                <!-- Divider -->
                <div class="flex items-center gap-3 mb-5">
                    <div class="flex-1 h-px bg-ink-200/80"></div>
                    <span class="text-xs text-ink-300 font-medium">或上传文件</span>
                    <div class="flex-1 h-px bg-ink-200/80"></div>
                </div>

                <!-- Upload buttons -->
                <div class="flex gap-3">
                    <label class="flex-1 py-3 bg-ink-50 hover:bg-ink-100 active:bg-ink-200/60 text-ink-600 font-semibold text-xs rounded-xl transition-colors cursor-pointer flex items-center justify-center gap-2 border border-ink-200/60 hover:border-ink-300">
                        <svg class="w-4 h-4 text-ink-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                        音频文件
                        <input type="file" accept="audio/*" class="hidden" onchange="RecordCtrl.handleUpload(this.files[0], 0, false)">
                    </label>
                    <label class="flex-1 py-3 bg-ink-50 hover:bg-ink-100 active:bg-ink-200/60 text-ink-600 font-semibold text-xs rounded-xl transition-colors cursor-pointer flex items-center justify-center gap-2 border border-ink-200/60 hover:border-ink-300">
                        <svg class="w-4 h-4 text-ink-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
                        视频文件
                        <input type="file" accept="video/*" class="hidden" onchange="RecordCtrl.handleUpload(this.files[0], 0, false)">
                    </label>
                </div>

                <!-- Cancel -->
                <button onclick="RecordCtrl.close()" class="w-full mt-4 py-2.5 text-ink-400 hover:text-ink-600 text-xs font-medium transition-colors">取消</button>

                <!-- Upload progress overlay -->
                <div id="uploadOverlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center gap-4 hidden anim-fade-in rounded-t-3xl sm:rounded-3xl">
                    <div class="w-10 h-10 border-[3px] border-ink-200 border-t-teal-500 rounded-full animate-spin"></div>
                    <p id="uploadStatusText" class="text-sm font-medium text-ink-600">正在上传...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-2 items-end pointer-events-none"></div>

    <script>
    const $ = id => document.getElementById(id);

    const API_PREFIX = '/audiom/api/vocal';

    let state = {
        data: [], filtered: [], renderIndex: 0, chunkSize: 10,
        searchTimeout: null, poll: null, scrollObserver: null,
        wavesurfer: null, currentSegments: [], lastActiveIdx: -1
    };

    /* ── Toast ── */
    function showToast(message, type = 'info') {
        const colors = { success: 'bg-teal-50 text-teal-700 border-teal-200', error: 'bg-red-50 text-red-700 border-red-200', info: 'bg-ink-50 text-ink-700 border-ink-200' };
        const icons = {
            success: '<svg class="w-4 h-4 text-teal-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/></svg>',
            error: '<svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>',
            info: '<svg class="w-4 h-4 text-ink-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"/></svg>'
        };
        const el = document.createElement('div');
        el.className = `pointer-events-auto flex items-center gap-2.5 px-4 py-3 rounded-xl border shadow-lg shadow-ink-900/5 text-sm font-medium max-w-xs anim-toast-in ${colors[type]}`;
        el.innerHTML = `${icons[type]}<span>${message}</span>`;
        $('toastContainer').appendChild(el);
        setTimeout(() => { el.classList.add('anim-toast-out'); setTimeout(() => el.remove(), 300); }, 3500);
    }

    /* ── Search ── */
    const handleSearch = val => {
        clearTimeout(state.searchTimeout);
        state.searchTimeout = setTimeout(() => {
            const kw = val.toLowerCase().trim();
            state.filtered = state.data.filter(i => (i.title_with_tags + ' ' + (i.stt_text_preview || '')).toLowerCase().includes(kw));
            $('timeline').innerHTML = '';
            state.renderIndex = 0;
            if (state.filtered.length === 0) {
                $('emptyState').classList.remove('hidden');
                if (kw) $('emptyState').querySelector('h3').textContent = '没有找到匹配的录音';
            } else {
                $('emptyState').classList.add('hidden');
                renderChunk();
            }
        }, 250);
    };

    /* ── Render ── */
    const renderChunk = () => {
        if (state.renderIndex >= state.filtered.length) return;
        const chunk = state.filtered.slice(state.renderIndex, state.renderIndex + state.chunkSize);
        const frag = document.createDocumentFragment();
        const temp = document.createElement('div');

        temp.innerHTML = chunk.map(item => buildCardHTML(item)).join('');
        while (temp.firstChild) frag.appendChild(temp.firstChild);
        $('timeline').appendChild(frag);

        /* stagger animation */
        const cards = $('timeline').children;
        for (let i = state.renderIndex; i < Math.min(state.renderIndex + state.chunkSize, state.filtered.length); i++) {
            if (cards[i]) cards[i].style.animationDelay = `${(i - state.renderIndex) * 0.06}s`;
        }

        state.renderIndex += state.chunkSize;

        if (state.scrollObserver) state.scrollObserver.disconnect();
        if (state.renderIndex < state.filtered.length) {
            state.scrollObserver = new IntersectionObserver(entries => {
                if (entries[0].isIntersecting) renderChunk();
            }, { rootMargin: '400px' });
            const children = $('timeline').children;
            if (children.length) state.scrollObserver.observe(children[children.length - 1]);
        }
    };

    function buildCardHTML(item) {
        const isProcessing = item.status !== 'completed' && !item.status.includes('failed');
        const isFailed = item.status.includes('failed');
        const isVideo = (item.mime_type || '').startsWith('video/');

        const statusBadge = isProcessing
            ? `<span class="text-[11px] bg-amber-400/15 text-amber-600 px-2.5 py-0.5 rounded-md font-mono font-medium flex items-center gap-1"><span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>处理中</span>`
            : isFailed
            ? `<span class="text-[11px] bg-red-50 text-red-600 px-2.5 py-0.5 rounded-md font-mono font-medium">失败</span>`
            : '';

        const mediaIcon = isVideo
            ? '<div class="w-10 h-10 bg-violet-100 rounded-xl flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-violet-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z"/></svg></div>'
            : '<div class="w-10 h-10 bg-teal-100 rounded-xl flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-teal-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></div>';

        const parts = item.title_with_tags.split('#');
        const title = parts[0].trim() || '基础音频记录';
        const tags = parts.slice(1).filter(t => t.trim()).map(t =>
            `<span class="text-[11px] text-teal-600 bg-teal-50 px-2 py-0.5 rounded-md border border-teal-200/60 font-medium">#${t.trim()}</span>`
        ).join('');

        const d = item.duration || 0;
        const durStr = d > 0 ? `${String(Math.floor(d / 60)).padStart(2, '0')}:${String(d % 60).padStart(2, '0')}` : '';

        return `
        <div class="relative pl-12 sm:pl-16 timeline-card" id="card-${item.id}">
            <div class="absolute left-[18px] sm:left-[30px] top-5 w-3 h-3 rounded-full border-[2.5px] border-white shadow-sm z-10 ${isFailed ? 'bg-red-400' : isProcessing ? 'bg-amber-400' : 'bg-teal-500'}"></div>
            <div class="bg-white rounded-2xl p-4 sm:p-5 shadow-sm border ${isFailed ? 'border-red-200/60' : 'border-ink-200/40'} cursor-pointer relative overflow-hidden group" onclick="DetailCtrl.open('${item.id}')">
                ${isFailed ? '<div class="absolute top-0 left-0 right-0 h-0.5 bg-red-400"></div>' : ''}
                <div class="flex items-start gap-3.5">
                    ${mediaIcon}
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between gap-2 mb-1.5">
                            <div class="flex items-center gap-2 min-w-0">
                                <span class="text-[11px] text-ink-400 font-mono shrink-0">${item.created_at}</span>
                                ${durStr ? `<span class="text-[11px] text-ink-300 font-mono shrink-0">${durStr}</span>` : ''}
                            </div>
                            ${statusBadge}
                        </div>
                        <h4 class="font-semibold text-ink-800 text-[15px] sm:text-base mb-1.5 truncate">${title}</h4>
                        ${tags ? `<div class="flex gap-1.5 mb-2 flex-wrap">${tags}</div>` : ''}
                        <p class="text-sm text-ink-400 line-clamp-2 leading-relaxed">${item.stt_text_preview || (isProcessing ? '云端引擎正在转录...' : isFailed ? '转录中断，可点击重试' : '等待转录...')}</p>
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-3 pt-3 border-t border-ink-100/60 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity duration-200">
                    ${isFailed ? `<button class="flex items-center gap-1.5 text-xs text-teal-600 bg-teal-50 hover:bg-teal-100 px-3 py-2 rounded-lg font-semibold transition-colors" onclick="event.stopPropagation(); retryRecord('${item.id}')"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>重试</button>` : ''}
                    <button class="flex items-center gap-1.5 text-xs text-ink-400 hover:text-red-500 bg-ink-50 hover:bg-red-50 px-3 py-2 rounded-lg font-medium transition-colors" onclick="event.stopPropagation(); deleteRecord('${item.id}')"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>删除</button>
                </div>
            </div>
        </div>`;
    }

    /* ── Data ── */
    const loadData = async () => {
        try {
            $('timeline').innerHTML = '<div class="space-y-4">' +
                Array.from({length: 4}, () => '<div class="relative pl-12 sm:pl-16"><div class="absolute left-[18px] sm:left-[30px] top-5 w-3 h-3 rounded-full bg-ink-200"></div><div class="bg-white rounded-2xl p-5 border border-ink-200/40"><div class="flex items-start gap-3.5"><div class="w-10 h-10 skeleton rounded-xl shrink-0"></div><div class="flex-1 space-y-2.5"><div class="h-3 skeleton w-24"></div><div class="h-4 skeleton w-3/4"></div><div class="h-3 skeleton w-full"></div><div class="h-3 skeleton w-2/3"></div></div></div></div></div>').join('') +
                '</div>';
            $('emptyState').classList.add('hidden');

            const res = await fetch(`${API_PREFIX}`);
            state.data = await res.json();
            state.filtered = [...state.data];

            $('timeline').innerHTML = '';
            state.renderIndex = 0;

            if (state.filtered.length === 0) {
                $('emptyState').classList.remove('hidden');
            } else {
                $('emptyState').classList.add('hidden');
                renderChunk();
            }

            if (state.data.some(i => i.status.startsWith('pending') || i.status.startsWith('processing'))) {
                if (!state.poll) state.poll = setInterval(loadData, 4000);
            } else {
                clearInterval(state.poll); state.poll = null;
            }
        } catch (e) {
            console.warn('连接中断', e);
            showToast('无法连接服务器', 'error');
        }
    };

    const deleteRecord = async (id) => {
        if (!confirm('确定永久删除本条录音及所有关联数据吗？')) return;
        try {
            await fetch(`${API_PREFIX}/${id}`, { method: 'DELETE' });
            const card = document.getElementById(`card-${id}`);
            if (card) { card.style.transition = 'all 0.3s ease'; card.style.opacity = '0'; card.style.transform = 'translateX(20px)'; setTimeout(() => { loadData(); }, 300); }
            else loadData();
            showToast('已删除', 'info');
        } catch (e) { showToast('删除失败', 'error'); }
    };

    const retryRecord = async (id) => {
        try {
            await fetch(`${API_PREFIX}/retry`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
            showToast('已提交重试', 'success');
            loadData();
        } catch (e) { showToast('重试失败', 'error'); }
    };

    /* ── Record Controller ── */
    const RecordCtrl = {
        mediaRecorder: null, audioChunks: [], startTime: 0, timer: null, isRecording: false,

        open: () => {
            $('recordModal').classList.remove('hidden');
            $('uploadOverlay').classList.add('hidden');
            $('recordStatus').innerText = '点击麦克风开始录音';
            $('micBtn').className = 'w-28 h-28 rounded-full bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4 active:scale-95 transition-all duration-200 border-[3px] border-white shadow-sm ring-1 ring-ink-200/60 hover:ring-red-200 relative';
            $('micRecDot').classList.add('hidden');
            /* reset file inputs */
            document.querySelectorAll('#recordModal input[type=file]').forEach(i => i.value = '');
        },

        close: () => {
            $('recordModal').classList.add('hidden');
            if (RecordCtrl.isRecording) RecordCtrl.stopRecord();
            clearInterval(RecordCtrl.timer);
        },

        toggleRecord: async () => {
            if (!RecordCtrl.isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    let options = {};
                    for (const t of ['audio/webm', 'audio/mp4', 'audio/ogg', 'audio/aac']) {
                        if (typeof MediaRecorder.isTypeSupported === 'function' && MediaRecorder.isTypeSupported(t)) { options.mimeType = t; break; }
                    }
                    RecordCtrl.mediaRecorder = new MediaRecorder(stream, options);
                    RecordCtrl.audioChunks = [];
                    RecordCtrl.mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) RecordCtrl.audioChunks.push(e.data); };
                    RecordCtrl.mediaRecorder.onstop = () => {
                        const mime = RecordCtrl.mediaRecorder.mimeType || options.mimeType || 'audio/webm';
                        const blob = new Blob(RecordCtrl.audioChunks, { type: mime });
                        let ext = '.webm';
                        if (mime.includes('mp4') || mime.includes('m4a')) ext = '.m4a'; else if (mime.includes('ogg')) ext = '.ogg'; else if (mime.includes('aac')) ext = '.aac'; else if (mime.includes('wav')) ext = '.wav';
                        const dur = Math.round((Date.now() - RecordCtrl.startTime) / 1000);
                        if (blob.size === 0 || dur < 1) { showToast('录音时间过短', 'error'); $('recordStatus').innerText = '点击麦克风开始录音'; return; }
                        RecordCtrl.handleUpload(new File([blob], `Rec_${Date.now()}${ext}`, { type: mime }), dur, true);
                    };
                    RecordCtrl.mediaRecorder.start(1000);
                    RecordCtrl.isRecording = true;
                    RecordCtrl.startTime = Date.now();
                    $('micBtn').className = 'w-28 h-28 rounded-full bg-red-500 text-white flex items-center justify-center mx-auto mb-4 active:scale-95 transition-all duration-200 border-[3px] border-white shadow-md ring-1 ring-red-300 recording-pulse relative';
                    $('micRecDot').classList.remove('hidden');
                    $('micRecDot').classList.add('animate-pulse');
                    RecordCtrl.timer = setInterval(() => {
                        const s = Math.floor((Date.now() - RecordCtrl.startTime) / 1000);
                        $('recordStatus').innerText = `正在录音 ${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
                    }, 500);
                } catch (err) { showToast('无法访问麦克风，请检查权限', 'error'); }
            } else { RecordCtrl.stopRecord(); }
        },

        stopRecord: () => {
            RecordCtrl.mediaRecorder.stop();
            RecordCtrl.mediaRecorder.stream.getTracks().forEach(t => t.stop());
            RecordCtrl.isRecording = false;
            clearInterval(RecordCtrl.timer);
            $('recordStatus').innerText = '处理中...';
            $('micBtn').className = 'w-28 h-28 rounded-full bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4 active:scale-95 transition-all duration-200 border-[3px] border-white shadow-sm ring-1 ring-ink-200/60 relative';
            $('micRecDot').classList.add('hidden');
        },

        handleUpload: async (file, explicitDuration, isRecorded = false) => {
            if (!file) return;

            const isVideo = file.type.startsWith('video/');
            $('uploadOverlay').classList.remove('hidden');
            $('uploadStatusText').innerText = isVideo ? '正在上传视频...' : '正在上传音频...';

            let duration = explicitDuration || 0;
            if (!duration) {
                duration = await new Promise(resolve => {
                    const url = URL.createObjectURL(file);
                    const temp = isVideo ? document.createElement('video') : new Audio();
                    temp.preload = 'metadata';
                    const timer = setTimeout(() => { resolve(0); URL.revokeObjectURL(url); }, 3000);
                    temp.onloadedmetadata = () => { clearTimeout(timer); resolve(Math.round(temp.duration || 0)); URL.revokeObjectURL(url); };
                    temp.onerror = () => { clearTimeout(timer); resolve(0); URL.revokeObjectURL(url); };
                    temp.src = url;
                });
            }

            const fd = new FormData();
            fd.append('file', file);
            fd.append('duration', duration);

            try {
                const res = await fetch(`${API_PREFIX}/upload`, { method: 'POST', body: fd });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                if (data.id) {
                    fetch(`${API_PREFIX}/start`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: [data.id] }) });
                }

                /* Optimistic insert */
                const optimisticRecord = {
                    id: data.id || ('tmp_' + Date.now()),
                    title_with_tags: file.name.replace(/\.[^.]+$/, ''),
                    stt_text_preview: '',
                    status: 'pending',
                    created_at: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-'),
                    duration: duration,
                    mime_type: file.type,
                    sync_data: [],
                    audio_url: data.audio_url || ''
                };
                state.data.unshift(optimisticRecord);
                state.filtered = [...state.data];
                $('emptyState').classList.add('hidden');

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = buildCardHTML(optimisticRecord);
                const newCard = tempDiv.firstElementChild;
                newCard.classList.add('card-enter');
                const timeline = $('timeline');
                if (timeline.firstChild) { timeline.insertBefore(newCard, timeline.firstChild); }
                else { timeline.appendChild(newCard); }

                $('recordModal').classList.add('hidden');
                showToast(isVideo ? '视频上传成功，正在提取音频...' : '录音上传成功', 'success');

                if (!state.poll) state.poll = setInterval(loadData, 4000);
            } catch (e) {
                $('uploadOverlay').classList.add('hidden');
                if (isRecorded) {
                    const blobUrl = URL.createObjectURL(file);
                    const a = document.createElement('a');
                    a.href = blobUrl; a.download = file.name;
                    document.body.appendChild(a); a.click(); a.remove();
                    URL.revokeObjectURL(blobUrl);
                    showToast('上传失败，录音已保存到下载目录', 'error');
                } else {
                    showToast('上传失败，请检查网络', 'error');
                }
                return;
            }
        }
    };

    /* ── Detail Controller ── */
    const DetailCtrl = {
        open: id => {
            const item = state.data.find(i => i.id === id);
            if (!item) { showToast('记录未找到', 'error'); return; }

            $('modalTitle').innerText = item.title_with_tags.split('#')[0].trim();
            state.currentSegments = item.sync_data || [];
            state.lastActiveIdx = -1;

            const container = $('syncTextContainer');
            if (item.status.includes('failed')) {
                container.innerHTML = `
                <div class="bg-red-50 border border-red-200/60 rounded-xl p-5 text-center">
                    <svg class="w-8 h-8 text-red-400 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/></svg>
                    <p class="font-semibold text-red-700 mb-1">转录中断</p>
                    <p class="text-sm text-red-500/80">音频已安全保存，请返回列表点击「重试」</p>
                </div>`;
            } else if (!item.stt_text_preview && state.currentSegments.length === 0) {
                container.innerHTML = `
                <div class="text-center py-10">
                    <div class="w-8 h-8 border-2 border-ink-200 border-t-teal-500 rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-ink-400 text-sm font-mono">正在等待云端引擎转录...</p>
                </div>`;
            } else if (state.currentSegments.length > 0) {
                container.innerHTML = state.currentSegments.map((seg, idx) =>
                    `<span class="sync-text" id="sync-text-${idx}" data-start="${seg.start}" onclick="DetailCtrl.seek(${seg.start})">${seg.text}</span>`
                ).join('');
            } else {
                container.innerHTML = `<p class="text-ink-600 whitespace-pre-wrap leading-relaxed">${item.stt_text_preview}</p>`;
            }

            $('detailModal').classList.remove('hidden');
            $('progressFill').style.width = '0%';
            DetailCtrl.initWavesurfer(item.audio_url);
        },

        close: () => {
            if (state.wavesurfer) { state.wavesurfer.destroy(); state.wavesurfer = null; }
            $('detailModal').classList.add('hidden');
        },

        togglePlay: () => { if (state.wavesurfer) state.wavesurfer.playPause(); },

        seek: time => {
            if (!state.wavesurfer) return;
            const dur = state.wavesurfer.getDuration();
            if (dur > 0) { state.wavesurfer.seekTo(time / dur); state.wavesurfer.play(); }
        },

        initWavesurfer: url => {
            if (state.wavesurfer) state.wavesurfer.destroy();
            const format = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(Math.floor(s % 60)).padStart(2, '0')}`;

            state.wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#506572',
                progressColor: '#14b8a6',
                cursorColor: '#2dd4bf',
                cursorWidth: 2,
                barWidth: 2,
                barGap: 1,
                barRadius: 2,
                height: 56,
                url: url,
                autoplay: true,
                dragToSeek: true
            });

            state.wavesurfer.on('ready', () => {
                const dur = state.wavesurfer.getDuration();
                $('timeDisplay').innerText = `00:00 / ${format(dur)}`;
            });

            state.wavesurfer.on('timeupdate', time => {
                const dur = state.wavesurfer.getDuration();
                $('timeDisplay').innerText = `${format(time)} / ${format(dur)}`;
                if (dur > 0) $('progressFill').style.width = `${(time / dur) * 100}%`;

                /* word sync */
                let activeIdx = -1;
                for (let i = 0; i < state.currentSegments.length; i++) {
                    if (time >= state.currentSegments[i].start && (time <= state.currentSegments[i].end || !state.currentSegments[i].end)) { activeIdx = i; break; }
                }
                if (activeIdx !== state.lastActiveIdx) {
                    document.querySelectorAll('.sync-text').forEach((el, idx) => el.classList.toggle('active', idx === activeIdx));
                    if (activeIdx !== -1) {
                        const activeEl = document.getElementById(`sync-text-${activeIdx}`);
                        if (activeEl && state.wavesurfer.isPlaying()) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    state.lastActiveIdx = activeIdx;
                }
            });

            state.wavesurfer.on('play', () => {
                $('playIcon').innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';
            });
            state.wavesurfer.on('pause', () => {
                $('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            });

            /* progress bar click */
            $('progressBar').onclick = e => {
                if (!state.wavesurfer) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                state.wavesurfer.seekTo(ratio);
            };
        }
    };

    /* ── Init ── */
    loadData();
    </script>
</body>
</html>
