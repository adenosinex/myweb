
<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<title>AI 聚合</title>

<style>

body{
    max-width:1200px;
    margin:auto;
    padding:20px;
    font-family:Arial;
    background:#fafafa;
}

textarea{
    width:100%;
    height:140px;
    padding:12px;
    font-size:15px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.topbar{
    display:flex;
    gap:15px;
    margin-top:10px;
    align-items:center;
}

.card{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    margin-top:16px;
    overflow:hidden;
}

.card-header{
    background:#f3f3f3;
    padding:14px;
    cursor:pointer;
    font-weight:bold;
}

.card-content{
    display:none;
    padding:16px;
    white-space:pre-wrap;
    line-height:1.6;
}

.success{
    color:#222;
}

.error{
    color:red;
}

.loading{
    color:orange;
}

.meta{
    margin-top:10px;
    font-size:13px;
    color:#666;
}

#final{
    margin-top:30px;
    background:white;
    border:2px solid #333;
    border-radius:10px;
    padding:20px;
    white-space:pre-wrap;
    line-height:1.7;
}

.progress{
    margin-top:20px;
    font-size:14px;
}

</style>

</head>

<body>

<h2>AI 聚合系统</h2>

<textarea
    id="question"
    placeholder="输入问题"
></textarea>

<div class="topbar">

    <button onclick="startAsk()">
        开始
    </button>

    <label>
        <input
            type="checkbox"
            id="fastMode"
        >
        Fast Mode
    </label>

</div>

<div class="progress" id="progress"></div>

<div id="results"></div>

<div id="final"></div>

<script>

let pollingTimer = null

function createCard(answer){

    const div = document.createElement("div")

    div.className = "card"

    const header = document.createElement("div")

    header.className = "card-header"

    header.innerText =
        answer.model

    const content = document.createElement("div")

    content.className =
        "card-content"

    if(answer.success){

        content.classList.add(
            "success"
        )

        content.innerText =
            answer.answer

    }else{

        content.classList.add(
            "error"
        )

        content.innerText =
            answer.error
    }

    const meta =
        document.createElement("div")

    meta.className = "meta"

    meta.innerText =
        `耗时: ${answer.time}s ｜ ` +
        `tokens: ${answer.total_tokens}`

    content.appendChild(meta)

    header.onclick = () => {

        content.style.display =
            content.style.display === "block"
            ? "none"
            : "block"
    }

    div.appendChild(header)

    div.appendChild(content)

    document
        .getElementById("results")
        .appendChild(div)

    content.style.display = "block"
}


async function postJson(
    url,
    body,
    timeout = 180000
){

    const controller =
        new AbortController()

    const timer = setTimeout(
        () => controller.abort(),
        timeout
    )

    try{

        const response =
            await fetch(url,{
                method:"POST",
                headers:{
                    "Content-Type":
                        "application/json"
                },
                body: JSON.stringify(body),
                signal: controller.signal
            })

        clearTimeout(timer)

        return await response.json()

    }catch(err){

        clearTimeout(timer)

        throw err
    }
}


async function startAsk(){

    clearInterval(pollingTimer)

    document
        .getElementById("results")
        .innerHTML = ""

    document
        .getElementById("final")
        .innerHTML = ""

    const question =
        document
        .getElementById("question")
        .value
        .trim()

    if(!question){
        return
    }

    const fastMode =
        document
        .getElementById("fastMode")
        .checked

    try{

        const startData =
            await postJson(
                "/ai/start",
                {
                    question,
                    fast_mode: fastMode
                }
            )

        if(!startData.success){

            alert(startData.error)

            return
        }

        const sessionId =
            startData.session_id

        pollingTimer =
            setInterval(async () => {

                try{

                    const pollData =
                        await postJson(
                            "/ai/poll",
                            {
                                session_id:
                                    sessionId
                            },
                            30000
                        )

                    if(!pollData.success){
                        return
                    }

                    document
                        .getElementById(
                            "progress"
                        )
                        .innerText =
                            `完成 ${pollData.completed} / ${pollData.total}`

                    for(
                        const item
                        of pollData.answers
                    ){

                        createCard(item)
                    }

                    if(pollData.finished){

                        clearInterval(
                            pollingTimer
                        )

                        await loadFinal(
                            sessionId
                        )
                    }

                }catch(err){

                    console.error(err)
                }

            }, 1000)

    }catch(err){

        alert(err)
    }
}


async function loadFinal(
    sessionId
){

    const finalDiv =
        document.getElementById("final")

    finalDiv.innerHTML =
        "<div class='loading'>仲裁中...</div>"

    try{

        const data =
            await postJson(
                "/ai/final",
                {
                    session_id:
                        sessionId
                },
                300000
            )

        if(data.success){

            finalDiv.innerText =
`最终总结:

${data.answer}

======================

仲裁耗时:
${data.time}s

仲裁 tokens:
${data.tokens}

源模型总耗时:
${data.source_total_time}s

源模型总 tokens:
${data.source_total_tokens}
`

        }else{

            finalDiv.innerText =
                data.error
        }

    }catch(err){

        finalDiv.innerText =
            "最终仲裁失败:\n" + err
    }
}

</script>

</body>
</html>
