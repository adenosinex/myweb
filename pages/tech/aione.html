
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI 聚合</title>

<style>

body{
    font-family: Arial;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

textarea{
    width:100%;
    height:120px;
}

button{
    padding:10px 20px;
    margin-top:10px;
}

.card{
    border:1px solid #ccc;
    margin-top:15px;
    border-radius:8px;
}

.card-header{
    background:#f5f5f5;
    padding:10px;
    cursor:pointer;
    font-weight:bold;
}

.card-content{
    display:none;
    padding:15px;
    white-space: pre-wrap;
}

.success{
    color:green;
}

.error{
    color:red;
}

#final{
    margin-top:30px;
    border:2px solid #333;
    padding:20px;
    white-space: pre-wrap;
}

.loading{
    color:orange;
}

</style>
</head>

<body>

<h2>AI 聚合问答</h2>

<textarea id="question"></textarea>

<br>

<button onclick="startAsk()">开始</button>

<div id="results"></div>

<div id="final"></div>

<script>

const MODELS = [
    "GPT-4.1",
    "Claude",
    "DeepSeek"
]

function createCard(model){

    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
        <div class="card-header">${model}</div>
        <div class="card-content loading">
            请求中...
        </div>
    `

    div.querySelector(".card-header")
    .onclick = function(){

        const content = div.querySelector(".card-content")

        content.style.display =
            content.style.display === "block"
            ? "none"
            : "block"
    }

    document.getElementById("results")
    .appendChild(div)

    return div
}


async function fetchWithTimeout(
    url,
    options,
    timeout = 90000
){

    const controller = new AbortController()

    const id = setTimeout(
        () => controller.abort(),
        timeout
    )

    try{

        const response = await fetch(url,{
            ...options,
            signal: controller.signal
        })

        clearTimeout(id)

        return response

    }catch(err){

        clearTimeout(id)

        throw err
    }
}


async function startAsk(){

    document.getElementById("results").innerHTML = ""
    document.getElementById("final").innerHTML = ""

    const question =
        document.getElementById("question").value

    const sessionId =
        Date.now().toString()

    let successAnswers = 0

    for(let i=0;i<MODELS.length;i++){

        const card = createCard(MODELS[i])

        const content =
            card.querySelector(".card-content")

        try{

            const r = await fetchWithTimeout(
                "/ai/ask",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        question: question,
                        model_index: i,
                        session_id: sessionId
                    })
                },
                90000
            )

            const data = await r.json()

            if(data.success){

                successAnswers++

                content.className =
                    "card-content success"

                content.innerText =
                    data.answer

            }else{

                content.className =
                    "card-content error"

                content.innerText =
                    "失败:\n" + data.error
            }

        }catch(err){

            content.className =
                "card-content error"

            content.innerText =
                "超时或异常:\n" + err
        }

        content.style.display = "block"
    }

    if(successAnswers === 0){

        document.getElementById("final")
        .innerText = "全部失败"

        return
    }

    document.getElementById("final")
    .innerHTML = "<div class='loading'>仲裁中...</div>"

    try{

        const r = await fetchWithTimeout(
            "/ai/arbiter",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    question: question,
                    session_id: sessionId
                })
            },
            120000
        )

        const data = await r.json()

        if(data.success){

            document.getElementById("final")
            .innerText = data.answer

        }else{

            document.getElementById("final")
            .innerText =
                "仲裁失败:\n" + data.error
        }

    }catch(err){

        document.getElementById("final")
        .innerText =
            "仲裁超时:\n" + err
    }
}

</script>

</body>
</html>
