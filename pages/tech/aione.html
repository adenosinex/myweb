
<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>AI 聚合</title>

<style>

body{
    max-width:1000px;
    margin:auto;
    padding:20px;
    font-family:Arial;
}

textarea{
    width:100%;
    height:120px;
}

button{
    padding:10px 20px;
    margin-top:10px;
}

.card{
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:15px;
}

.card-header{
    background:#f5f5f5;
    padding:12px;
    cursor:pointer;
    font-weight:bold;
}

.card-content{
    display:none;
    padding:15px;
    white-space:pre-wrap;
}

.success{
    color:green;
}

.error{
    color:red;
}

.loading{
    color:orange;
}

#final{
    margin-top:30px;
    border:2px solid #333;
    padding:20px;
    white-space:pre-wrap;
}

</style>
</head>

<body>

<h2>AI 聚合问答</h2>

<textarea id="question"></textarea>

<br>

<button onclick="startAsk()">
开始
</button>

<div id="results"></div>

<div id="final"></div>

<script>

function createCard(title){

    const div = document.createElement("div")

    div.className = "card"

    div.innerHTML = `
        <div class="card-header">
            ${title}
        </div>

        <div class="card-content loading">
            请求中...
        </div>
    `

    const header =
        div.querySelector(".card-header")

    const content =
        div.querySelector(".card-content")

    header.onclick = () => {

        content.style.display =
            content.style.display === "block"
            ? "none"
            : "block"
    }

    document
        .getElementById("results")
        .appendChild(div)

    return content
}


async function fetchJson(
    url,
    body,
    timeout = 120000
){

    const controller =
        new AbortController()

    const timer = setTimeout(
        () => controller.abort(),
        timeout
    )

    try{

        const response = await fetch(url,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(body),
            signal: controller.signal
        })

        clearTimeout(timer)

        return await response.json()

    }catch(err){

        clearTimeout(timer)

        throw err
    }
}


async function startAsk(){

    document.getElementById("results").innerHTML = ""
    document.getElementById("final").innerHTML = ""

    const question =
        document.getElementById("question")
        .value
        .trim()

    if(!question){
        return
    }

    try{

        const startData =
            await fetchJson(
                "/ai/start",
                {question}
            )

        if(!startData.success){

            alert(startData.error)

            return
        }

        const sessionId =
            startData.session_id

        while(true){

            const data =
                await fetchJson(
                    "/ai/next",
                    {
                        session_id: sessionId
                    }
                )

            if(data.finished){
                break
            }

            const content =
                createCard(data.model)

            content.style.display = "block"

            if(data.success){

                content.className =
                    "card-content success"

                content.innerText =
                    data.answer

            }else{

                content.className =
                    "card-content error"

                content.innerText =
                    data.error
            }
        }

        document.getElementById("final")
        .innerHTML =
            "<div class='loading'>仲裁中...</div>"

        const finalData =
            await fetchJson(
                "/ai/final",
                {
                    session_id: sessionId
                },
                180000
            )

        if(finalData.success){

            document.getElementById("final")
            .innerText =
                finalData.answer

        }else{

            document.getElementById("final")
            .innerText =
                finalData.error
        }

    }catch(err){

        document.getElementById("final")
        .innerText =
            "请求失败:\n" + err
    }
}

</script>

</body>
</html>
