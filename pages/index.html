<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人控制台</title>
       <link rel="icon" href="/static/main.svg" type="image/svg+xml">
    <style>
        body { font-family: system-ui; background: #f0f2f5; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 30px 20px; border-radius: 12px; text-align: center; text-decoration: none; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; font-weight: bold; font-size: 18px;}
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); color: #007bff;}
        .hint { text-align: center; color: #888; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ 个人生活数据中心</h1>
        <p>万能记录引擎已启动</p>
    </div>

    <div class="grid" id="appGrid">
        <p style="color:#999;">正在扫描应用列表...</p>
    </div>

    <div class="hint">
        💡 拓展新应用：只需在 <code>pages/</code> 目录下新建一个 <code>.html</code> 文件，刷新本页即可自动识别。
    </div>

    <script>
        // 自动拉取 pages 目录下的所有文件并生成导航按钮
        fetch('/api/_sys/pages')
            .then(res => res.json())
            .then(pages => {
                const grid = document.getElementById('appGrid');
                if (pages.length === 0) {
                    grid.innerHTML = '<p style="color:#999; grid-column: 1/-1;">还没有创建任何子页面，去 code-server 里建一个吧！</p>';
                    return;
                }
                grid.innerHTML = pages.map(page => `
                    <a href="/${page}" class="card">
                        📄 ${page.toUpperCase()}
                    </a>
                `).join('');
            });
    </script>
</body>
</html>
