<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>短视频浏览项目</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="http://192.168.31.197:8100/static/cdn/vant@4index.css">
    <link rel="stylesheet" href="http://192.168.31.197:8100/static/dy.css">
    <link rel="icon" type="image/svg" href="http://192.168.31.197:8100/static/svg/dy.svg">
    
    <script src="http://192.168.31.197:8100/static/cdn/vue3.5.global.prod.js"></script>
    <script src="http://192.168.31.197:8100/static/cdn/vue-router4.5.global.js"></script>
    <script src="http://192.168.31.197:8100/static/cdn/vant4.min.js"></script>
    <script src="http://192.168.31.197:8100/static/cdn/axios1.1.min.js"></script>
    <script src="https://apple4.su7.dpdns.org:10443/static/dyfn.js"></script>
    <script src="https://apple4.su7.dpdns.org:10443/static/dyfnhead.js"></script>
    <script src="https://apple4.su7.dpdns.org:10443/static/dyfnst.js"></script>
    
   

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; }
        #app { height: 100%; width: 100%; }
        
        .layout-wrapper { display: flex; flex-direction: row; height: 100%; width: 100%; }
        .video-side { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .panel-side { width: 420px; background: #141414; border-left: 1px solid #333; display: flex; flex-direction: column; box-sizing: border-box; z-index: 10; }
        
        .panel-header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; background: #1a1a1a; }
        .panel-content { flex: 1; overflow-y: auto; padding: 0; }
        .icon-btn { flex: 0 0 60px; font-size: 22px; padding: 0; }

        .dynamic-sections { padding-top: 5px; }
        .drag-section { position: relative; background: rgba(255,255,255,0.03); border-radius: 6px; padding: 12px 12px 12px 34px; margin-bottom: 12px; border: 1px dashed transparent; transition: border 0.2s, opacity 0.2s; }
        .drag-section:hover { border-color: #333; }
        .drag-section.is-dragging { opacity: 0.3; border-color: #1989fa; }
        .drag-handle { position: absolute; left: 0; top: 0; bottom: 0; width: 30px; display: flex; align-items: center; justify-content: center; color: #555; cursor: grab; font-size: 14px; font-weight: bold; }
        .drag-handle:active { cursor: grabbing; color: #fff; }

        .tag-group-card { background: rgba(0,0,0,0.3); border: 1px dashed #444; border-radius: 6px; padding: 10px; margin-bottom: 10px; min-height: 45px; transition: all 0.2s; }
        .tag-group-card.drag-over-group { border-color: #e6a23c; background: rgba(230, 162, 60, 0.1); }
        .tag-group-card.drag-over-empty { border-color: #1989fa; background: rgba(25, 137, 250, 0.1); }
        .tag-group-card.is-dragging-group { opacity: 0.3; border-color: #e6a23c; }
        
        .drag-handle-group { display: inline-flex; align-items: center; color: #888; cursor: grab; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); }
        .drag-handle-group:active { cursor: grabbing; color: #fff; background: rgba(255,255,255,0.15); }

        .group-title { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .token-chip, .quick-tag-chip, .auto-tag-chip { display: inline-flex; align-items: center; margin: 4px; border-radius: 4px; font-size: 13px; user-select: none; transition: all 0.2s; overflow: visible; position: relative;}
        
        .token-chip { background: #1989fa; color: #fff; border: 1px solid #1989fa; }
        .token-chip.token-off { background: #111; color: #555; text-decoration: line-through; border: 1px solid #333; }
        
        .quick-tag-chip { background: #333; color: #ccc; border: 1px solid #555; border-radius: 14px; cursor: grab;}
        .quick-tag-chip:active { cursor: grabbing; }
        .quick-tag-chip.tag-on { background: #e6a23c; color: #fff; border-color: #e6a23c; }
        .quick-tag-chip.is-dragging-tag { opacity: 0.4; transform: scale(0.9); }
        .quick-tag-chip.drag-over-tag-left { box-shadow: -3px 0 0 #1989fa; }
        .quick-tag-chip.drag-over-tag-right { box-shadow: 3px 0 0 #1989fa; }

        .auto-tag-chip { border-radius: 14px; background: rgba(142, 68, 173, 0.15); color: #c39bd3; border: 1px solid #8e44ad; cursor: pointer; padding: 4px 10px; font-weight: bold;}
        .auto-tag-chip:hover { background: rgba(142, 68, 173, 0.35); }
        .auto-tag-chip.tag-off { background: #111; color: #555; text-decoration: line-through; border-color: #333; }
        
        .chip-text { padding: 5px 8px; cursor: pointer; }
        .chip-action { padding: 5px 6px; background: rgba(0,0,0,0.2); color: #ffeb3b; font-size: 11px; cursor: pointer; border-left: 1px solid rgba(255,255,255,0.2); }
        .chip-del { color: #ff4d4f; font-weight: bold; padding: 5px 8px; border-left: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: rgba(0,0,0,0.2); font-size: 11px; border-top-right-radius: 14px; border-bottom-right-radius: 14px; }
        .token-chip.token-off .chip-action, .token-chip.token-off .chip-del { color: #888; border-color: #444; }
        .quick-tag-chip.tag-on .chip-del { border-left-color: rgba(255,255,255,0.4); }
        
        .tag-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .tag-input-row input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 13px; outline: none; }
        .empty-hint { font-size: 12px; color: #666; font-style: italic; }

        .search-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .search-modal-content { background: #1a1a1a !important; color: #eee !important; padding: 20px; border-radius: 12px; border: 1px solid #333; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .search-modal-content h4 { margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; color: #fff; font-size: 16px;}
        
        .search-input, .search-select { background: #0a0a0a !important; border: 1px solid #444 !important; color: #fff !important; padding: 8px 12px; border-radius: 6px; width: 100%; box-sizing: border-box; outline: none; transition: border 0.3s; }
        .search-btn-confirm { background: #1989fa; border: none; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; white-space: nowrap;}
        .search-btn-confirm:disabled { background: #555; cursor: not-allowed; }
        .search-btn-cancel { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #aaa; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; transition: background 0.2s; font-size: 14px;}

        .van-popup { background: #1a1a1a !important; color: #eee !important; border-top: 1px solid #333; }
        .van-rate__item--full .van-icon { color: #e6a23c !important; }
        .van-rate__item--void .van-icon { color: #444 !important; }

        @media (max-width: 850px) {
            .layout-wrapper { flex-direction: column; }
            .video-side { flex: none; height: 50vh; }
            .panel-side { width: 100%; flex: 1; border-left: none; border-top: 1px solid #333; }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="layout-wrapper">
        <div class="video-side" @touchstart="handleTouchStart" @touchend="handleTouchEnd">
            <div style="position:absolute;top:18px;left:18px;z-index:20;">
                <a href="http://one4.zin6.site:5000" target="_blank"><img src="/static/logo.png" alt="LOGO" style="height:40px;" onerror="this.style.display='none'"></a>
            </div>

            <div v-if="isLoading" class="loading-screen" style="position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:50;">
                <div style="color:#fff;font-size:18px;">加载中...</div>
            </div>

            <div class="video-box" v-show="!isLoading && state.videos?.length" style="height: 100%; padding:0; display:flex; justify-content:center; align-items:center;">
                <div class="video-container" style="height: 100%; width: 100%;">
                    <video
                        v-for="(video, index) in videoQueue" :key="video.id" :ref="'video' + index" :src="getVideoUrl(video.id)"
                        :class="[videoClass, { 'active-video': index === activeVideoIndex, 'hidden-video': index !== activeVideoIndex }]"
                        :muted="index !== activeVideoIndex" :controls="index === activeVideoIndex"
                        preload="auto" playsinline
                        @ended="nextVideo" @loadeddata="onVideoLoaded(index)" @canplaythrough="onVideoReady(index)"
                    ></video>
                </div>
            </div>
            <div v-show="!isLoading && (!state.videos || state.videos.length === 0)" style="color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;">
                <div>暂无满足条件的视频</div>
            </div>
        </div>

        <div class="panel-side">
            <header-panel
                ref="headerRef"
                :state="state"
                :video-index="videoIndex"
                :totalpage="state.totalpage"
                :current-video="currentVideo"
                :current-video-score="currentVideo?.score"
                :last-like-type="lastLikeType"
                :save-status="tagPanelRef?.autoSaveStatus"
                :sync-enabled="syncEnabled"
                :sync-count="syncMemory.length"
                @action="handleAction"
                @jump="jumpTo"
                @update-score="handleUpdateScore"
                @trigger-search="loadVideos(false, 0)"
                @open-history="tagPanelRef?.openHistoryPanel()"
                @open-config="tagPanelRef?.openConfigPanel()"
                @open-stats="statsPanelRef?.analyzeData()"
                @refresh-all="refreshAllPaths"
                @restore-name="tagPanelRef?.restoreOriginalName()"
                @toggle-sync="saveSyncState"
                @clear-sync="clearSyncMemory"
            ></header-panel>

            <div class="panel-content" v-show="!isLoading && state.videos?.length">
                <tag-panel 
                    ref="tagPanelRef"
                    :current-video="currentVideo" 
                    :videos="state.videos" 
                    :blacklist="blacklist"
                    :current-index="currentIndex"
                    :search-state="state"
                    :path-list="pathList"
                    :sync-enabled="syncEnabled"
                    :sync-memory="syncMemory"
                    @reload-videos="(append, idx) => loadVideos(append, idx)"
                    @add-blacklist="addBlacklistWord"
                    @remove-blacklist="removeBlacklistWord"
                    @add-path="addPath"
                    @index-path="indexPath"
                    @index-path-del="indexPath_del"
                    @update-sync="updateSyncMemory"
                ></tag-panel>
            </div>
            
            <stats-panel ref="statsPanelRef"></stats-panel>
        </div>
    </div>
</div>

<script>
const { createApp, reactive, onMounted, computed, ref, watch } = Vue

window.DyAPI = {
    fetchVideos: async (params) => (await axios.get('/dyfn/videos', { params })).data,
    fetchVideoCount: async (params) => (await axios.get('/dyfn/videos/count', { params })).data.total || 0,
    updateScore: async (id, score) => (await axios.post('/dyfn/videos/update_score', { id, score })).data,
    getPaths: async () => (await axios.get('/dyfn/video-paths')).data.paths || [],
    addPath: async (path) => (await axios.post('/dyfn/video-paths', { path })).data,
    indexPath: async (path, del = false) => (await axios.post(`/dyfn/video-paths/index?${del ? 'del=1' : 'all=1'}`, { path })).data,
    updateAllPaths: async () => (await axios.get('/dyfn/video-paths/updatefile')).data,
    getBlacklist: async () => (await axios.get('/dyfn/sys_tags/blacklist')).data.blacklist || [],
    updateBlacklist: async (blacklist) => (await axios.post('/dyfn/sys_tags/blacklist', { blacklist })).data,
    getTagGroups: async () => (await axios.get('/dyfn/sys_tags/tag_groups')).data,
    saveTagGroups: async (groups) => (await axios.post('/dyfn/sys_tags/tag_groups', { groups })).data,
    tokenize: async (filename) => (await axios.post('/dyfn/sys_tags/tokenize', { filename })).data,
    queueRename: async (data) => (await axios.post('/dyfn/sys_tags/queue_rename', data)).data,
    executeRenames: async (mode = 'queue_only') => (await axios.post(`/dyfn/sys_tags/execute_renames?mode=${mode}`)).data,
    getRenameHistory: async () => (await axios.get('/dyfn/sys_tags/rename_history')).data,
    restoreRename: async (log_id) => (await axios.post('/dyfn/sys_tags/restore_rename', { log_id })).data,
    retryFailed: async () => (await axios.post('/dyfn/sys_tags/retry_failed')).data,
    migrateLegacy: async (tag_groups) => (await axios.post('/dyfn/sys_tags/migrate_legacy', { tag_groups })).data
};

function useVideoPlayer(state, loadVideosCb) {
    const currentIndex = ref(0);
    const videoQueue = ref([]);
    const activeVideoIndex = ref(1);
    const videoLoadStates = ref([false, false, false]);
    const videoClass = ref('video-portrait');
    const lastLikeType = ref('');
    const isSwitching = ref(false);

    const currentVideo = computed(() => (videoQueue.value.length > 0 && activeVideoIndex.value < videoQueue.value.length) ? videoQueue.value[activeVideoIndex.value] || {} : state.videos[currentIndex.value] || {});
    const videoIndex = computed(() => (state.searchKeyword || state.videos.length > 0) ? state.globalOffset + currentIndex.value + 1 : null);

    watch(videoIndex, (newVal) => { if (newVal) localStorage.setItem('dy_current_index', newVal); });

    function refreshQueue() {
        if (!state.videos || state.videos.length === 0) return;
        videoQueue.value = []; activeVideoIndex.value = 1; videoLoadStates.value = [false, false, false];
        for (let i = -1; i <= 1; i++) {
            let targetIndex = (currentIndex.value + i + state.videos.length) % state.videos.length;
            if (state.videos[targetIndex]) videoQueue.value.push(state.videos[targetIndex]);
        }
        document.querySelectorAll('video').forEach(v => { v.pause(); v.muted = true; });
    }

    function updateVideoQueue(direction = 'next') {
        if (state.videos.length === 0) return;
        if (direction === 'next') { videoQueue.value.shift(); videoQueue.value.push(state.videos[(currentIndex.value + 1) % state.videos.length]); } 
        else { videoQueue.value.pop(); videoQueue.value.unshift(state.videos[(currentIndex.value - 1 + state.videos.length) % state.videos.length]); }
        videoLoadStates.value = [false, false, false];
    }

    function prevVideo() {
        if (isSwitching.value || state.videos.length === 0) return;
        isSwitching.value = true; 
        document.querySelectorAll('video').forEach(v => v.pause());
        currentIndex.value = currentIndex.value - 1 < 0 ? state.videos.length - 1 : currentIndex.value - 1;
        updateVideoQueue('prev'); setTimeout(() => { playActiveVideo(); isSwitching.value = false; }, 200);
    }

    async function nextVideo() {
        if (isSwitching.value || state.videos.length === 0) return;
        isSwitching.value = true; 
        document.querySelectorAll('video').forEach(v => v.pause());
        if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
        
        let nextIndex = currentIndex.value + 1, isPageChange = false;
        if (nextIndex >= state.videos.length) {
            if (state.page * state.pageSize < state.totalVideos) { state.page++; await loadVideosCb(true); isPageChange = true; }
            nextIndex = nextIndex % state.videos.length;
        }
        currentIndex.value = nextIndex;
        if (isPageChange) refreshQueue(); else updateVideoQueue('next');
        setTimeout(() => { playActiveVideo(); isSwitching.value = false; }, 250);
    }

    function playActiveVideo() {
        const domIndex = activeVideoIndex.value, videos = document.querySelectorAll('video');
        if (!videos.length || !videos[domIndex]) return;
        videos.forEach((v, i) => { if (i !== domIndex) { v.pause(); v.muted = true; v.currentTime = 0; } });
        const activeVideo = videos[domIndex];
        activeVideo.muted = false; if (activeVideo.ended) activeVideo.currentTime = 0;
        const playPromise = activeVideo.play();
        if (playPromise !== undefined) playPromise.catch(() => { activeVideo.muted = true; activeVideo.play().catch(() => {}); });
        if (activeVideo.videoWidth && activeVideo.videoHeight) { videoClass.value = (activeVideo.videoHeight / activeVideo.videoWidth) <= 1.1 ? 'video-landscape' : 'video-portrait'; } 
        else { activeVideo.addEventListener('loadedmetadata', () => { videoClass.value = (activeVideo.videoHeight / activeVideo.videoWidth) <= 1.1 ? 'video-landscape' : 'video-portrait'; }, { once: true }); }
    }

    function onVideoReady(index) { videoLoadStates.value[index] = true; const video = document.querySelectorAll('video')[index]; if (!video) return; if (index === activeVideoIndex.value) { if (video.paused) video.play().catch(() => {}); } else { video.pause(); video.muted = true; } }
    function onVideoLoaded(index) { videoLoadStates.value[index] = true; }
    function getVideoUrl(id) { return `/dyfn/videos/${id}/stream`; }
    function previewForward() { const v = document.querySelectorAll('video')[activeVideoIndex.value]; if (v && v.duration) v.currentTime = Math.min(v.duration, v.currentTime + Math.max(5, v.duration * 0.05)); }
    function previewBackward() { const v = document.querySelectorAll('video')[activeVideoIndex.value]; if (v && v.duration) v.currentTime = Math.max(0, v.currentTime - Math.max(5, v.duration * 0.05)); }
    function seekTo(ratio) { const v = document.querySelectorAll('video')[activeVideoIndex.value]; if (v && v.duration) v.currentTime = v.duration * ratio; }

    let touchStartY = 0; let touchActive = false;
    function handleTouchStart(e) { if (isSwitching.value) return; touchActive = true; touchStartY = e.touches[0].clientY; }
    function handleTouchEnd(e) { if (!touchActive) return; const deltaY = e.changedTouches[0].clientY - touchStartY; if (Math.abs(deltaY) > 60) { if (deltaY < 0) nextVideo(); else prevVideo(); } touchActive = false; }

    async function jumpTo(target) {
        if (isNaN(target) || target < 1) target = 1; if (target > state.totalVideos) target = state.totalVideos;
        state.page = Math.floor((target - 1) / state.pageSize) + 1; 
        const indexInPage = (target - 1) % state.pageSize;
        await loadVideosCb(false, indexInPage); 
        setTimeout(() => { playActiveVideo(); }, 200);
    }

    async function toggleLike() { if (!currentVideo.value?.id) return; const newScore = currentVideo.value.score === 5 ? 0 : 5; await window.DyAPI.updateScore(currentVideo.value.id, newScore); currentVideo.value.score = newScore; lastLikeType.value = newScore === 5 ? 'like' : ''; setTimeout(() => lastLikeType.value = '', 600); }
    async function toggleDislike() { if (!currentVideo.value?.id) return; const newScore = currentVideo.value.score === 1 ? 0 : 1; await window.DyAPI.updateScore(currentVideo.value.id, newScore); currentVideo.value.score = newScore; lastLikeType.value = newScore === 1 ? 'dislike' : ''; setTimeout(() => lastLikeType.value = '', 600); }
    
    return { currentIndex, videoQueue, activeVideoIndex, videoClass, lastLikeType, currentVideo, videoIndex, refreshQueue, prevVideo, nextVideo, playActiveVideo, onVideoReady, onVideoLoaded, getVideoUrl, previewForward, previewBackward, seekTo, handleTouchStart, handleTouchEnd, jumpTo, toggleLike, toggleDislike };
}

const app = createApp({
    setup() {
        const state = reactive({ videos: [], page: 1, pageSize: 10, searchKeyword: '', excludeKeyword: '', searchScore: 0, searchSize: 0, sortBy: '', totalVideos: 0, totalpage: 0, globalOffset: 0 });
        const isLoading = ref(true);

        const headerRef = ref(null);
        const tagPanelRef = ref(null);
        const statsPanelRef = ref(null);

        const syncEnabled = ref(JSON.parse(localStorage.getItem('dy_sync_enabled') ?? 'true'));
        const syncMemory = ref(JSON.parse(localStorage.getItem('dy_sync_memory') || '[]'));
        
        function saveSyncState(val) { syncEnabled.value = val; localStorage.setItem('dy_sync_enabled', JSON.stringify(val)); }
        function clearSyncMemory() { syncMemory.value = []; localStorage.setItem('dy_sync_memory', '[]'); vant.showToast('已清空同源记忆'); }
        function updateSyncMemory(newMem) { syncMemory.value = newMem; localStorage.setItem('dy_sync_memory', JSON.stringify(newMem)); }

        const playerModule = useVideoPlayer(state, loadVideos);
        const {
            currentIndex, videoQueue, activeVideoIndex, videoClass, lastLikeType, 
            currentVideo, videoIndex, refreshQueue, prevVideo, nextVideo, 
            playActiveVideo, onVideoReady, onVideoLoaded, getVideoUrl, 
            previewForward, previewBackward, seekTo, handleTouchStart, handleTouchEnd, 
            jumpTo, toggleLike, toggleDislike
        } = playerModule;

        function handleAction(type) {
            if(type === 'prev') prevVideo();
            else if(type === 'next') nextVideo();
            else if(type === 'like') toggleLike();
            else if(type === 'dislike') toggleDislike();
        }

        async function handleUpdateScore(newScore) {
            if (currentVideo.value?.id) { 
                await window.DyAPI.updateScore(currentVideo.value.id, newScore); 
                currentVideo.value.score = newScore; 
            }
        }

        const pathList = ref([]);
        const blacklist = ref([]);
        
        async function loadVideos(append = false, startIndex = 0) {
            isLoading.value = true;
            const params = { page: state.page, page_size: state.pageSize, search: state.searchKeyword, exclude: state.excludeKeyword, score: state.searchScore, size: state.searchSize, sort_by: state.sortBy };
            try {
                const newVideos = await window.DyAPI.fetchVideos(params);
                if (append) state.videos.push(...newVideos); 
                else { state.videos = newVideos; state.globalOffset = (state.page - 1) * state.pageSize; currentIndex.value = startIndex; }
                refreshQueue();
            } finally { isLoading.value = false; }
        }

        async function addPath(targetPath) { vant.showLoadingToast({ message: '扫描中...', forbidClick: true, duration: 0 }); try { await window.DyAPI.addPath(targetPath); pathList.value = await window.DyAPI.getPaths(); await window.DyAPI.indexPath(targetPath); vant.closeToast(); vant.showSuccessToast('完成'); await loadVideos(false, 0); } catch(e) { vant.closeToast(); vant.showFailToast('失败'); } }
        async function indexPath(path) { await window.DyAPI.indexPath(path); vant.showSuccessToast('索引完成'); await loadVideos(false, 0); }
        async function refreshAllPaths() { await window.DyAPI.updateAllPaths(); vant.showSuccessToast('全库更新完成'); await loadVideos(false, 0); }
        async function indexPath_del(path) { await window.DyAPI.indexPath(path, true); pathList.value = await window.DyAPI.getPaths(); await loadVideos(false, 0); }
        async function addBlacklistWord(kw) { if(!blacklist.value.includes(kw)) { blacklist.value.push(kw); await window.DyAPI.updateBlacklist(blacklist.value); } }
        async function removeBlacklistWord(idx) { blacklist.value.splice(idx, 1); await window.DyAPI.updateBlacklist(blacklist.value); }

        onMounted(async () => {
            let savedIndex = parseInt(localStorage.getItem('dy_current_index'));
            
            isLoading.value = true;
            pathList.value = await window.DyAPI.getPaths();
            blacklist.value = await window.DyAPI.getBlacklist();
            
            headerRef.value?.loadFromUrlParams();
            
            state.totalVideos = state.totalpage = await window.DyAPI.fetchVideoCount({ search: state.searchKeyword, exclude: state.excludeKeyword, score: state.searchScore, size: state.searchSize });

            let startIndex = 0;
            if (savedIndex && savedIndex > 0 && savedIndex <= state.totalVideos) {
                state.page = Math.floor((savedIndex - 1) / state.pageSize) + 1; startIndex = (savedIndex - 1) % state.pageSize;
            } else { state.page = 1; }

            await loadVideos(false, startIndex);
            isLoading.value = false;
            setTimeout(() => { playActiveVideo(); }, 500);
            
            // 🌟 核心修复：滚轮精准防误触拦截 🌟
            window.addEventListener('wheel', (e) => { 
                if (e.target.closest('.panel-side') || e.target.closest('.van-popup') || e.target.closest('.search-modal')) return;
                if (Math.abs(e.deltaY) < 30) return; 
                if (e.deltaY > 0) nextVideo(); else if (e.deltaY < 0) prevVideo(); 
            });
            window.addEventListener('keydown', (e) => { 
                if (e.target.tagName === 'INPUT') return; 
                if (e.key === 'ArrowLeft') previewBackward(); else if (e.key === 'ArrowRight') previewForward();
                else if (e.key === 'ArrowDown') nextVideo(); else if (e.key === 'ArrowUp') prevVideo();
                else if (e.key === 'Z' || e.key === 'z') toggleLike(); else if (e.key === 'X' || e.key === 'x') toggleDislike();
                else if (e.key === ' ') { e.preventDefault(); const v = document.querySelectorAll('video')[activeVideoIndex.value]; if(v) v.paused ? v.play() : v.pause(); }
                else if (e.key === '`' || e.key === '·') seekTo(0.5);
            });
            window.addEventListener('dblclick', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
                const v = document.querySelectorAll('video')[activeVideoIndex.value];
                if (!document.fullscreenElement && v) { if (v.requestFullscreen) v.requestFullscreen().catch(() => {}); } 
                else if (document.fullscreenElement) { document.exitFullscreen().catch(() => {}); }
            });
            window.addEventListener('popstate', () => {
                if (headerRef.value?.loadFromUrlParams()) headerRef.value?.doSearch();
                else { headerRef.value?.clearSearch(); loadVideos(false, 0); }
            });
        });

        return {
            state, isLoading,
            headerRef, tagPanelRef, statsPanelRef, videoIndex, videoQueue, activeVideoIndex, videoClass, lastLikeType, currentVideo, currentIndex, blacklist, pathList,
            getVideoUrl, onVideoLoaded, onVideoReady, nextVideo, handleTouchStart, handleTouchEnd, handleUpdateScore,
            handleAction, jumpTo, loadVideos, addPath, indexPath, refreshAllPaths, indexPath_del, addBlacklistWord, removeBlacklistWord,
            syncEnabled, syncMemory, saveSyncState, clearSyncMemory, updateSyncMemory
        };
    }
});

app.component('header-panel', HeaderPanel);
app.component('tag-panel', TagPanel);
app.component('stats-panel', StatsPanel);
app.use(vant).mount('#app');
</script>
