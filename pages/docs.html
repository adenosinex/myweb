<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动态知识库</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        #nprogress .bar { background: #2563eb !important; height: 3px !important; }
        #nprogress .peg { box-shadow: 0 0 10px #2563eb, 0 0 5px #2563eb !important; }
        #nprogress .spinner { display: none !important; }
        .markdown-body { background-color: transparent; }
        
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 拖拽悬停时的过度效果 */
        .drop-zone-active { background-color: #eff6ff !important; border-color: #93c5fd !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden h-screen flex flex-col font-sans" x-data="docApp()">

    <div class="flex items-center p-3 bg-white border-b border-slate-200 z-50 shadow-sm">
        <button @click="sidebarOpen = !sidebarOpen" class="w-10 h-10 rounded-lg flex items-center justify-center mr-3 bg-white text-slate-900 text-xl hover:bg-blue-50 hover:text-blue-600 transition md:hidden shrink-0">
            ☰
        </button>
        <div class="font-semibold text-lg overflow-hidden text-ellipsis whitespace-nowrap">知识库文档</div>
    </div>

    <div class="flex flex-1 overflow-hidden relative">
        <div x-show="sidebarOpen && window.innerWidth < 768" 
             x-transition.opacity 
             @click="sidebarOpen = false"
             class="fixed inset-0 bg-black/40 z-30 md:hidden"></div>
        
        <div class="w-[280px] bg-white border-r border-slate-200 flex flex-col z-40 h-full absolute md:relative left-0 top-0 transition-transform duration-300 shadow-lg md:shadow-none"
             :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">
            
            <div class="p-5 border-b border-slate-200 flex justify-between items-center shrink-0 transition-colors sticky top-0 bg-white/95 backdrop-blur z-20 border-2 border-transparent"
                 @dragover.prevent.stop="dragOverFolder = 'root'"
                 @dragleave.prevent.stop="dragOverFolder = null"
                 @drop.prevent.stop="handleDrop($event, '')"
                 :class="dragOverFolder === 'root' ? 'drop-zone-active text-blue-800' : ''">
                <h3 class="m-0 text-base font-semibold flex items-center gap-2 pointer-events-none">📂 知识库 (根目录)</h3>
                <a href="/docs-edit" class="text-xs text-blue-600 no-underline px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 transition z-10">编辑</a>
            </div>

            <div class="px-4 py-3 border-b border-slate-200 bg-slate-50/50">
                <div class="relative">
                    <input type="text" x-model="searchQuery" @input.debounce.300ms="performSearch" placeholder="全文搜索..." 
                           class="w-full pl-9 pr-3 py-1.5 bg-white border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-all">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                </div>
            </div>
            
            <div class="flex-1 p-3 overflow-y-auto no-scrollbar pb-24 relative" x-ref="sidebarScroll" @dragover="autoScroll($event)">
                
                <div x-show="searchQuery !== ''">
                    <div x-show="isSearching" class="text-center text-sm text-slate-400 py-4">搜索中...</div>
                    <div x-show="!isSearching && searchResults && searchResults.length === 0" class="text-center text-sm text-slate-400 py-4">未找到相关文档</div>
                    
                    <div x-show="!isSearching && searchResults && searchResults.length > 0" class="space-y-1">
                        <template x-for="doc in searchResults" :key="doc.id">
                            <div @click.stop="selectDoc(doc.id)"
                                 class="px-3 py-2 cursor-pointer rounded-md text-sm transition flex items-center gap-2 border-l-2 bg-white"
                                 :class="activeDoc === doc.id ? 'bg-blue-50 text-blue-600 font-medium border-blue-600 translate-x-1 shadow-sm' : 'text-slate-500 border-transparent hover:bg-slate-50 hover:text-slate-900 hover:border-slate-300 hover:translate-x-1'">
                                <span class="text-base transition-opacity duration-200" :class="activeDoc === doc.id ? 'opacity-100' : 'opacity-40'">📄</span>
                                <span class="whitespace-nowrap overflow-hidden text-ellipsis flex-1 pointer-events-none" x-text="doc.title"></span>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="searchQuery === ''">
                    <template x-for="folder1 in Object.values(tree.folders)" :key="folder1.path">
                        <div class="mb-2 rounded-lg border-2 border-transparent transition-colors"
                             @dragover.prevent.stop="dragOverFolder = folder1.path; autoScroll($event)"
                             @dragleave.prevent.stop="dragOverFolder = null"
                             @drop.prevent.stop="handleDrop($event, folder1.path)"
                             :class="dragOverFolder === folder1.path ? 'drop-zone-active' : ''">
                            
                            <div @click="folder1.open = !folder1.open" 
                                 class="px-2 py-2 cursor-pointer rounded-md flex items-center justify-between text-sm transition select-none text-slate-700 hover:bg-slate-100">
                                <div class="flex items-center gap-2 font-medium pointer-events-none">
                                    <span x-text="folder1.open ? '📂' : '📁'"></span>
                                    <span x-text="folder1.name"></span>
                                </div>
                                <span class="text-xs text-slate-400 transition-transform duration-300 pointer-events-none" :class="folder1.open ? '' : '-rotate-90'">▼</span>
                            </div>
                            
                            <div x-show="folder1.open" x-collapse>
                                <div class="pl-2 mt-1 space-y-1 border-l-2 border-slate-100 ml-3 pb-1">
                                    
                                    <template x-for="folder2 in Object.values(folder1.folders)" :key="folder2.path">
                                        <div class="mb-1 rounded-md border-2 border-transparent transition-colors"
                                             @dragover.prevent.stop="dragOverFolder = folder2.path; autoScroll($event)"
                                             @dragleave.prevent.stop="dragOverFolder = null"
                                             @drop.prevent.stop="handleDrop($event, folder2.path)"
                                             :class="dragOverFolder === folder2.path ? 'drop-zone-active' : ''">
                                            
                                            <div @click="folder2.open = !folder2.open"
                                                 class="px-2 py-1.5 cursor-pointer rounded-md flex items-center justify-between text-sm transition select-none text-slate-600 hover:bg-slate-100">
                                                <div class="flex items-center gap-2 pointer-events-none">
                                                    <span x-text="folder2.open ? '📂' : '📁'"></span>
                                                    <span x-text="folder2.name"></span>
                                                </div>
                                            </div>
                                            
                                            <div x-show="folder2.open" x-collapse>
                                                <div class="pl-2 mt-1 space-y-1 border-l-2 border-slate-100 ml-3 pb-1">
                                                    <template x-for="doc in folder2.items" :key="doc.id">
                                                        <div @click.stop="selectDoc(doc.id)"
                                                             draggable="true" @dragstart.stop="dragStart($event, doc.id, folder2.path)"
                                                             class="px-3 py-1.5 cursor-pointer rounded-md text-sm transition flex items-center gap-2 border-l-2 bg-white"
                                                             :class="activeDoc === doc.id ? 'bg-blue-50 text-blue-600 font-medium border-blue-600 translate-x-1 shadow-sm' : 'text-slate-500 border-transparent hover:bg-slate-50 hover:text-slate-900 hover:border-slate-300 hover:translate-x-1'">
                                                            <span class="text-base transition-opacity duration-200 cursor-grab active:cursor-grabbing" :class="activeDoc === doc.id ? 'opacity-100' : 'opacity-40'">📄</span>
                                                            <span class="whitespace-nowrap overflow-hidden text-ellipsis flex-1 pointer-events-none" x-text="doc.title"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>

                                    <template x-for="doc in folder1.items" :key="doc.id">
                                        <div @click.stop="selectDoc(doc.id)"
                                             draggable="true" @dragstart.stop="dragStart($event, doc.id, folder1.path)"
                                             class="px-3 py-1.5 cursor-pointer rounded-md text-sm transition flex items-center gap-2 border-l-2 bg-white mx-1"
                                             :class="activeDoc === doc.id ? 'bg-blue-50 text-blue-600 font-medium border-blue-600 translate-x-1 shadow-sm' : 'text-slate-500 border-transparent hover:bg-slate-50 hover:text-slate-900 hover:border-slate-300 hover:translate-x-1'">
                                            <span class="text-base transition-opacity duration-200 cursor-grab active:cursor-grabbing" :class="activeDoc === doc.id ? 'opacity-100' : 'opacity-40'">📄</span>
                                            <span class="whitespace-nowrap overflow-hidden text-ellipsis flex-1 pointer-events-none" x-text="doc.title"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>

                    <div class="space-y-1 mt-3 pt-2 border-t border-slate-100">
                        <template x-for="doc in tree.items" :key="doc.id">
                            <div @click.stop="selectDoc(doc.id)"
                                 draggable="true" @dragstart.stop="dragStart($event, doc.id, '')"
                                 class="px-3 py-2 cursor-pointer rounded-md text-sm transition flex items-center gap-2 border-l-2 bg-white"
                                 :class="activeDoc === doc.id ? 'bg-blue-50 text-blue-600 font-medium border-blue-600 translate-x-1 shadow-sm' : 'text-slate-500 border-transparent hover:bg-slate-50 hover:text-slate-900 hover:border-slate-300 hover:translate-x-1'">
                                <span class="text-base transition-opacity duration-200 cursor-grab active:cursor-grabbing" :class="activeDoc === doc.id ? 'opacity-100' : 'opacity-40'">📄</span>
                                <span class="whitespace-nowrap overflow-hidden text-ellipsis flex-1 pointer-events-none" x-text="doc.title"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto scroll-smooth relative h-full pt-14 md:pt-10" x-ref="scrollContainer">
            <div class="max-w-[880px] mx-auto px-5 pb-10">
                <div class="bg-white px-8 py-10 rounded-2xl shadow-md min-h-[calc(100vh-120px)] markdown-body" x-html="content">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('docApp', () => ({
                sidebarOpen: window.innerWidth >= 768,
                tree: { items: [], folders: {} },
                activeDoc: null,
                maxLevel: 2, 
                dragOverFolder: null,
                content: `
                    <div class="text-center pt-24 text-slate-500">
                        <div class="text-5xl mb-4 opacity-20">📄</div>
                        请从左侧选择文档
                    </div>`,
                abortController: null,
                
                // 搜索相关状态
                searchQuery: '',
                isSearching: false,
                searchResults: null,

                async init() {
                    window.addEventListener('resize', () => {
                        if (window.innerWidth >= 768) this.sidebarOpen = true;
                    });
                    await this.loadList();
                },

                // 新增：执行搜索逻辑
                async performSearch() {
                    if (!this.searchQuery.trim()) {
                        this.searchResults = null;
                        return;
                    }
                    
                    this.isSearching = true;
                    try {
                        const res = await fetch(`/api/docs/search?q=${encodeURIComponent(this.searchQuery)}`);
                        const data = await res.json();
                        this.searchResults = data.results || [];
                    } catch(e) {
                        console.error('搜索请求失败:', e);
                        this.searchResults = [];
                    } finally {
                        this.isSearching = false;
                    }
                },

                async loadList() {
                    try {
                        const res = await fetch('/api/docs/list');
                        const data = await res.json();
                        
                        let newTree = { items: [], folders: {} };
                        let fetchQueue = [];

                        data.docs.forEach(docName => {
                            let parts = docName.split('_');
                            let folderDepth = Math.min(parts.length - 1, this.maxLevel);
                            
                            let folders = parts.slice(0, folderDepth);
                            let title = parts.slice(folderDepth).join('_');
                            let docObj = { id: docName, title: title };

                            let currentLevel = newTree;
                            let currentPath = '';

                            folders.forEach(f => {
                                currentPath = currentPath ? `${currentPath}_${f}` : f;
                                if (!currentLevel.folders[f]) {
                                    currentLevel.folders[f] = { 
                                        name: f, 
                                        path: currentPath,
                                        open: true, 
                                        items: [], 
                                        folders: {} 
                                    };
                                }
                                currentLevel = currentLevel.folders[f];
                            });

                            currentLevel.items.push(docObj);
                            fetchQueue.push(docObj);
                        });

                        this.tree = newTree;

                        fetchQueue.forEach(async (docObj) => {
                            try {
                                const rawRes = await fetch(`/api/docs/raw/${encodeURIComponent(docObj.id)}`);
                                if (rawRes.ok) {
                                    const rawData = await rawRes.json();
                                    const match = rawData.content.match(/^(?:#+\s*)?([^\n]+)/);
                                    if (match && match[1]) {
                                        const parsedTitle = match[1].trim();
                                        if (parsedTitle.length < 40) docObj.title = parsedTitle;
                                    }
                                }
                            } catch (e) {}
                        });

                    } catch (e) {
                        this.content = '<p class="text-red-500 p-5 text-center">列表获取失败</p>';
                    }
                },

                autoScroll(e) {
                    const container = this.$refs.sidebarScroll;
                    if (!container) return;
                    const threshold = 60; 
                    const rect = container.getBoundingClientRect();
                    
                    if (e.clientY - rect.top < threshold) {
                        container.scrollTop -= 15; 
                    } else if (rect.bottom - e.clientY < threshold) {
                        container.scrollTop += 15; 
                    }
                },

                dragStart(e, docId, currentPath) {
                    e.dataTransfer.setData('text/plain', JSON.stringify({ docId, currentPath }));
                    e.dataTransfer.effectAllowed = 'move';
                },

                async handleDrop(e, targetPath) {
                    this.dragOverFolder = null;
                    const dataStr = e.dataTransfer.getData('text/plain');
                    if (!dataStr) return;

                    try {
                        const { docId: oldId, currentPath } = JSON.parse(dataStr);
                        
                        let pureFileName = oldId;
                        if (currentPath && oldId.startsWith(currentPath + '_')) {
                            pureFileName = oldId.substring(currentPath.length + 1);
                        }

                        const newId = targetPath ? `${targetPath}_${pureFileName}` : pureFileName;
                        if (oldId === newId) return;

                        NProgress.start();
                        
                        const res = await fetch('/api/docs/rename', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ oldName: oldId, newName: newId })
                        });
                        
                        if (!res.ok) throw new Error('移动失败，请检查后端接口');

                        if (this.activeDoc === oldId) this.activeDoc = newId;
                        await this.loadList();

                    } catch (e) {
                        alert(`⚠️ ${e.message}`);
                    } finally {
                        NProgress.done();
                    }
                },

                async selectDoc(docId) {
                    if (window.innerWidth < 768) this.sidebarOpen = false;
                    this.activeDoc = docId;

                    if (this.abortController) this.abortController.abort();
                    this.abortController = new AbortController();
                    const signal = this.abortController.signal;

                    this.content = '<div class="text-center pt-24 text-slate-500 animate-pulse">加载中...</div>';
                    NProgress.start();

                    try {
                        const resFast = await fetch(`/api/docs/content/${encodeURIComponent(docId)}`, { signal });
                        const dataFast = await resFast.json();
                        if (dataFast.error) throw new Error(dataFast.error);

                        this.content = dataFast.html;
                        this.$refs.scrollContainer.scrollTop = 0;
                        NProgress.set(0.6);

                        const resFresh = await fetch(`/api/docs/refresh/${encodeURIComponent(docId)}`, { signal });
                        const dataFresh = await resFresh.json();

                        if (!dataFresh.error && dataFresh.html !== dataFast.html) {
                            this.content = dataFresh.html;
                        }
                        NProgress.done();

                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            this.content = `<div class="text-red-500 p-5 text-center">⚠️ 加载失败: ${e.message}</div>`;
                            NProgress.done();
                        }
                    }
                }
            }));
        });
    </script>
</body>
</html>
