<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端幻境音乐</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }
        
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 顶部导航与分类 */
        .header { padding: 20px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 24px; font-weight: 700; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; color: transparent; }
        
        .search-box { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 15px; color: white; width: 200px; outline: none; transition: 0.3s; }
        .search-box:focus { background: rgba(255,255,255,0.15); border-color: var(--accent); width: 250px; }

        /* 分类标签栏 */
        .category-scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill { padding: 6px 16px; background: rgba(255,255,255,0.05); border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; transition: 0.2s; border: 1px solid transparent; }
        .cat-pill:hover { background: rgba(255,255,255,0.1); }
        .cat-pill.active { background: var(--accent); color: white; border-color: var(--accent-hover); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        /* 主列表区 */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; background: var(--card-bg); border-radius: 12px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; cursor: pointer; }
        .song-item:hover { transform: translateY(-2px); background: rgba(30, 41, 59, 0.9); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .song-info { display: flex; flex-direction: column; gap: 5px; }
        .song-name { font-size: 16px; font-weight: 500; }
        .song-tags { display: flex; gap: 6px; }
        .song-tag { font-size: 11px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: var(--text-sub); }
        
        /* 底部播放栏 */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 15px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .now-playing { font-size: 14px; color: var(--accent-hover); font-weight: bold; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        audio { width: 100%; max-width: 600px; outline: none; border-radius: 20px; }
        audio::-webkit-media-controls-panel { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-row">
            <h1>🎵 云端幻境</h1>
            <input type="text" id="searchInput" class="search-box" placeholder="搜索歌曲..." oninput="filterSongs()">
        </div>
        <div class="category-scroll" id="categoryBar">
            <div class="cat-pill active" onclick="selectCategory('全部', this)">全部</div>
            </div>
    </div>

    <div class="main-content" id="songList">
        <div style="text-align:center; color:#94a3b8; margin-top: 50px;">加载星辰大海中...</div>
    </div>

    <div class="player-bar">
        <div class="now-playing" id="nowPlayingText">享受安静的时刻...</div>
        <audio id="audioPlayer" controls autoplay></audio>
    </div>

<script>
    let allSongs = [];
    let tagsMap = {};       // {"song_name": ["emo", "流行"]}
    let categories = [];    // ["emo", "流行", "动感健身"]
    let currentCategory = '全部';

    async function init() {
        try {
            // 并行请求：获取音乐文件列表 和 数据库里的标签数据
            const [songsRes, tagsRes] = await Promise.all([
                fetch('/api/proxy/songs'),
                fetch('/api/tags')
            ]);
            
            allSongs = await songsRes.json();
            const tagsData = await tagsRes.json();
            
            tagsMap = tagsData.song_tags;
            categories = tagsData.categories;
            
            renderCategories();
            renderList(allSongs);
        } catch (e) {
            document.getElementById('songList').innerHTML = `<div style="text-align:center;color:#ef4444;">网络连接异常</div>`;
        }
    }

    // 渲染顶部分类栏
    function renderCategories() {
        const bar = document.getElementById('categoryBar');
        categories.forEach(cat => {
            const el = document.createElement('div');
            el.className = 'cat-pill';
            el.innerText = cat;
            el.onclick = function() { selectCategory(cat, this); };
            bar.appendChild(el);
        });
    }

    // 点击分类触发过滤
    function selectCategory(cat, element) {
        currentCategory = cat;
        // 样式切换
        document.querySelectorAll('.cat-pill').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        filterSongs();
    }

    // 搜索与分类双重过滤
    function filterSongs() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allSongs.filter(song => {
            const matchKeyword = song.toLowerCase().includes(keyword);
            let matchCategory = true;
            
            if (currentCategory !== '全部') {
                const songTags = tagsMap[song] || [];
                matchCategory = songTags.includes(currentCategory);
            }
            return matchKeyword && matchCategory;
        });
        
        renderList(filtered);
    }

    // 渲染歌曲列表
    function renderList(songs) {
        const listEl = document.getElementById('songList');
        listEl.innerHTML = '';
        
        if(songs.length === 0) {
            listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top:50px;">当前分类暂无歌曲</div>';
            return;
        }

        songs.forEach(song => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.onclick = () => playSong(song);
            
            const tags = tagsMap[song] || [];
            const tagsHtml = tags.map(t => `<span class="song-tag">${t}</span>`).join('');
            
            item.innerHTML = `
                <div class="song-info">
                    <div class="song-name">${song}</div>
                    <div class="song-tags">${tagsHtml}</div>
                </div>
                <div style="font-size: 20px; opacity: 0.5;">▶</div>
            `;
            listEl.appendChild(item);
        });
    }

    // 播放音乐
    function playSong(songName) {
        const player = document.getElementById('audioPlayer');
        player.src = `/stream/${encodeURIComponent(songName)}`;
        document.getElementById('nowPlayingText').innerText = `正在播放 • ${songName}`;
        player.play();
    }

    window.onload = init;
</script>

</body>
</html>
