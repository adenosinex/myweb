<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>云端幻境 - 播放器</title>
    <style>
        :root { 
            --bg: #0f172a; --drawer-bg: #0b1120; --card-bg: rgba(30, 41, 59, 0.6); 
            --text-main: #f8fafc; --text-sub: #94a3b8; 
            --accent: #3b82f6; --success: #10b981; 
            --safe-bottom: env(safe-area-inset-bottom, 15px);
            --safe-top: env(safe-area-inset-top, 20px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 底层背景色，也就是抽屉的颜色 */
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--drawer-bg); color: var(--text-main); 
            height: 100vh; overflow: hidden; 
        }

        /* ================= 抽屉区域 (底层，默认在左侧隐藏) ================= */
        .drawer {
            position: fixed; top: 0; left: 0; bottom: 0; width: 85vw; /* 占据约85%宽度 */
            padding: calc(var(--safe-top) + 20px) 15px 20px 20px;
            z-index: 0; display: flex; flex-direction: column;
        }
        .drawer-header { font-size: 18px; font-weight: bold; color: var(--text-sub); margin-bottom: 20px; }
        /* 核心：三列网格布局 */
        .drawer-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            overflow-y: auto; align-content: start;
        }
        .drawer-grid .cat-pill {
            text-align: center; padding: 10px 0; border-radius: 12px;
            background: rgba(255,255,255,0.05);
        }

        /* ================= 主应用包装器 (顶层，会被推向右侧) ================= */
        .app-wrapper {
            position: relative; z-index: 1;
            background: var(--bg); height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            /* 核心动效协议：平滑缩放与位移 */
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1), border-radius 0.4s;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        /* 当抽屉打开时，追加此类名 */
        .app-wrapper.squeezed {
            transform: translateX(85vw) scale(0.92); /* 挤到右边并缩小 */
            border-radius: 24px; /* 边缘变得圆润，像个卡片 */
        }
        
        /* 阻断层：当被挤压时，覆盖在应用上，点击即可恢复原状 */
        .app-mask {
            position: absolute; inset: 0; z-index: 999;
            background: transparent; display: none; cursor: pointer;
        }
        .app-wrapper.squeezed .app-mask { display: block; }

        /* ================= 头部与分类单行区 ================= */
        .header { 
            padding: calc(var(--safe-top) + 15px) 20px 10px 20px; 
            background: rgba(15, 23, 42, 0.75); border-bottom: 1px solid rgba(255,255,255,0.08); 
        }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 20px; color: var(--accent); white-space: nowrap;}
        
        .header-actions { display: flex; gap: 8px; align-items: center; flex: 1; justify-content: flex-end; }
        .search-box { 
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 8px; padding: 6px 10px; color: white; 
            width: 100%; max-width: 120px; outline: none; font-size: 14px;
        }
        .icon-btn { 
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 8px; padding: 6px 10px; color: white; cursor: pointer; 
            text-decoration: none; font-size: 13px; white-space: nowrap;
        }
        .icon-btn.active-local { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }

        /* 分类单行区：flex:1 占据剩余空间，右侧留给扩展按钮 */
        .cat-row-container { display: flex; align-items: center; gap: 10px; }
        .category-scroll { 
            display: flex; overflow-x: auto; gap: 8px; flex: 1; 
            scrollbar-width: none; padding-bottom: 2px;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-pill { 
            padding: 6px 14px; background: rgba(255,255,255,0.06); 
            border-radius: 20px; font-size: 13px; white-space: nowrap; 
            transition: 0.2s; cursor: pointer;
        }
        .cat-pill.active { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        .expand-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            border-radius: 50%; width: 28px; height: 28px; 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }

        /* ================= 列表区 ================= */
        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px calc(120px + var(--safe-bottom)) 15px; }
        .song-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: var(--card-bg); margin-bottom: 10px; border-radius: 12px; 
            cursor: pointer; border: 1px solid transparent; transition: 0.2s;
        }
        .song-item.playing { border: 1px solid var(--accent); background: rgba(59, 130, 246, 0.1); }
        .song-info { display: flex; flex-direction: column; gap: 5px; width: 85%; }
        .song-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .song-tag { font-size: 10px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: var(--text-sub); }
        .cached-badge { color: var(--success); font-size: 10px; border: 1px solid var(--success); padding: 2px 4px; border-radius: 4px; }

        /* ================= 播放器控制台 ================= */
        .player-bar { 
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 15px 20px var(--safe-bottom) 20px; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08); z-index: 100;
        }
        
        /* 采用原生的 Range 标签作为进度条 */
        .range-slider {
            -webkit-appearance: none; width: 100%; height: 20px; 
            background: transparent; outline: none; margin: 0 0 5px 0;
        }
        .range-slider::-webkit-slider-runnable-track {
            width: 100%; height: 4px; border-radius: 2px;
            /* 使用 CSS 变量动态填充左侧进度颜色 */
            background: linear-gradient(to right, var(--accent) var(--p, 0%), rgba(255,255,255,0.1) var(--p, 0%));
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%;
            background: white; margin-top: -4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .console-layout { display: flex; justify-content: space-between; align-items: center; }
        .now-playing-info { display: flex; flex-direction: column; width: 50%; overflow: hidden; }
        .now-playing-text { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;}
        .time-display { font-size: 11px; color: var(--text-sub); font-variant-numeric: tabular-nums;}
        .control-buttons { display: flex; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; transition: 0.2s;}
        .ctrl-btn.main-play { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; font-size: 16px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);}
        audio { display: none; }
    </style>
</head>
<body>

    <div class="drawer" id="drawer">
        <div class="drawer-header">全部分类</div>
        <div class="drawer-grid" id="drawerGrid">
            </div>
    </div>

    <div class="app-wrapper" id="appWrapper">
        <div class="app-mask" onclick="toggleDrawer()"></div>

        <div class="header">
            <div class="title-row">
                <h1>🎵 云端幻境</h1>
                <div class="header-actions">
                    <input type="text" id="searchInput" class="search-box" placeholder="搜索..." oninput="filterSongs()">
                    <button id="modeBtn" class="icon-btn" onclick="toggleMode()">☁️ 在线</button>
                    <a href="/player-cache.html" class="icon-btn" target="_blank">📦 管理</a>
                </div>
            </div>
            
            <div class="cat-row-container">
                <div class="category-scroll" id="categoryBar">
                    </div>
                <button class="expand-btn" onclick="toggleDrawer()">⊞</button>
            </div>
        </div>

        <div class="main-content" id="songList">读取中...</div>

        <div class="player-bar">
            <input type="range" id="progressRange" class="range-slider" min="0" max="100" value="0" step="0.1">
            
            <div class="console-layout">
                <div class="now-playing-info">
                    <div id="nowPlayingText" class="now-playing-text">准备就绪</div>
                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="durationTime">00:00</span>
                    </div>
                </div>
                <div class="control-buttons">
                    <button class="ctrl-btn" onclick="playPrev()">⏮</button>
                    <button class="ctrl-btn main-play" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
                    <button class="ctrl-btn" onclick="playNext()">⏭</button>
                </div>
            </div>
            <audio id="audioPlayer" preload="metadata"></audio>
        </div>
    </div>

<script>
    const CACHE_NAME = 'cloud-music-cache-v1';
    let allSongs = [];
    let tagsMap = {};       
    let categories = [];    
    let currentCategory = '全部';
    let currentFilteredSongs = []; 
    let cachedSongUrls = new Set();
    let currentPlaying = '';
    let isLocalMode = false;
    let currentBlobUrl = null;

    // --- DOM 缓存 ---
    const audio = document.getElementById('audioPlayer');
    const range = document.getElementById('progressRange');
    const currentTimeEl = document.getElementById('currentTime');

    async function init() {
        await checkLocalCache();
        try {
            const [songsRes, tagsRes] = await Promise.all([
                fetch('/api/proxy/songs'), fetch('/api/tags').catch(()=>({json:()=>({})}))
            ]);
            allSongs = await songsRes.json();
            const tagsData = await tagsRes.json();
            tagsMap = tagsData?.song_tags || {};
            categories = tagsData?.categories || [];
            
            renderCategories();
            filterSongs();
            setupAudioEngine(); 
        } catch (e) {
            document.getElementById('songList').innerHTML = '<div style="text-align:center;color:#ef4444;">网络异常，无法获取数据</div>';
        }
    }

    async function checkLocalCache() {
        const cache = await caches.open(CACHE_NAME);
        const requests = await cache.keys();
        cachedSongUrls = new Set(requests.map(req => new URL(req.url).pathname));
    }

    // ================= UI 动效协议 =================
    let isDrawerOpen = false;
    function toggleDrawer() {
        isDrawerOpen = !isDrawerOpen;
        const appWrapper = document.getElementById('appWrapper');
        if (isDrawerOpen) {
            appWrapper.classList.add('squeezed');
        } else {
            appWrapper.classList.remove('squeezed');
        }
    }

    // ================= 分类渲染 (双端同步) =================
    function renderCategories() {
        const bar = document.getElementById('categoryBar');
        const grid = document.getElementById('drawerGrid');
        bar.innerHTML = ''; grid.innerHTML = '';

        // 插入“全部”选项
        const allHtml = `<div class="cat-pill active" data-cat="全部" onclick="handleCategoryClick('全部')">全部</div>`;
        bar.innerHTML += allHtml; grid.innerHTML += allHtml;

        categories.forEach(cat => {
            const html = `<div class="cat-pill" data-cat="${cat}" onclick="handleCategoryClick('${cat}')">${cat}</div>`;
            bar.innerHTML += html;
            grid.innerHTML += html;
        });
    }

    function handleCategoryClick(cat) {
        currentCategory = cat;
        // 同步修改顶栏和侧边栏的选中状态
        document.querySelectorAll('.cat-pill').forEach(el => {
            if (el.getAttribute('data-cat') === cat) el.classList.add('active');
            else el.classList.remove('active');
        });
        filterSongs();
        if(isDrawerOpen) toggleDrawer(); // 点击后自动收起抽屉
        document.querySelector("#songList > div:nth-child(1)").click()
    }

    function filterSongs() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        currentFilteredSongs = allSongs.filter(song => {
            const matchKeyword = song.toLowerCase().includes(keyword);
            const matchCategory = currentCategory === '全部' ? true : (tagsMap[song] || []).includes(currentCategory);
            const matchLocal = isLocalMode ? cachedSongUrls.has(`/stream/${encodeURIComponent(song)}`) : true;
            return matchKeyword && matchCategory && matchLocal;
        });
        renderList();
    }

    function toggleMode() {
        isLocalMode = !isLocalMode;
        document.getElementById('modeBtn').classList.toggle('active-local');
        filterSongs();
    }

    function renderList() {
        const listEl = document.getElementById('songList');
        listEl.innerHTML = '';
        if (currentFilteredSongs.length === 0) {
            listEl.innerHTML = `<div style="text-align:center; color:var(--text-sub); margin-top: 20px;">无匹配歌曲</div>`;
            return;
        }

        currentFilteredSongs.forEach(song => {
            const item = document.createElement('div');
            item.className = `song-item ${song === currentPlaying ? 'playing' : ''}`;
            item.onclick = () => playSong(song);
            
            const tags = tagsMap[song] || [];
            let tagsHtml = tags.map(t => `<span class="song-tag">${t}</span>`).join('');
            
            if (cachedSongUrls.has(`/stream/${encodeURIComponent(song)}`)) {
                tagsHtml = `<span class="cached-badge">✓ 离线</span>` + tagsHtml;
            } else if (tags.length === 0) tagsHtml = `<span class="song-tag" style="opacity:0.5">未分类</span>`;

            item.innerHTML = `
                <div class="song-info">
                    <div class="song-name">${song.replace('.mp3', '')}</div>
                    <div class="song-tags">${tagsHtml}</div>
                </div>
                <div style="font-size:12px; color:var(--accent);">${song === currentPlaying ? (audio.paused ? '⏸' : '🎶') : ''}</div>
            `;
            listEl.appendChild(item);
        });
    }

    // ================= 极简原生进度条引擎 =================

    async function playSong(song) {
        currentPlaying = song;
        document.getElementById('nowPlayingText').innerText = song.replace(/\.(mp3|flac|wav)$/i, '');
        const urlPath = `/stream/${encodeURIComponent(song)}`;

        if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

        if (cachedSongUrls.has(urlPath)) {
            const cache = await caches.open(CACHE_NAME);
            const res = await cache.match(urlPath);
            if (res) {
                currentBlobUrl = URL.createObjectURL(await res.blob());
                audio.src = currentBlobUrl;
            }
        } else {
            audio.src = urlPath;
        }
        
        audio.play();
        renderList();
    }

    function togglePlayPause() {
        if (!audio.src || audio.src === window.location.href) return; 
        audio.paused ? audio.play() : audio.pause();
    }

    function playPrev() {
        if (currentFilteredSongs.length === 0 || !currentPlaying) return;
        let idx = currentFilteredSongs.indexOf(currentPlaying) - 1;
        playSong(currentFilteredSongs[idx < 0 ? currentFilteredSongs.length - 1 : idx]);
    }

    function playNext() {
        if (currentFilteredSongs.length === 0 || !currentPlaying) return;
        let idx = currentFilteredSongs.indexOf(currentPlaying) + 1;
        playSong(currentFilteredSongs[idx >= currentFilteredSongs.length ? 0 : idx]);
    }

    function formatTime(sec) {
        if (isNaN(sec)) return "00:00";
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function setupAudioEngine() {
        let isDragging = false;

        // 1. 底层音频播放时，更新原生 Range 的值和填充色
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && !isDragging) {
                const percent = (audio.currentTime / audio.duration) * 100;
                range.value = percent;
                // 核心：利用 CSS 变量动态绘制滑块左侧的高亮进度
                range.style.setProperty('--p', `${percent}%`);
                currentTimeEl.innerText = formatTime(audio.currentTime);
            }
        });

        // 2. 拖拽时：停止同步进度条，仅更新时间文字
        range.addEventListener('input', (e) => {
            isDragging = true;
            range.style.setProperty('--p', `${e.target.value}%`);
            if (audio.duration) {
                currentTimeEl.innerText = formatTime((e.target.value / 100) * audio.duration);
            }
        });

        // 3. 拖拽松手时：真正更改底层音频进度
        range.addEventListener('change', (e) => {
            isDragging = false;
            if (audio.duration) {
                audio.currentTime = (e.target.value / 100) * audio.duration;
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            document.getElementById('durationTime').innerText = formatTime(audio.duration);
        });

        audio.addEventListener('play', () => {
            document.getElementById('playPauseBtn').innerText = '⏸';
            renderList();
        });

        audio.addEventListener('pause', () => {
            document.getElementById('playPauseBtn').innerText = '▶';
            renderList();
        });

        audio.addEventListener('ended', playNext);
    }

    window.onload = init;
</script>
</body>
</html>
