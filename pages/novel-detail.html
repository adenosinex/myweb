<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情</title>
    <script>window.tailwind = { config: { } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f5; color: #27272a; font-family: -apple-system, "PingFang SC", sans-serif; }
        .markdown-body b { color: #3b82f6; font-weight: bold; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }
        .animate-fav { animation: heartBeat 0.8s ease-in-out; }
        /* 新增：隐藏书籍的高亮样式 */
        .is-hidden-mode { filter: grayscale(0.5); }
        .hidden-banner { background: repeating-linear-gradient(45deg, #fee2e2, #fee2e2 10px, #fecaca 10px, #fecaca 20px); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white/80 backdrop-blur-md shadow-sm p-4 flex items-center gap-4 shrink-0 sticky top-0 z-20 border-b border-zinc-100">
      <a href="/novel" class="p-2 bg-zinc-100 rounded-full hover:bg-zinc-200 transition active:scale-90">
   home
</a>

<button onclick="goBack()" class="p-2 bg-zinc-100 rounded-full hover:bg-zinc-200 transition active:scale-90 focus:outline-none">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
    </svg>
</button>
        <h1 id="pageTitle" class="font-bold text-lg truncate flex-1 text-zinc-800">加载中...</h1>
    </header>

    <div id="hiddenBanner" class="hidden-banner px-4 py-1.5 text-[10px] font-black text-red-600 text-center uppercase tracking-[0.2em] hidden">
        当前书籍处于“已隐藏”状态，不会出现在主书库列表中
    </div>

    <main id="mainContent" class="flex-1 overflow-y-auto bg-zinc-50/50 transition-all duration-500">
        <div class="bg-white p-8 shadow-sm border-b border-zinc-100 flex flex-col items-center">
            <div id="bookCover" class="w-28 h-36 bg-gradient-to-br from-zinc-100 to-zinc-200 rounded-2xl shadow-inner flex items-center justify-center text-6xl mb-6 ring-4 ring-white relative group transition-transform">
                📘
                <div id="coverFavIcon" class="absolute -top-2 -right-2 bg-white rounded-full p-1.5 shadow-md hidden">
                    <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
            </div>
            <h2 id="bookTitle" class="font-bold text-2xl mb-6 text-center text-zinc-900 leading-tight">...</h2>
            
            <div class="flex flex-col w-full max-w-sm gap-3">
                <button id="btnRead" onclick="continueReading()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-500 transition active:scale-[0.98]">
                    开始阅读
                </button>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="downloadFile()" class="w-full bg-zinc-100 text-zinc-600 font-bold py-3 rounded-xl border border-zinc-200 hover:bg-zinc-200 transition active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
                        下载原文
                    </button>
                    <button id="btnFav" onclick="toggleFavorite()" class="w-full bg-zinc-100 text-zinc-600 font-bold py-3 rounded-xl border border-zinc-200 hover:bg-zinc-200 transition active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
                        <svg id="iconFav" class="w-4 h-4 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        <span id="textFav">标记喜欢</span>
                    </button>
                </div>
                
                <button id="btnHide" onclick="toggleHideNovel()" class="w-full transition-all duration-300 font-bold py-3 rounded-xl border flex items-center justify-center gap-2 text-[11px] mt-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
                    <span id="textHide">从书库隐藏此书籍</span>
                </button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto px-4 py-8 space-y-8">
            <section>
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-blue-500 text-lg">🤖</span>
                    <h3 class="font-bold text-zinc-400 text-xs uppercase tracking-widest">AI 深度解析</h3>
                </div>
                <div id="aiSummary" class="bg-blue-50/50 border border-blue-100 text-blue-900 p-5 rounded-2xl text-[15px] leading-relaxed whitespace-pre-wrap markdown-body">
                    同步云端数据中...
                </div>
            </section>
            <section class="mb-20">
                <div class="flex justify-between items-end mb-4 px-1">
                    <div class="flex items-center gap-2">
                        <span class="text-zinc-400 text-lg">📑</span>
                        <h3 class="font-bold text-zinc-400 text-xs uppercase tracking-widest">章节目录</h3>
                    </div>
                    <span id="chapterCount" class="text-[10px] font-mono bg-zinc-200 text-zinc-500 px-2 py-0.5 rounded">...</span>
                </div>
                <div id="tocList" class="bg-white rounded-2xl border border-zinc-200 overflow-hidden divide-y divide-zinc-100 shadow-sm">
                    <div class="p-8 text-center text-zinc-400 text-sm flex flex-col items-center gap-3">
                        <div class="w-5 h-5 border-2 border-zinc-300 border-t-blue-500 rounded-full animate-spin"></div>
                        正在重组文本拓扑结构...
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelName = urlParams.get('novel');
        let parsedChapters = [];
        let lastReadIndex = 0;
        let isFavorited = false;
        let isHidden = false; // 新增状态变量

        if(!novelName) window.location.href = '/';
        
        const displayTitle = novelName.replace(/\.[^/.]+$/, "");
        document.getElementById('pageTitle').innerText = displayTitle;
        document.getElementById('bookTitle').innerText = displayTitle;

        async function init() {
            // 1. 获取书籍综合状态 (收藏 & 隐藏)
            try {
                const stateRes = await fetch(`/api/novel/state/${encodeURIComponent(novelName)}?t=${Date.now()}`);
                if (stateRes.ok) {
                    const stateData = await stateRes.json();
                    isFavorited = !!stateData.fav;
                    isHidden = !!stateData.deleted; // 假设后端 deleted 字段代表隐藏
                    updateFavUI();
                    updateHideUI();
                }
            } catch (e) { console.error("状态拉取失败:", e); }

            // 2. 加载 AI 详情及其他逻辑 (保持不变)
            loadAIDetail();
            loadTOC();
        }
function goBack() {
   history.back()
}
        // 切换隐藏状态逻辑
        async function toggleHideNovel() {
            const nextState = !isHidden;
           

            try {
                const res = await fetch(`/api/novel/state/${encodeURIComponent(novelName)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'deleted', active: nextState })
                });
                
                if (res.ok) {
                    isHidden = nextState;
                    updateHideUI();
                } else {
                    throw new Error();
                }
            } catch (e) { 
                alert("操作失败，请检查网络"); 
            }
            goBack()
        }

        // 更新隐藏相关的 UI
        function updateHideUI() {
            const main = document.getElementById('mainContent');
            const banner = document.getElementById('hiddenBanner');
            const btn = document.getElementById('btnHide');
            const btnText = document.getElementById('textHide');
            const cover = document.getElementById('bookCover');

            if (isHidden) {
                // 已隐藏状态：红色高亮
                banner.classList.remove('hidden');
                main.classList.add('is-hidden-mode');
                cover.classList.add('opacity-40', 'grayscale');
                btn.className = "w-full bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-red-500/20 transition active:scale-[0.98] flex items-center justify-center gap-2 text-[11px] mt-2";
                btnText.innerText = "撤销隐藏 (恢复至书库)";
            } else {
                // 正常状态
                banner.classList.add('hidden');
                main.classList.remove('is-hidden-mode');
                cover.classList.remove('opacity-40', 'grayscale');
                btn.className = "w-full bg-red-50 text-red-400 font-bold py-3 rounded-xl border border-red-100 hover:bg-red-500 hover:text-white transition active:scale-[0.98] flex items-center justify-center gap-2 text-[11px] mt-2 opacity-60 hover:opacity-100";
                btnText.innerText = "从书库隐藏此书籍";
            }
        }

        // 原有其他函数封装
        async function loadAIDetail() {
            try {
                const res = await fetch(`/api/novel/analysis/detail/${encodeURIComponent(novelName)}`);
                const data = await res.json();
                let summaryHtml = (data.analysis_result || '暂无解析记录').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                document.getElementById('aiSummary').innerHTML = summaryHtml;
            } catch (e) { document.getElementById('aiSummary').innerText = 'AI 加载失败'; }
        }

        async function loadTOC() {
            try {
                const tocRes = await fetch(`/api/novel/toc/${encodeURIComponent(novelName)}`);
                const tocData = await tocRes.json();
                parsedChapters = tocData.toc;
                document.getElementById('chapterCount').innerText = `TOTAL: ${tocData.total}`;
                document.getElementById('tocList').innerHTML = parsedChapters.map(ch => `
                    <a href="/novel-reader?novel=${encodeURIComponent(novelName)}&ch=${ch.index}" class="block p-4 hover:bg-zinc-50 text-[15px] text-zinc-700 truncate transition active:bg-zinc-100">
                        <span class="inline-block w-8 text-zinc-300 font-mono text-xs">${ch.index + 1}</span>${ch.title}
                    </a>`).join('');
            } catch(e) {}
        }

        // 收藏 UI (保持不变)
        function updateFavUI() {
            const icon = document.getElementById('iconFav');
            const text = document.getElementById('textFav');
            const coverIcon = document.getElementById('coverFavIcon');
            if (isFavorited) {
                icon.setAttribute('fill', 'currentColor');
                icon.classList.add('text-red-500');
                text.innerText = '已喜欢';
                text.classList.add('text-red-600');
                coverIcon.classList.remove('hidden');
            } else {
                icon.setAttribute('fill', 'none');
                icon.classList.remove('text-red-500');
                text.innerText = '标记喜欢';
                text.classList.remove('text-red-600');
                coverIcon.classList.add('hidden');
            }
        }

        async function toggleFavorite() {
            const nextState = !isFavorited;
            isFavorited = nextState;
            updateFavUI();
            await fetch(`/api/novel/state/${encodeURIComponent(novelName)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'fav', active: nextState })
            });
        }

        function downloadFile() { window.open(`/api/novel/download/${encodeURIComponent(novelName)}`, '_blank'); }
        function continueReading() { window.location.href = `/novel-reader?novel=${encodeURIComponent(novelName)}&ch=${lastReadIndex}`; }

        init();
    </script>
</body>
</html>
