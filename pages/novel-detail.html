<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情</title>
    <script>tailwind = { config: { } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f5; color: #27272a; font-family: -apple-system, "PingFang SC", sans-serif; }
        .markdown-body b { color: #3b82f6; font-weight: bold; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white/80 backdrop-blur-md shadow-sm p-4 flex items-center gap-4 shrink-0 sticky top-0 z-20 border-b border-zinc-100">
        <a href="/" class="p-2 bg-zinc-100 rounded-full hover:bg-zinc-200 transition active:scale-90">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 id="pageTitle" class="font-bold text-lg truncate flex-1 text-zinc-800">加载中...</h1>
    </header>

    <main class="flex-1 overflow-y-auto bg-zinc-50/50">
        <div class="bg-white p-8 shadow-sm border-b border-zinc-100 flex flex-col items-center">
            <div class="w-28 h-36 bg-gradient-to-br from-zinc-100 to-zinc-200 rounded-2xl shadow-inner flex items-center justify-center text-6xl mb-6 ring-4 ring-white">📘</div>
            <h2 id="bookTitle" class="font-bold text-2xl mb-6 text-center text-zinc-900 leading-tight">...</h2>
            
            <div class="flex flex-col w-full max-w-sm gap-4">
                <button id="btnRead" onclick="continueReading()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-500 transition active:scale-[0.98]">
                    开始阅读
                </button>
                <button onclick="downloadFile()" class="w-full bg-zinc-100 text-zinc-600 font-bold py-3 rounded-xl border border-zinc-200 hover:bg-zinc-200 transition active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    下载原文 (.txt)
                </button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto px-4 py-8 space-y-8">
            <section>
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-blue-500 text-lg">🤖</span>
                    <h3 class="font-bold text-zinc-400 text-xs uppercase tracking-widest">AI 深度解析</h3>
                </div>
                <div id="aiSummary" class="bg-blue-50/50 border border-blue-100 text-blue-900 p-5 rounded-2xl text-[15px] leading-relaxed whitespace-pre-wrap markdown-body">
                    正在同步云端大脑数据...
                </div>
            </section>

            <section class="mb-20">
                <div class="flex justify-between items-end mb-4 px-1">
                    <div class="flex items-center gap-2">
                        <span class="text-zinc-400 text-lg">📑</span>
                        <h3 class="font-bold text-zinc-400 text-xs uppercase tracking-widest">章节目录</h3>
                    </div>
                    <span id="chapterCount" class="text-[10px] font-mono bg-zinc-200 text-zinc-500 px-2 py-0.5 rounded">...</span>
                </div>
                
                <div id="tocList" class="bg-white rounded-2xl border border-zinc-200 overflow-hidden divide-y divide-zinc-100 shadow-sm">
                    <div class="p-8 text-center text-zinc-400 text-sm animate-pulse flex flex-col items-center gap-3">
                        <div class="w-5 h-5 border-2 border-zinc-300 border-t-blue-500 rounded-full animate-spin"></div>
                        正在重组文本拓扑结构...
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelName = urlParams.get('novel');
        let parsedChapters = [];
        let lastReadIndex = 0;

        if(!novelName) window.location.href = '/';
        
        const displayTitle = novelName.replace(/\.[^/.]+$/, "");
        document.getElementById('pageTitle').innerText = displayTitle;
        document.getElementById('bookTitle').innerText = displayTitle;
async function init() {
    try {
        // 1. 先获取本文分析详情
        const res = await fetch(`/api/novel/analysis/detail/${encodeURIComponent(novelName)}`);
        if (!res.ok) {
            document.getElementById('aiSummary').innerHTML = '暂无分析记录';
            return;
        }
        const data = await res.json();
        const myTags = data.tags || [];

        // 2. 🌟 精准请求：只向后端要这几个标签的出现次数
        let tagStats = {};
        if (myTags.length > 0) {
            const statsRes = await fetch('/api/novel/tags/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tags: myTags })
            });
            tagStats = await statsRes.json();
        }

        // 3. 渲染页面（配色保持你要求的风格）
        let summaryHtml = data.analysis_result
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
            .replace(/\n分类标签\s*[:：].*/g, '');

       // novel-detail.html 内部 init 函数片段
if (myTags.length > 0) {
    const tagsHtml = `
        <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-zinc-100">
            ${myTags.map(tag => {
                const count = tagStats[tag] || 0;
                // 配色逻辑
                let colorClass = "bg-blue-50 text-blue-600 hover:bg-blue-600";
                if(tag === '已完结') colorClass = "bg-green-50 text-green-600 hover:bg-green-600";
                if(tag === '连载中') colorClass = "bg-amber-50 text-amber-600 hover:bg-amber-600";
                
                // 精简结构，消除空白字符
                return `<a href="/novel?tag=${encodeURIComponent(tag)}" class="inline-flex items-center gap-1.5 px-2 py-1 ${colorClass} hover:text-white rounded-md text-[11px] font-bold transition-all group"><span># ${tag}</span><span class="px-1 bg-white/50 rounded font-mono text-[9px] text-zinc-500 group-hover:bg-black/10 group-hover:text-white">${count}</span></a>`;
            }).join('')}
        </div>`;
    
    // 渲染并剔除原始文本
    document.getElementById('aiSummary').innerHTML = data.analysis_result
        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
        .replace(/\n分类标签\s*[:：].*/g, '') + tagsHtml;
}

    } catch (e) {
        console.error(e);
    }
    
 

            // 2. 极速获取轻量化目录 (逻辑保持不变)
            try {
                const tocRes = await fetch(`/api/novel/toc/${encodeURIComponent(novelName)}`);
                const tocData = await tocRes.json();
                if(tocData.error) throw new Error(tocData.error);
                
                parsedChapters = tocData.toc;
                document.getElementById('chapterCount').innerText = `TOTAL: ${tocData.total}`;
                
                document.getElementById('tocList').innerHTML = parsedChapters.map(ch => `
                    <a href="/novel-reader?novel=${encodeURIComponent(novelName)}&ch=${ch.index}" 
                       class="block p-4 hover:bg-zinc-50 text-[15px] text-zinc-700 truncate transition active:bg-zinc-100">
                        <span class="inline-block w-8 text-zinc-300 font-mono text-xs">${ch.index + 1}</span>
                        ${ch.title}
                    </a>
                `).join('');

                // 3. 恢复进度
                const kvKey = `progress_${btoa(encodeURIComponent(novelName)).slice(0,16)}`;
                const progress = await fetch(`/api/kv/${kvKey}`).then(r=>r.json()).catch(()=>({}));
                if(progress.page !== undefined && progress.page < tocData.total) {
                    lastReadIndex = progress.page;
                    document.getElementById('btnRead').innerText = `继续阅读: ${parsedChapters[lastReadIndex].title}`;
                }
            } catch(e) {
                document.getElementById('tocList').innerHTML = '<div class="p-8 text-center text-red-500 font-bold text-sm">目录加载失败</div>';
            }
        }
        function downloadFile() {
            const downloadUrl = `/api/novel/download/${encodeURIComponent(novelName)}`;
            window.open(downloadUrl, '_blank');
        }

        function continueReading() {
            window.location.href = `/novel-reader?novel=${encodeURIComponent(novelName)}&ch=${lastReadIndex}`;
        }

        init();
    </script>
</body>
</html>
